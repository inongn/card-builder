id: thaumaturge
name: Thaumaturge
type: Folder
tags:
  - divineOrder
children:
  - id: thaumaturgeCantrip
    type: Slot
    name: Thaumaturge Cantrip
    quantity: 1
    target: cantrip AND cleric
  - id: thaumaturgeArcana
    type: Effect
    target: skills.arcana.bonus
    operation: add
    value: $(Math.max(1, stats.wis.mod))
  - id: thaumaturgeReligion
    type: Effect
    target: skills.religion.bonus
    operation: add
    value: $(Math.max(1, stats.wis.mod))
