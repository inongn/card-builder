id: lifedrinker
name: Lifedrinker
tags:
  - eldritchInvocation
condition: $(attributes.pactOfTheBlade == true && meta.level >= 9)
type: Folder
children:
  - id: lifedrinkerDesc
    type: Activity
    name: Lifedrinker
    description: "Once per turn when you hit a creature with a weapon attack, the target takes an extra 1d6 Necrotic, Psychic, or Radiant damage (your choice). You can also expend one of your Hit Point Dice to roll it and regain $(attributes.hitDie)$(formatBonus(stats.con.mod)) HP."
