id: wardaway
type: Activity
name: Wardaway
resource: level1SpellSlot
tags: [level1Spell, abjuration, bard, cleric, paladin, wizard, saveSpell, damageSpell, forceDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  You hurl a disorienting magical force toward one creature within range. The target makes a DC $(attributes.spellcasting.save) Constitution saving throw; Constructs and Undead automatically succeed on this save.

  On a failed save, the target takes 2d4 Force damage, its Speed is halved until the start of your next turn, and on its next turn, it can take only an action or a Bonus Action (but not both). On a successful save, the target takes half as much damage only.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 2d4 for every spell slot level above 1.
