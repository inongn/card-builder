id: rayOfSickness
type: Activity
name: Ray of Sickness
resource: level1SpellSlot
tags: [level1Spell, necromancy, sorcerer, wizard, attackSpell, damageSpell, poisonDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  You shoot a greenish ray at a creature within range. Make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack against the target. On a hit, the target takes 2d8 Poison damage and has the Poisoned condition until the end of your next turn.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d8 for each spell slot level above 1.
