id: guidingBolt
type: Activity
name: Guiding Bolt
resource: level1SpellSlot
tags: [level1Spell, evocation, cleric, attackSpell, damageSpell, radiantDamage]
time: action
range: 120 feet
duration: 1 round
description: |
  You hurl a bolt of light toward a creature within range. Make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack against the target. On a hit, it takes 4d6 Radiant damage, and the next attack roll made against it before the end of your next turn has Advantage.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d6 for each spell slot level above 1.
