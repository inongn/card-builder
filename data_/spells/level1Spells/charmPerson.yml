id: charmPerson
type: Activity
name: Charm Person
resource: level1SpellSlot
tags: [level1Spell, enchantment, bard, druid, sorcerer, warlock, wizard, saveSpell, damageSpell]
time: action
range: 30 feet
duration: 1 hour
description: |
  One Humanoid you can see within range makes a DC $(attributes.spellcasting.save) Wisdom saving throw. It does so with Advantage if you or your allies are fighting it. On a failed save, the target has the Charmed condition until the spell ends or until you or your allies damage it. The Charmed creature is Friendly to you. When the spell ends, the target knows it was Charmed by you.
extra:
  - name: Using a Higher-Level Spell Slot
    description: You can target one additional creature for each spell slot level above 1.
