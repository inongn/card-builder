id: reverseGravity
type: Activity
name: Reverse Gravity
resource: level7SpellSlot
tags: [level7Spell, transmutation, druid, sorcerer, wizard, saveSpell]
time: action
range: 100 feet
duration: concentration, up to 1 minute
description: |
  This spell reverses gravity in a 50-foot-radius, 100-foot high Cylinder centered on a point within range. All creatures and objects in that area that aren’t anchored to the ground fall upward and reach the top of the Cylinder. A creature can make a DC $(attributes.spellcasting.save) Dexterity saving throw to grab a fixed object it can reach, thus avoiding the fall upward.

  If a ceiling or an anchored object is encountered in this upward fall, creatures and objects strike it just as they would during a downward fall. If an affected creature or object reaches the Cylinder’s top without striking anything, it hovers there for the duration. When the spell ends, affected objects and creatures fall downward.

