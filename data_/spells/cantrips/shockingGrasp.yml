id: shockingGrasp
type: Activity
name: Shocking Grasp
tags: [evocation, cantrip, artificer, sorcerer, wizard]
time: action
range: touch
duration: instantaneous
description: |
  Lightning springs from you to a creature that you try to touch. Make a melee spell attack against the target. On a hit, the target takes $(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)d8 Lightning damage, and it can’t make Opportunity Attacks until the start of its next turn.

