id: enthrall
type: Activity
name: Enthrall
resource: level2SpellSlot
tags: [level2Spell, enchantment, bard, warlock, saveSpell]
time: action
range: 60 feet
duration: concentration, up to 1 minute
description: |
  You weave a distracting string of words, causing creatures of your choice that you can see within range to make a DC $(attributes.spellcasting.save) Wisdom saving throw. Any creature you or your companions are fighting automatically succeeds on this save. On a failed save, a target has a −10 penalty to Wisdom (Perception) checks and Passive Perception until the spell ends.

