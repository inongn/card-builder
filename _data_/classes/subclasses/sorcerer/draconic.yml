id: draconic
name: Draconic Sorcery
description: |
  Your innate magic comes from the gift of a dragon. Perhaps an ancient dragon facing death bequeathed some of its magical power to you or your ancestor. You might have absorbed magic from a site infused with dragons’ power. Or perhaps you handled a treasure taken from a dragon’s hoard that was steeped in draconic power.
type: Folder
tags:
  - sorcererSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Draconic"
  # Level 3: Draconic Resilience
  - id: draconicResilienceHP
    type: Effect
    target: attributes.hp
    operation: add
    value: $(meta.level)
    condition: $(meta.level >= 3)
  - id: draconicResilienceAC
    type: Effect
    target: attributes.ac
    operation: set
    value: $(10 + stats.dex.mod + stats.cha.mod)
    condition: $(meta.level >= 3)

  # Level 3: Draconic Spells
  - type: Reference
    target: [alterSelf, chromaticOrb, command, dragonsBreath]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [fear, fly]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [arcaneEye, charmMonster]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [legendLore, summonDragon]
    condition: $(meta.level >= 9)

  # Level 6: Elemental Affinity
  - id: elementalAffinity
    type: Slot
    name: Elemental Affinity
    condition: $(meta.level >= 6)
    target: classOptions OR elementalAffinity

  # Level 14: Dragon Wings
  - id: dragonWings
    type: Activity
    name: Dragon Wings
    time: bonus action
    duration: 1 hour
    condition: $(meta.level >= 14)
    resource: 3 sorceryPoints
    tags: [innateLR]
    description: |
      You cause draconic wings to appear on your back. The wings last for the duration or until you dismiss them (no action required). For the duration, you have a Fly Speed of 60 feet.

  # Level 18: Dragon Companion
  - id: dragonCompanion
    type: Extra
    name: Dragon Companion
    target: summonDragon
    condition: $(meta.level >= 18)
    description: |
      You can cast this spell without expending a spell lost once per Long Rest. Whenever you start casting this spell, you can modify it so that it doesn't require Concentration. If you do so, the spell's duration becomes 1 minute for that casting.