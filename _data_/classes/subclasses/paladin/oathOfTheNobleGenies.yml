id: oathOfTheNobleGenies
name: Oath of the Noble Genies
condition: $(meta.setting === 'faerun')
description: |
  Paladins sworn to the Oath of the Noble Genies revere the forces of the Elemental Planes. Through taking this oath, Paladins draw power from the four different types of genies.
tags:
  - paladinSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Noble Genies"
  # Level 3: Elemental Smite
  - id: elementalSmite
    type: Activity
    name: Elemental Smite
    time: free action
    resource: channelDivinity
    description: "Immediately after you cast Divine Smite, you invoke one of the following effects."
  - id: elementalSmiteDaosCrush
    type: Extra
    name: Dao's Crush
    target: elementalSmite
    description: "Earth rises up around the target of your Divine Smite. The target has the Grappled condition (escape DC $(attributes.spellcasting.save)). While Grappled, the target has the Restrained condition."
  - id: elementalSmiteDjinnisEscape
    type: Extra
    name: Djinni's Escape
    target: elementalSmite
    description: "You teleport to an unoccupied space you can see within 30 feet of yourself and take on a semi-incorporeal form, which lasts until the end of your next turn. While in this form, you have Resistance to Bludgeoning, Piercing, and Slashing damage, and you have Immunity to the Grappled, Prone, and Restrained conditions."
  - id: elementalSmiteEfreetisFury
    type: Extra
    name: Efreeti's Fury
    target: elementalSmite
    description: "The target of your Divine Smite takes an extra 2d4 Fire damage, and fire jumps from the target to another creature you can see within 30 feet of yourself. The second creature also takes 2d4 Fire damage."
  - id: elementalSmiteMaridsSurge
    type: Extra
    name: Marid's Surge
    target: elementalSmite
    description: "The target of your Divine Smite and each creature of your choice in a 10-foot Emanation originating from you make a DC $(attributes.spellcasting.save) Strength saving throw. On a failure, a creature is pushed 15 feet straight away from you and has the Prone condition."

  # Level 3: Genie Spells
  - type: Reference
    target: [chromaticOrb, elementalism, thunderousSmite]
  - type: Reference
    target: [mirrorImage, phantasmalForce]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [fly, gaseousForm]
    condition: $(meta.level >= 9)
  - type: Reference
    target: [conjureMinorElementals, summonElemental]
    condition: $(meta.level >= 13)
  - type: Reference
    target: [banishingSmite, contactOtherPlane]
    condition: $(meta.level >= 17)

  # Level 3: Genie's Splendor
  - id: geniesSplendor
    type: Effect
    target: attributes.ac
    value: $(10+stats.dex.mod+stats.cha.mod)
    name: Genie's Splendor
  - id: geniesSplendorSkill
    type: Slot
    name: Genie's Splendor Skill
    quantity: 1
    target: acrobaticsProficiency OR intimidationProficiency OR performanceProficiency OR persuasionProficiency

  # Level 7: Aura of Elemental Shielding
  - id: auraOfElementalShielding
    type: Extra
    name: Aura of Elemental Shielding
    target: auraOfProtection
    condition: $(meta.level >= 7)
    description: "Choose one of the following damage types: Acid, Cold, Fire, Lightning, or Thunder. You and your allies have Resistance to that damage type. At the start of each of your turns, you can change the damage type affected by this feature to one of the other listed options (no action required)."

  # Level 15: Elemental Rebuke
  - id: elementalRebuke
    type: Activity
    name: Elemental Rebuke
    time: reaction
    range: self
    duration: Instantaneous
    condition: $(meta.level >= 15)
    resource: elementalRebuke
    description: "When you are hit by an attack roll, you halve the attack's damage against yourself (round down) and force the attacker to make a DC $(attributes.spellcasting.save) Dexterity saving throw. On a failure, the attacker takes 2d10$(formatBonus(stats.cha.mod)) damage of one of the following types (your choice): Acid, Cold, Fire, Lightning, or Thunder. On a success, the attacker takes half as much damage."
  - id: elementalRebuke
    type: Resource
    name: Elemental Rebuke
    quantity: $(Math.max(1, stats.cha.mod))
    condition: $(meta.level >= 15)

  # Level 20: Noble Scion
  - id: nobleScion
    type: Activity
    name: Noble Scion
    time: bonus action
    duration: 10 minutes
    condition: $(meta.level >= 20)
    tags: [innateLR]
    resource: level5SpellSlot
    description: "You gain the benefits below for the duration or until you end them (no action required):"
  - id: nobleScionFlight
    type: Extra
    name: Flight
    target: nobleScion
    condition: $(meta.level >= 20)
    description: "You have a Fly Speed of 60 feet and can hover."
  - id: nobleScionMinorWish
    type: Extra
    name: Minor Wish
    target: nobleScion
    condition: $(meta.level >= 20)
    description: "When you or an ally in your Aura of Protection fails a D20 Test, you can take a Reaction to make you or that ally succeed instead."
