id: celestialPatron
name: Celestial Patron
description: |
  Your pact draws on the Upper Planes, the realms of everlasting bliss. You might enter an agreement with an empyrean, a couatl, a sphinx, a unicorn, or another heavenly entity. Or you might call on numerous such beings as you pursue goals aligned with theirs.
tags:
  - warlockSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Celestial"
  # Level 3: Celestial Spells
  - type: Reference
    target: [aid, cureWounds, guidingBolt, lesserRestoration, light, sacredFlame]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [daylight, revivify]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [guardianOfFaith, wallOfFire]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [greaterRestoration, summonCelestial]
    condition: $(meta.level >= 9)

  # Level 3: Healing Light
  - id: healingLight
    type: Activity
    name: Healing Light
    time: bonus action
    range: 60 feet
    resource: healingLight
    condition: $(meta.level >= 3)
    description: "Heal yourself or a creature you can see. The target regains 1d6 Hit Points per charge expeded, up to a maximum of $(Math.min(1, stats.cha.mod))d6 Hit Points."
  - id: healingLight
    type: Resource
    name: Healing Light Dice
    quantity: $(1 + meta.level)
    condition: $(meta.level >= 3)
    sr: 0

  # Level 6: Radiant Soul
  - id: radiantSoulRes
    type: Reference
    target: radiantResistance
    condition: $(meta.level >= 6)
  - id: radiantSoulD12
    type: Effect
    target: activities[damageSpell AND (radiantDamage OR fireDamage)].description["d12"]
    operation: replace
    value: "d12$(formatBonus(stats.cha.mod))"
    condition: $(meta.level >= 6)
  - id: radiantSoulD10
    type: Effect
    target: activities[damageSpell AND (radiantDamage OR fireDamage)].description["d10"]
    operation: replace
    value: "d10$(formatBonus(stats.cha.mod))"
    condition: $(meta.level >= 6)
  - id: radiantSoulD8
    type: Effect
    target: activities[damageSpell AND (radiantDamage OR fireDamage)].description["d8"]
    operation: replace
    value: "d8$(formatBonus(stats.cha.mod))"
    condition: $(meta.level >= 6)
  - id: radiantSoulD6
    type: Effect
    target: activities[damageSpell AND (radiantDamage OR fireDamage)].description["d6"]
    operation: replace
    value: "d6$(formatBonus(stats.cha.mod))"
    condition: $(meta.level >= 6)
  - id: radiantSoulD4
    type: Effect
    target: activities[damageSpell AND (radiantDamage OR fireDamage)].description["d4"]
    operation: replace
    value: "d4$(formatBonus(stats.cha.mod))"
    condition: $(meta.level >= 6)

  # Level 10: Celestial Resilience
  - id: celestialResilience
    type: Extra
    target: shortRest OR magicalCunning
    name: Celestial Resilience
    description: |
      You gain $(meta.level + stats.cha.mod) Temporary Hit Points. Choose up to 5 creatures. They gain $(Math.floor(meta.level / 2) + stats.cha.mod) Temporary Hit Points.
    condition: $(meta.level >= 10)

  # Level 14: Searing Vengeance
  - id: searingVengeance
    type: Activity
    name: Searing Vengeance
    time: reaction
    range: 60 feet
    tags: [limitedLR]
    condition: $(meta.level >= 14)
    description: |
      When you or an ally within range of you is about to make a Death Saving Throw, you unleash radiant energy to save the creature. The creature regains Hit Points equal to half its Hit Point maximum and can end the Prone condition on itself. 
      
      Each creature of your choice that is within 30 feet of the creature takes Radiant damage equal to 2d8$(formatBonus(stats.cha.mod)) and has the Blinded condition until the end of the current turn.
