id: alchemist
name: Alchemist
description: |
  An Alchemist is an expert at combining reagents to produce magical effects. Alchemists use their creations to give life and to leech it away.
type: Folder
tags:
  - artificerSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Alchemist"

  # Level 3: Tools of the Trade
  - type: Reference
    target: [alchemistsTools, herbalismKit]

  # Level 3: Alchemist Spells
  - type: Reference
    target: [healingWord, rayOfSickness]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [flamingSphere, melfsAcidArrow]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [gaseousForm, massHealingWord]
    condition: $(meta.level >= 9)
  - type: Reference
    target: [deathWard, vitriolicSphere]
    condition: $(meta.level >= 13)
  - type: Reference
    target: [cloudkill, raiseDead]
    condition: $(meta.level >= 17)

  # Level 3: Experimental Elixir
  - id: experimentalElixirResource
    name: "Experimental Elixir"
    type: Resource
    quantity: "$(meta.level >= 15 ? 5 : meta.level >= 9 ? 4 : meta.level >= 5 ? 3 : 2)"
  - id: experimentalElixir
    type: Activity
    name: Experimental Elixir
    time: bonus action
    resource: experimentalElixirResource
    description: |
      You drink the elixir or administer it to another creature within 5 feet of itself. The elixir has one of the following effects:

      **1. Healing.** The drinker regains hit points equal to 2d8 plus your Intelligence modifier ($(2 + (meta.level >= 9 ? 1 : 0) + (meta.level >= 15 ? 1 : 0))d8$(formatBonus(stats.int.mod))).

      **2. Swiftness.** The drinker’s Speed increases by $(meta.level >= 15 ? 20 : meta.level >= 9 ? 15 : 10) feet for 1 hour.

      **3. Resilience.** The drinker gains a +1 bonus to AC for $(meta.level >= 15 ? '8 hours' : meta.level >= 9 ? '1 hour' : '10 minutes').
      
      **4. Boldness.** The drinker rolls 1d4 and adds it to attack rolls and saving throws for $(meta.level >= 15 ? '1 hour' : meta.level >= 9 ? '10 minutes' : '1 minute').

      **5. Flight.** The drinker gains a Fly Speed of $(meta.level >= 15 ? 30 : meta.level >= 9 ? 20 : 10) feet for 10 minutes.
      
      **6. Choice.** Choose one of the above.
  # Level 5: Alchemical Savant
  - type: Effect
    target: activities[(damageSpell AND (acidDamage OR fireDamage OR poisonDamage)) OR healingSpell].description["d12"]
    operation: replace
    value: "d12$(formatBonus(stats.int.mod))"
    condition: $(meta.level >= 5)
  - type: Effect
    target: activities[(damageSpell AND (acidDamage OR fireDamage OR poisonDamage)) OR healingSpell].description["d10"]
    operation: replace
    value: "d10$(formatBonus(stats.int.mod))"
    condition: $(meta.level >= 5)
  - type: Effect
    target: activities[(damageSpell AND (acidDamage OR fireDamage OR poisonDamage)) OR healingSpell].description["d8"]
    operation: replace
    value: "d8$(formatBonus(stats.int.mod))"
    condition: $(meta.level >= 5)
  - type: Effect
    target: activities[(damageSpell AND (acidDamage OR fireDamage OR poisonDamage)) OR healingSpell].description["d6"]
    operation: replace
    value: "d6$(formatBonus(stats.int.mod))"
    condition: $(meta.level >= 5)
  - type: Effect
    target: activities[(damageSpell AND (acidDamage OR fireDamage OR poisonDamage)) OR healingSpell].description["d4"]
    operation: replace
    value: "d4$(formatBonus(stats.int.mod))"
    condition: $(meta.level >= 5)

  # Level 9: Restorative Reagents
  - id: restorativeReagentsResource
    type: Resource
    name: Restorative Reagents
    quantity: "$(Math.max(1, stats.int.mod))"
    condition: $(meta.level >= 9)
  - id: restorativeReagents
    type: Activity
    name: Restorative Reagents
    time: action
    resource: restorativeReagentsResource
    condition: $(meta.level >= 9)
    description: |
      You can cast Lesser Restoration without expending a spell slot and without preparing the spell, provided you use Alchemist’s Supplies as the Spellcasting Focus.

  # Level 15: Chemical Mastery
  - id: chemicalMastery
    type: Extra
    name: Chemical Mastery
    condition: $(meta.level >= 15)
    description: |
      **Alchemical Eruption.** When you cast an Artificer spell that deals Acid, Fire, or Poison damage to a target, you can also deal 2d8 Force damage to that target. You can use this benefit only once on each of your turns.
  - type: Reference
    target: [acidResistance, poisonResistance, poisonedImmunity]
    condition: $(meta.level >= 15)
  - id: conjuredCauldron
    type: Activity
    name: Conjured Cauldron
    time: action
    tags: [innateLR]
    condition: $(meta.level >= 15)
    description: |
      You can cast Tasha’s Bubbling Cauldron without expending a spell slot, without preparing the spell, and without Material components, provided you use Alchemist’s Supplies as the Spellcasting Focus.
