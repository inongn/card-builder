id: bladesinger
name: Bladesinger
condition: $(meta.setting === 'faerun')
description: |
  Bladesingers master a tradition of wizardry that incorporates swordplay and dance. In combat, a Bladesinger uses intricate, elegant maneuvers that fend off harm and allow the Bladesinger to channel magic into devastating attacks and a cunning defense.

  Bladesinging is associated with the ancient elven societies that first mastered the art and coined the term. Even today, most Bladesingers still hail from old elven realms, such as Myth Drannor, or from non-elven societies that share land and history with elves, such as the Silver Marches.
type: Folder
tags:
  - wizardSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Bladesinger"
  # Level 3: Bladesong
  - id: bladesong
    type: Activity
    name: Bladesong
    time: bonus action
    duration: 1 minute
    resource: bladesong
    condition: $(meta.level >= 3)
    description: |
      You invoke an elven magic called the Bladesong. While the Bladesong is active, you gain the following benefits:
      
      **Agility.** You gain a +$(Math.max(1, stats.int.mod)) bonus to your AC, and your Speed increased by 10 feet. You also have Advantage on Acrobatics.
      
      **Bladework.** You make attack rolls with a $(formatBonus(stats.int.mod+attributes.prof)) modifier and a $(formatBonus(stats.int.mod)) damage bonus.
      
      **Focus.** When you make a Constitution saving throw to maintain Concentration, you can add $(formatBonus(stats.int.mod)) to the total.

  - id: bladesong
    type: Resource
    name: Bladesong
    quantity: $(Math.max(1, stats.int.mod))
    condition: $(meta.level >= 3)

  - id: bladesongArcaneRecovery
    type: Extra
    target: arcaneRecovery
    name: Bladesong
    condition: $(meta.level >= 3)
    description: "You regain one charge of Bladesong."

  # Level 3: Training in War and Song
  - type: Reference
    target: [lightArmorTraining, martialWeaponProficiency] # Simplified
    condition: $(meta.level >= 3)
  - id: trainingInWarAndSongSkill
    type: Slot
    name: Bladesinger Skill Proficiency
    quantity: 1
    target: acrobaticsProficiency OR athleticsProficiency OR performanceProficiency OR persuasionProficiency
    condition: $(meta.level >= 3)

  # Level 6: Extra Attack
  - id: extraAttack
    type: Extra
    target: weaponAttack
    condition: $(meta.level >= 5)
    name: Extra Attack
    description: "You can attack twice, instead of once, whenever you take the Attack action on your turn. You can replace one attack with a cantrip that has a casting time of an action."

  # Level 10: Song of Defense
  - id: songOfDefense
    type: Activity
    name: Song of Defense
    time: reaction
    resource: level1SpellSlot
    condition: $(meta.level >= 10)
    description: "When you take damage while your Bladesong is active, you reduce the damage taken by an amount equal to five times the spell slot’s level."

  # Level 14: Song of Victory
  - id: songOfVictory
    type: Extra
    name: Song of Victory
    condition: $(meta.level >= 14)
    target: (level1Spell OR level2Spell OR level3Spell OR level4Spell OR level5Spell OR level6Spell OR level7Spell OR level8Spell OR level9Spell) AND time=action
    description: "Make one attack with a weapon."