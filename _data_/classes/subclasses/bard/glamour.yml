id: glamour
name: College of Glamour
description: |
  Bards of the College of Glamour trace their origins to the beguiling magic of the Feywild. These bards weave threads of beauty and terror into their songs and stories, and the mightiest among them can cloak themselves in otherworldly majesty.
type: Folder
tags:
  - bardSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Glamour"
  # Level 3: Beguiling Magic
  - type: Reference
    target: [charmPerson, mirrorImage]
    
  - id: beguilingMagic
    type: Activity
    name: Beguiling Magic
    condition: $(meta.level >= 3)
    resource: bardicInspiration
    duration: 1 minute
    tags: [innateLR]
    description: "After casting an Enchantment or Illusion spell using a spell slot, you force a creature within 60 feet to make a Wisdom save. On a failure, it has the Charmed or Frightened condition (your choice)."

  # Level 3: Mantle of Inspiration
  - id: mantleOfInspiration
    type: Activity
    name: Mantle of Inspiration
    time: bonus action
    resource: bardicInspiration
    condition: $(meta.level >= 3)
    description: "You provide $(2 * attributes.bardicDie) Temporary Hit Points to up to $(Math.max(1, stats.cha.mod)) creatures within 60 feet. Each can use its Reaction to move up to its Speed without provoking Opportunity Attacks."

  # Level 6: Mantle of Majesty
  - type: Reference
    target: command
    condition: $(meta.level >= 6)

  - id: mantleOfMajesty
    type: Activity
    name: Mantle of Majesty
    time: bonus action
    duration: Concentration, up to 1 minute
    condition: $(meta.level >= 6)
    tags: [limitedLR]
    description: |
      You cast Command without expending a spell slot and assume an unearthly appearance for the duration. 
      
      While active, you can cast Command as a Bonus Action without expending a spell slot. Any creature Charmed by you automatically fails its save against this Command.
    # Note: Can restore use with L3+ spell slot. (Text implies this but resource tracking is manual or requires complex logic).

  # Level 14: Unbreakable Majesty
  - id: unbreakableMajesty
    type: Activity
    name: Unbreakable Majesty
    time: bonus action
    duration: 1 minute
    condition: $(meta.level >= 14)
    tags: [limitedSR]
    description: "You assume a majestic presence for the duration. Whenever a creature hits you with an attack for the first time on a turn, it must succeed on a Charisma save or miss instead."
