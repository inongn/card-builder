id: acidAffinity
name: Acid Affinity
type: Folder
tags:
  - elementalAffinity
children:
  - type: Reference
    target: acidResistance
  - type: Effect
    target: activities[damageSpell AND acidDamage].description["d12"]
    operation: replace
    value: "d12$(formatBonus(stats.cha.mod))"
  - type: Effect
    target: activities[damageSpell AND acidDamage].description["d10"]
    operation: replace
    value: "d10$(formatBonus(stats.cha.mod))"
  - type: Effect
    target: activities[damageSpell AND acidDamage].description["d8"]
    operation: replace
    value: "d8$(formatBonus(stats.cha.mod))"
  - type: Effect
    target: activities[damageSpell AND acidDamage].description["d6"]
    operation: replace
    value: "d6$(formatBonus(stats.cha.mod))"
  - type: Effect
    target: activities[damageSpell AND acidDamage].description["d4"]
    operation: replace
    value: "d4$(formatBonus(stats.cha.mod))"