id: guide
name: Guide
description: "You came of age outdoors, far from settled lands. Your home was anywhere\
  \ you chose to spread your bedroll. There are wonders in the wilderness\u2014strange\
  \ monsters, pristine forests and streams, overgrown ruins of great halls once trod\
  \ by giants\u2014and you learned to fend for yourself as you explored them. From\
  \ time to time, you guided friendly nature priests who instructed you in the fundamentals\
  \ of channeling the magic of the wild.\n"
