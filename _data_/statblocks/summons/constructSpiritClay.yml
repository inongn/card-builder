type: Statblock
name: Construct Spirit (Clay)
tags: [summon]
id: constructSpiritClay
size: Medium
category: summon
classification: Construct
ac: "$(13 + (local.maxLevel || 4))"
hp: "$(40 + 15 * ((local.maxLevel || 4) - 4))"
movement:
  walk: 30
stats:
  str: 18
  dex: 10
  con: 18
  int: 14
  wis: 11
  cha: 5
resistances: [Poison]
immunities: [Charmed, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 4) / 2)) Slam attacks."
  - name: Slam
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.str.mod)) + $(local.maxLevel || 4) Bludgeoning damage."
reactions:
  - name: Berserk Lashing
    description: "_Trigger:_ The spirit takes damage from a creature. _Response:_ The spirit makes a Slam attack against that creature if possible, or the spirit moves up to half its Speed toward that creature without provoking Opportunity Attacks."
