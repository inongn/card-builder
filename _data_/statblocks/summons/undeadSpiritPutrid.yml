type: Statblock
name: Undead Spirit (Putrid)
tags: [summon]
id: undeadSpiritPutrid
size: Medium
category: summon
classification: Undead
ac: "$(11 + (local.maxLevel || 3))"
hp: "$(30 + 10 * ((local.maxLevel || 3) - 3))"
movement:
  walk: 30
stats:
  str: 12
  dex: 16
  con: 15
  int: 4
  wis: 10
  cha: 9
immunities: [Necrotic, Poison, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Festering Aura
    description: "_Constitution Saving Throw:_ DC $(attributes.spellcasting.save), any creature (other than you) that starts its turn within a 5-foot Emanation originating from the spirit. _Failure:_ The creature has the Poisoned condition until the start of its next turn."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 3) / 2)) Rotting Claw attacks."
  - name: Rotting Claw
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d6$(formatBonus(stats.dex.mod)) + $(local.maxLevel || 3) Slashing damage. If the target has the Poisoned condition, it has the Paralyzed condition until the end of its next turn."
