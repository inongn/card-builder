type: Statblock
name: Fiendish Spirit (Yugoloth)
tags: [summon]
id: fiendishSpiritYugoloth
size: Large
classification: Fiend
ac: "$(12 + (local.maxLevel || 6))"
hp: "$(60 + 15 * ((local.maxLevel || 6) - 6))"
movement:
  walk: 40
stats:
  str: 13
  dex: 16
  con: 15
  int: 10
  wis: 10
  cha: 16
resistances: [Fire]
immunities: [Poison, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Magic Resistance
    description: "The spirit has Advantage on saving throws against spells and other magical effects."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 6) / 2)) Claw attacks."
  - name: Claws
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.dex.mod)) + $(local.maxLevel || 6) Slashing damage. Immediately after the attack hits or misses, the spirit can teleport up to 30 feet to an unoccupied space it can see."
