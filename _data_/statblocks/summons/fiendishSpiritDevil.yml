type: Statblock
name: Fiendish Spirit (Devil)
tags: [summon]
id: fiendishSpiritDevil
size: Large
classification: Fiend
ac: "$(12 + (local.maxLevel || 6))"
hp: "$(40 + 15 * ((local.maxLevel || 6) - 6))"
movement:
  walk: 40
  fly: 60
stats:
  str: 13
  dex: 16
  con: 15
  int: 10
  wis: 10
  cha: 16
resistances: [Fire]
immunities: [Poison, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Devil’s Sight
    description: "Magical Darkness doesn’t impede the spirit’s Darkvision."
  - name: Magic Resistance
    description: "The spirit has Advantage on saving throws against spells and other magical effects."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 6) / 2)) Fiery Strike attacks."
  - name: Fiery Strike
    description: "_Melee or Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. or range 150 ft. _Hit:_ 2d6$(formatBonus(stats.dex.mod)) + $(local.maxLevel || 6) Fire damage."
