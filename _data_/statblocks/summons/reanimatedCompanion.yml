type: Statblock
name: Reanimated Companion
id: reanimatedCompanion
category: summon
tags: [summon]
size: Medium
classification: Undead
ac: "$(10 + stats.int.mod)"
hp: "$(5 + 5 * meta.level)"
movement:
  walk: 30
stats:
  str: 11
  con: 16
  dex: 10
  int: 4
  wis: 10
  cha: 6
resistances: [Necrotic, Poison]
immunities: [Lightning, Charmed, Exhaustion, Poisoned]
senses:
  blindsight: 60
challenge: 0
cr: 0
traits:
  - name: Death Burst
    description: "When the companion dies, it explodes. Each creature in a 10-foot Emanation originating from the companion must make a DC $(attributes.spellcasting.save) Dexterity saving throw. On a failed save, it takes 2d4 Necrotic damage, or half as much on a successful one."
  - name: Lightning Absorption
    description: "Whenever the companion is subjected to Lightning damage, it regains a number of Hit Points equal to the Lightning damage dealt."
actions:
  - name: Dreadful Swipe
    id: dreadfulSwipe
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d4 + $(stats.int.mod) Necrotic damage, and the target can't take Opportunity Attacks until the start of its next turn."
