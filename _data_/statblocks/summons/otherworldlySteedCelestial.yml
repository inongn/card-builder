type: Statblock
name: Celestial Steed
tags: [steed]
id: otherworldlySteedCelestial
size: Large
category: summon
classification: Celestial
ac: "$(10 + (local.maxLevel || 2))"
hp: "$(5 + 10 * (local.maxLevel || 2))"
movement:
  walk: 60
  fly: "$( (local.maxLevel || 2) >= 4 ? 60 : 0 )"
stats:
  str: 18
  dex: 12
  con: 14
  int: 6
  wis: 12
  cha: 8
senses:
  passivePerception: 11
languages: Telepathy 1 mile (works only with you)
traits:
  - name: Life Bond
    description: When you regain Hit Points from a level 1+ spell, the steed regains the same number of Hit Points if you're within 30 feet of it.
actions:
  - name: Otherworldly Slam
    description: "_Melee Attack Roll:_ your Spell Attack Modifier to hit, reach 5 ft. _Hit:_ 1d8 + $(local.maxLevel || 2) Radiant damage."
  - name: Healing Touch (Recharges after a Long Rest)
    description: "One creature within 30 feet of the steed regains a number of Hit Points equal to 2d8 + $(local.maxLevel || 2)."
