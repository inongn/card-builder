type: Statblock
name: Fey Spirit (Mirthful)
tags: [summon]
id: feySpiritMirthful
size: Small
category: summon
classification: Fey
ac: "$(12 + (local.maxLevel || 3))"
hp: "$(30 + 10 * ((local.maxLevel || 3) - 3))"
movement:
  walk: 30
  fly: 30
stats:
  str: 13
  dex: 16
  con: 14
  int: 14
  wis: 11
  cha: 16
immunities: [Charmed]
senses:
  darkvision: 60
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 3) / 2)) Fey Blade attacks."
  - name: Fey Blade
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 2d6$(formatBonus(stats.dex.mod)) + $(local.maxLevel || 3) Force damage."
bonusActions:
  - name: Fey Step
    description: "The spirit magically teleports up to 30 feet to an unoccupied space it can see. Then force one creature the spirit can see within 10 feet of itself to make a Wisdom saving throw (DC $(attributes.spellcasting.save)). On a failure, the target is Charmed by you and the spirit for 1 minute or until the target takes any damage."
