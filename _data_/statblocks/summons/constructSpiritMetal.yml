type: Statblock
name: Construct Spirit (Metal)
tags: [summon]
id: constructSpiritMetal
size: Medium
category: summon
classification: Construct
ac: "$(13 + (local.maxLevel || 4))"
hp: "$(40 + 15 * ((local.maxLevel || 4) - 4))"
movement:
  walk: 30
stats:
  str: 18
  dex: 10
  con: 18
  int: 14
  wis: 11
  cha: 5
resistances: [Poison]
immunities: [Charmed, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Heated Body
    description: "A creature that hits the spirit with a melee attack or that starts its turn in a grapple with the spirit takes 1d10 Fire damage."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 4) / 2)) Slam attacks."
  - name: Slam
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.str.mod)) + $(local.maxLevel || 4) Bludgeoning damage."
