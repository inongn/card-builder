type: Statblock
name: Draconic Spirit
id: draconicSpirit
category: summon
tags: [summon]
size: Large
classification: Dragon
ac: "$(14 + (local.maxLevel || 5))"
hp: "$(50 + 10 * ((local.maxLevel || 5) - 5))"
movement:
  walk: 30
  fly: 60
  swim: 30
stats:
  str: 19
  dex: 14
  con: 17
  int: 10
  wis: 14
  cha: 14
resistances: [Acid, Cold, Fire, Lightning, Poison]
immunities: [Charmed, Frightened, Poisoned]
senses:
  blindsight: 30
  darkvision: 60
traits:
  - name: Shared Resistances
    description: "When you summon the spirit, choose one of its Resistances. You have Resistance to the chosen damage type until the spell ends."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 5) / 2)) Rend attacks, and it uses Breath Weapon."
  - name: Rend
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 10 ft. _Hit:_ 1d6$(formatBonus(stats.str.mod)) + $(local.maxLevel || 5) Piercing damage."
  - name: Breath Weapon
    description: "_Dexterity Saving Throw:_ DC $(attributes.spellcasting.save), each creature in a 30-foot Cone. _Failure:_ 2d6 damage of a type this spirit has Resistance to (your choice when you cast the spell). _Success:_ Half damage."
