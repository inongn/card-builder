type: Statblock
name: Bestial Spirit (Land)
tags: [summon]
id: bestialSpiritLand
size: Medium
category: summon
classification: Beast
ac: "$(11 + (local.maxLevel || 2))"
hp: "$(20 + 10 * ((local.maxLevel || 2) - 2))"
movement:
  walk: 30
  climb: 30
stats:
  str: 18
  dex: 11
  con: 16
  int: 4
  wis: 14
  cha: 5
senses:
  darkvision: 60
traits:
  - name: Pack Tactics
    description: "The spirit has Advantage on Wisdom (Perception) checks that rely on smell when it is within 30 feet of another creature that it can see."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 2) / 2)) Rend attacks."
  - name: Rend
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.str.mod)) + $(local.maxLevel || 2) Piercing damage."
