type: Statblock
name: Construct Spirit (Stone)
tags: [summon]
id: constructSpiritStone
size: Medium
category: summon
classification: Construct
ac: "$(13 + (local.maxLevel || 4))"
hp: "$(40 + 15 * ((local.maxLevel || 4) - 4))"
movement:
  walk: 30
stats:
  str: 18
  dex: 10
  con: 18
  int: 14
  wis: 11
  cha: 5
resistances: [Poison]
immunities: [Charmed, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Stony Lethargy
    description: "When a creature starts its turn within 10 feet of the spirit, the spirit can target it with magical energy if the spirit can see it. _Wisdom Saving Throw:_ DC $(attributes.spellcasting.save), the target. _Failure:_ Until the start of its next turn, the target can’t make Opportunity Attacks, and its Speed is halved."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 4) / 2)) Slam attacks."
  - name: Slam
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.str.mod)) + $(local.maxLevel || 4) Bludgeoning damage."
