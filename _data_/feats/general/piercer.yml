id: piercer
name: Piercer
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Puncture
    type: Extra
    target: weaponAttack AND piercingDamage
    description: On a hit, you can reroll one of the attack's damage dice, and you must use the new roll.
  - name: Enhanced Critical
    type: Extra
    target: weaponAttack AND piercingDamage
    description: On a Critical Hit, you can roll one additional damage die.