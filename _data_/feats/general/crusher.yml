id: crusher
name: Crusher
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Push
    type: Extra
    target: weaponAttack AND bludgeoningDamage
    description: "On a hit, you can move the target 5 feet to an unoccupied space if the target is no more than one size larger than you."
  - name: Enhanced Critical
    type: Extra
    target: weaponAttack AND bludgeoningDamage
    description: "On a Critical Hit, attack rolls against the target have Advantage until the start of your next turn."
