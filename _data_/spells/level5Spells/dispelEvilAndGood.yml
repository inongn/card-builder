id: dispelEvilAndGood
type: Activity
name: Dispel Evil and Good
resource: level5SpellSlot
tags: [level5Spell, abjuration, cleric, paladin, saveSpell]
time: action
range: self
duration: concentration, up to 1 minute
description: |
  For the duration, Celestials, Elementals, Fey, Fiends, and Undead have Disadvantage on attack rolls against you. You can end the spell early by using either of the following special functions.

  **Break Enchantment.** As a Magic action, you touch a creature that is possessed by or has the Charmed or Frightened condition from one or more creatures of the types above. The target is no longer possessed, Charmed, or Frightened by such creatures.

  **Dismissal.** As a Magic action, you target one creature you can see within 5 feet of you that has one of the creature types above. The target must succeed on a DC $(attributes.spellcasting.save) Charisma saving throw or be sent back to its home plane if it isn’t there already. If they aren’t on their home plane, Undead are sent to the Shadowfell, and Fey are sent to the Feywild.

