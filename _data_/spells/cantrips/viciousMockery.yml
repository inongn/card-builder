id: viciousMockery
type: Activity
name: Vicious Mockery
tags: [enchantment, cantrip, bard, saveSpell, damageSpell, psychicDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  You unleash a string of insults laced with subtle enchantments at one creature you can see or hear within range. The target must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or take $(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)d6 Psychic damage and have Disadvantage on the next attack roll it makes before the end of its next turn.

