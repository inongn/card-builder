id: armsOfHadar
type: Activity
name: Arms of Hadar
resource: level1SpellSlot
tags: [level1Spell, conjuration, warlock, saveSpell, damageSpell, necroticDamage]
time: action
range: self
duration: instantaneous
description: |
  Invoking Hadar, you cause tendrils to erupt from yourself. Each creature in a 10-foot Emanation originating from you makes a DC $(attributes.spellcasting.save) Strength saving throw. On a failed save, a target takes 2d6 Necrotic damage and can’t take Reactions until the start of its next turn. On a successful save, a target takes half as much damage only.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d6 for each spell slot level above 1.
