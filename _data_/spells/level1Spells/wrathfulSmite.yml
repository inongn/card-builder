id: wrathfulSmite
type: Activity
name: Wrathful Smite
resource: level1SpellSlot
tags: [level1Spell, necromancy, paladin, saveSpell, damageSpell, necroticDamage]
time: bonus action
range: self
duration: 1 minute
description: |
  Immediately after hitting a creature with a Melee weapon or an Unarmed Strike, the target takes an extra 1d6 Necrotic damage from the attack, and it must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or have the Frightened condition until the spell ends. At the end of each of its turns, the Frightened target repeats the save, ending the spell on itself on a success.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d6 for each spell slot level above 1.
