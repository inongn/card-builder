id: colorSpray
type: Activity
name: Color Spray
resource: level1SpellSlot
tags: [level1Spell, illusion, bard, sorcerer, wizard, saveSpell]
time: action
range: self
duration: instantaneous
description: |
  You launch a dazzling array of flashing, colorful light. Each creature in a 15-foot Cone originating from you must succeed on a DC $(attributes.spellcasting.save) Constitution saving throw or have the Blinded condition until the end of your next turn.

