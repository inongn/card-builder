id: sleep
type: Activity
name: Sleep
resource: level1SpellSlot
tags: [level1Spell, enchantment, bard, sorcerer, wizard, saveSpell, damageSpell]
time: action
range: 60 feet
duration: concentration, up to 1 minute
description: |
  Each creature of your choice in a 5-foot-radius Sphere centered on a point within range must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or have the Incapacitated condition until the end of its next turn, at which point it must repeat the save. If the target fails the second save, the target has the Unconscious condition for the duration. The spell ends on a target if it takes damage or someone within 5 feet of it takes an action to shake it out of the spell’s effect.

  Creatures that don’t sleep, such as elves, or that have Immunity to the Exhaustion condition automatically succeed on saves against this spell.

