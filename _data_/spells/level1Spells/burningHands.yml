id: burningHands
type: Activity
name: Burning Hands
resource: level1SpellSlot
tags: [level1Spell, evocation, sorcerer, wizard, saveSpell, damageSpell, fireDamage]
time: action
range: self
duration: instantaneous
description: |
  A thin sheet of flames shoots forth from you. Each creature in a 15-foot Cone makes a DC $(attributes.spellcasting.save) Dexterity saving throw, taking 3d6 Fire damage on a failed save or half as much damage on a successful one.

  Flammable objects in the Cone that aren’t being worn or carried start burning.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d6 for each spell slot level above 1.
