id: hellishRebuke
type: Activity
name: Hellish Rebuke
resource: level1SpellSlot
tags: [level1Spell, evocation, warlock, saveSpell, damageSpell, fireDamage]
time: reaction
range: 60 feet
duration: instantaneous
description: |
  Immediately after taking damage from a creature that you can see within 60 feet of yourself, the creature that damaged you is momentarily surrounded by green flames. It makes a DC $(attributes.spellcasting.save) Dexterity saving throw, taking 2d10 Fire damage on a failed save or half as much damage on a successful one.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d10 for each spell slot level above 1.
