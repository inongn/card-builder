id: elminstersEffulgentSpheres
type: Activity
name: Elminster's Effulgent Spheres
resource: level6SpellSlot
tags: [level6Spell, evocation, druid, sorcerer, wizard, attackSpell, damageSpell, fireDamage, coldDamage, acidDamage, lightningDamage, thunderDamage]
time: action
range: self
duration: 1 hour
description: |
  Six chromatic spheres orbit you for the duration.

  While the spheres are present, you can expend spheres to create the following effects:

  **Absorb Energy.** When you take Acid, Cold, Fire, Lightning, or Thunder damage, you can take a Reaction to expend one sphere and give yourself Resistance to the triggering damage type until the start of your next turn.

  **Energy Blast.** As a Bonus Action, you send one sphere hurtling toward a target within 120 feet of yourself. Make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack. On a hit, the target takes 3d6 Acid, Cold, Fire, Lightning, or Thunder damage (your choice). Regardless of whether you hit, the sphere is expended.

  The spell ends early if you have no more spheres remaining.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The number of spheres increases by 1 for every spell slot level above 6.
