id: enhanceAbility
type: Activity
name: Enhance Ability
resource: level2SpellSlot
tags: [level2Spell, transmutation, artificer, bard, cleric, druid, ranger, sorcerer, wizard]
time: action
range: touch
duration: concentration, up to 1 hour
description: |
  You touch a creature and choose Strength, Dexterity, Intelligence, Wisdom, or Charisma. For the duration, the target has Advantage on ability checks using the chosen ability.
extra:
  - name: Using a Higher-Level Spell Slot
    description: You can target one additional creature for each spell slot level above 2. You can choose a different ability for each target.
