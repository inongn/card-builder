id: shatter
type: Activity
name: Shatter
resource: level2SpellSlot
tags: [level2Spell, evocation, bard, sorcerer, wizard, saveSpell, damageSpell, thunderDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  A loud noise erupts from a point of your choice within range. Each creature in a 10-foot-radius Sphere centered there makes a DC $(attributes.spellcasting.save) Constitution saving throw, taking 3d8 Thunder damage on a failed save or half as much damage on a successful one. A Construct has Disadvantage on the save.

  A nonmagical object that isn’t being worn or carried also takes the damage if it’s in the spell’s area.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d8 for each spell slot level above 2.
