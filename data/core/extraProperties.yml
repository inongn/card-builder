id: extraProperties
name: Extra Properties
type: Folder
children:
  - type: Extra
    target: ritual
    id: ritual
    name: Ritual
    description: "You can cast this spell as a Ritual instead. The Ritual version of a spell takes 10 minutes longer to cast, and doesn't expend a Spell Slot."
  - type: Extra
    target: weaponAttack and light
    id: light
    name: Light
    description: "You can make an additional attack with a Light weapon as a Bonus Action. You do not add your Ability Modifier to the attack's damage roll."
  - id: unarmed
    target: unarmed
    type: Extra
    name: Grapple or Shove
    description: "You can replace one attack with a grapple or shove attempt. The target must succeed on a DC $(8+attributes.prof+Math.max(stats.str.mod, stats.dex.mod)) Dexterity saving throw or it has the Grappled or Prone condition."
    
  