id: unarmed
name: "Unarmed Strike"
type: Activity
tags: [simple, melee, unarmed, weaponAttack, bludgeoningDamage]
time: action
range: 5 feet
description: |
  You strike with a punch, kick, head-butt or similar forceful blow. Choose one of the following options:
  
  *Damage:* Make a $(formatBonus(attributes.melee.attack)) attack against the target. On a hit, the target takes 1d4$(formatBonus(attributes.melee.bonus)) Bludgeoning damage.
  
  *Grapple:*  The target must succeed on a DC $(8+attributes.prof+Math.max(stats.str.mod, stats.dex.mod)) Dexterity saving throw or it has the Grappled condition.
  
  *Shove:*  The target must succeed on a DC $(8+attributes.prof+Math.max(stats.str.mod, stats.dex.mod)) Dexterity saving throw or it has the Prone condition.