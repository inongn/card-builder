type: Folder
id: coreActions
name: Core Actions
children:
  - id: coreActions
    type: Activity
    time: action
    range: Self
    duration: Instantaneous
    name: Combat Actions
    description: |
      You take one of the following actions:

      **Dash.** You gain extra movement for the current turn. Your Speed increases by $(attributes.movement.walk).
      
      **Disengage.** Your movement doesn't provoke Opportunity Attacks for the rest of the current turn.
      
      **Hide.** You try to conceal yourself while you're Heavily Obscured or behind Three-Quarters Cover or Total Cover. Make a $(formatBonus(skills.stealth.bonus)) DC 15 Dexterity (Stealth) check. On a succesful check, you have the Invisible condition until you make a sound louder than a whisper, an enemy finds you, you make an attack roll, or you cast a spell with a Verbal component. 
      
      **Dodge.** Until the start of your next turn, any attack roll made against you has Disadvantage if you can see the attacker, and you make Dexterity saving throws with Advantage.

  - id: offHand
    name: "Off-Hand Attack: $(attributes.offHand.name)"
    type: Activity
    condition: $(attributes.offHand)
    tags: [$(attributes.offHand.category), $(attributes.offHand.classification), $(attributes.offHand.mastery), $(attributes.offHand.property), attack, offHand, weaponAttack]
    time: bonus action
    range: $(attributes.offHand.range)
    description: "You strike at a creature or object within range. Make a $(formatBonus(attributes[attributes.offHand.classification].attack)) attack against the target. On a hit, the target takes $(attributes.offHand.damageRoll) $(attributes.offHand.damageType) damage."

  - id: mainHand
    name: "Attack: $(attributes.mainHand.name)"
    type: Activity
    tags: [$(attributes.mainHand.category), $(attributes.mainHand.classification), $(attributes.mainHand.mastery), $(attributes.mainHand.property), attack, mainHand, weaponAttack]
    time: action
    range: $(attributes.mainHand.range)
    description: "You strike at a creature or object within range. Make a $(formatBonus(attributes[attributes.mainHand.classification].attack)) attack against the target. On a hit, the target takes $(attributes.mainHand.damageRoll)$(formatBonus(attributes[attributes.mainHand.classification].bonus)) $(attributes.mainHand.damageType) damage."