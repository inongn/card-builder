type: Folder
id: coreActions
name: Core Actions
children:
  - id: dash
    type: Activity
    time: action
    range: Self
    duration: Instantaneous
    name: Dash
    description: |
      You gain extra movement for the current turn. Your Speed increases by $(attributes.movement.walk).
      
  - id: disengage
    type: Activity
    time: action
    range: Self
    duration: Instantaneous
    name: Disengage
    description: |
      Your movement doesn't provoke Opportunity Attacks for the rest of the current turn.
  - id: hide
    type: Activity
    time: action
    range: Self
    duration: Instantaneous
    name: Hide
    description: |
      You try to conceal yourself while you're Heavily Obscured or behind Three-Quarters Cover or Total Cover. Make a DC 15 Dexterity (Stealth) check. On a succesful check, you have the Invisible condition util you maek a sound louder than a whisper, an enemy finds you, you make an attack roll, or you cast a spell with a Verbal component. 
