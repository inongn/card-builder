type: Folder
id: coreActions
name: Core Actions
children:
  - id: coreActions
    type: Activity
    time: action
    range: Self
    duration: Instantaneous
    name: Combat Actions
    description: |
      You take one of the following actions:

      **Dash.** You gain extra movement for the current turn. Your Speed increases by $(attributes.movement.walk).
      
      **Disengage.** Your movement doesn't provoke Opportunity Attacks for the rest of the current turn.
      
      **Hide.** You try to conceal yourself while you're Heavily Obscured or behind Three-Quarters Cover or Total Cover. Make a $(formatBonus(skills.stealth.bonus)) DC 15 Dexterity (Stealth) check. On a succesful check, you have the Invisible condition util you maek a sound louder than a whisper, an enemy finds you, you make an attack roll, or you cast a spell with a Verbal component. 
      
      **Dodge.** Until the start of your next turn, any attack roll made against you has Disadvantage if you can see the attacker, and you make Dexterity saving throws with Advantage.
