type: Folder
id: coreActions
name: Core Actions
children:

  - id: dash
    name: Dash
    type: Activity
    time: action
    range: self
    duration: instantaneous
    description: |
      You gain extra movement for the current turn. Your Speed increases by $(attributes.movement.walk).

  - id: disengage
    name: Disengage
    type: Activity
    time: action
    range: self
    duration: instantaneous
    description: |
      Your movement doesn't provoke Opportunity Attacks for the rest of the current turn.

  - id: hide
    name: Hide
    type: Activity
    time: action
    range: self
    duration: instantaneous
    description: |
      You try to conceal yourself while you're Heavily Obscured or behind Three-Quarters Cover or Total Cover. Make a $(formatBonus(skills.stealth.bonus)) DC 15 Dexterity (Stealth) check. On a succesful check, you have the Invisible condition until you make a sound louder than a whisper, an enemy finds you, you make an attack roll, or you cast a spell with a Verbal component.

  - id: dodge
    name: Dodge
    type: Activity
    time: action
    range: self
    duration: 1 round
    description: |
      Any attack roll made against you has Disadvantage if you can see the attacker, and you make Dexterity saving throws with Advantage.

  - id: offHand
    name: "Off-Hand Attack: $(attributes.offHand.name)"
    type: Activity
    condition: $(attributes.offHand.name)
    tags: [$(attributes.offHand.category), $(attributes.offHand.classification), $(attributes.offHand.mastery), $(attributes.offHand.property), attack, offHand, weaponAttack, $(attributes.offHand.damageType)Damage]
    time: bonus action
    range: $(attributes.offHand.range)
    description: "You strike at a creature or object within range with your weapon. Make a $(formatBonus(attributes[attributes.offHand.classification].attack)) attack against the target. On a hit, the target takes $(attributes.offHand.damageRoll) $(attributes.offHand.damageType) damage."

  - id: mainHand
    name: "Attack: $(attributes.mainHand.name)"
    condition: $(attributes.mainHand.name)
    type: Activity
    tags: [$(attributes.mainHand.category), $(attributes.mainHand.classification), $(attributes.mainHand.mastery), $(attributes.mainHand.property), attack, mainHand, weaponAttack, $(attributes.mainHand.damageType)Damage]
    time: action
    range: $(attributes.mainHand.range)
    description: |
      You strike $(attributes.mainHand.attacks == 4 ? 'four times' : attributes.mainHand.attacks == 3 ? 'three times' : attributes.mainHand.attacks == 2 ? 'twice' : 'at a creature or object within range') with $(attributes.mainHand.name == 'Unarmed Strike' ? 'a punch, kick, head-butt or similar forceful blow' : 'your weapon').$(attributes.mainHand.attacks > 1 ? ' You can strike at one target within range or several.' : '') Make a $(formatBonus(attributes[attributes.mainHand.classification].attack)) attack $(attributes.mainHand.attacks > 1 ? 'for each strike' : 'against the target'). On a hit, the target takes $(attributes.mainHand.damageRoll)$(formatBonus(attributes[attributes.mainHand.classification].bonus)) $(attributes.mainHand.damageType) damage.

  - id: opportunityAttack
    name: "Opportunity Attack: $(attributes.mainHand.name)"
    type: Activity
    condition: $(attributes.mainHand.name)
    tags: [$(attributes.mainHand.category), $(attributes.mainHand.classification), $(attributes.mainHand.mastery), $(attributes.mainHand.property), attack, weaponAttack, $(attributes.mainHand.damageType)Damage]
    time: reaction
    range: $(attributes.mainHand.range)
    description: "When a creature leaves range, you strike at it with $(attributes.mainHand.name == 'Unarmed Strike' ? 'a punch, kick, head-butt or similar forceful blow' : 'your weapon'). Make a $(formatBonus(attributes[attributes.mainHand.classification].attack)) attack against the target$(attributes.mainHand.attacks > 1 ? ' for each strike' : ''). On a hit, the target takes $(attributes.mainHand.damageRoll)$(formatBonus(attributes[attributes.mainHand.classification].bonus)) $(attributes.mainHand.damageType) damage."

  - id: study
    name: "Study"
    type: Activity
    time: action
    range: self
    duration: instantaneous
    description: |
      You make an Intelligence check to study your memory, a book, a clue, or another source of knowledge and call to mind an important piece of information about it.

      **Arcana ($(formatBonus(skills.arcana.bonus))).** Spells, magic items, eldritch symbols, magical traditions, planes of existence, and certain creatures (Aberrations, Constructs, Elementals, Fey, and Monstrosities)

      **History ($(formatBonus(skills.history.bonus))).** Historic events and people, ancient civilizations, wars, and certain creatures (Giants and Humanoids)

      **Investigation ($(formatBonus(skills.investigation.bonus))).** Traps, ciphers, riddles, and gadgetry

      **Nature ($(formatBonus(skills.nature.bonus))).** Terrain, flora, weather, and certain creatures (Beasts, Dragons, Oozes, and Plants)

      **Religion ($(formatBonus(skills.religion.bonus))).** Deities, religious hierarchies and rites, holy symbols, cults, and certain creatures (Celestials, Fiends, and Undead)

  - id: search
    name: "Search"
    type: Activity
    time: action
    range: self
    duration: instantaneous
    description: |
      You make a Wisdom check to discern something that isn't obvious. 

      **Insight ($(formatBonus(skills.insight.bonus))).** Creature's state of mind

      **Medicine ($(formatBonus(skills.medicine.bonus))).** Creature's ailment or cause of death

      **Perception ($(formatBonus(skills.perception.bonus))).** Concealed creature or object

      **Survival ($(formatBonus(skills.survival.bonus))).** Tracks or food

  - id: influence
    name: "Influence"
    type: Activity
    time: action
    range: self
    duration: instantaneous
    description: |
      You make a Wisdom or Charisma check to urge a creature or group of creatures to do something. 

      **Deception ($(formatBonus(skills.deception.bonus))).** Lie

      **Intimidation ($(formatBonus(skills.intimidation.bonus))).** Threaten

      **Performance ($(formatBonus(skills.performance.bonus))).** Entertain

      **Persuasion ($(formatBonus(skills.persuasion.bonus))).** Persuade

      **Animal Handling ($(formatBonus(skills.animal_handling.bonus))).** Control or train a Beast