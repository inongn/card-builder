type: Folder
children:
  - type: Slot
    variables:
      maxLevel: '$(meta.level >= 9 ? 5 : meta.level >= 7 ? 4 : meta.level >= 5 ? 3 : meta.level >= 3 ? 2 : 1)'
    target: 'spell AND $(meta.class) $(local.maxLevel < 5 ? ''NOT level5Spell'' : '''') $(local.maxLevel < 4 ? ''NOT level4Spell'' : '''') $(local.maxLevel < 3 ? ''NOT level3Spell'' : '''') $(local.maxLevel < 2 ? ''NOT level2Spell'' : '''')'
    quantity: $(progression(2, 3, 4, 5, 6, 7, 8, 9, 10, 10, 11, 11))
  - type: Reference
    target: pactMagicSpellSlot
id: data.core.spellcasting.caster types.pactCaster
