type: Statblock
name: Celestial Spirit (Defender)
tags: [summon]
id: celestialSpiritDefender
size: Large
category: summon
classification: Celestial
ac: "$(13 + (local.maxLevel || 5))"
hp: "$(40 + 10 * ((local.maxLevel || 5) - 5))"
movement:
  walk: 30
  fly: 40
stats:
  str: 16
  dex: 14
  con: 16
  int: 10
  wis: 14
  cha: 16
resistances: [Radiant]
immunities: [Charmed, Frightened]
senses:
  darkvision: 60
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 5) / 2)) Radiant Mace attacks."
  - name: Radiant Mace
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d10$(formatBonus(stats.str.mod)) + $(local.maxLevel || 5) Radiant damage, and the spirit can choose itself or another creature it can see within 10 feet of the target. The chosen creature gains 1d10 Temporary Hit Points."
  - name: Healing Touch (1/Day)
    description: "The spirit touches another creature. The target regains Hit Points equal to 2d8 + $(local.maxLevel || 5)."
