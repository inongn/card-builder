type: Statblock
name: Fiendish Spirit (Demon)
tags: [summon]
id: fiendishSpiritDemon
size: Large
classification: Fiend
ac: "$(12 + (local.maxLevel || 6))"
hp: "$(50 + 15 * ((local.maxLevel || 6) - 6))"
movement:
  walk: 40
  climb: 40
stats:
  str: 13
  dex: 16
  con: 15
  int: 10
  wis: 10
  cha: 16
resistances: [Fire]
immunities: [Poison, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Death Throes
    description: "When the spirit drops to 0 Hit Points or the spell ends, the spirit explodes. _Dexterity Saving Throw:_ DC $(attributes.spellcasting.save), each creature in a 10-foot Emanation originating from the spirit. _Failure:_ 2d10 + $(local.maxLevel || 6) Fire damage. _Success:_ Half damage."
  - name: Magic Resistance
    description: "The spirit has Advantage on saving throws against spells and other magical effects."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 6) / 2)) Bite attacks."
  - name: Bite
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d12$(formatBonus(stats.dex.mod)) + $(local.maxLevel || 6) Necrotic damage."
