tags: [otherworldlySteed, findSteedActivity]
type: Activity
name: "Find Steed: Celestial"
id: celestialSteed
time: action
resource: level2SpellSlot
range: 10 feet
duration: 1 hour
description: |
  You summon an otherworldly celestial that appears as a loyal steed.

  > **Armor Class** $(10 + 1*local.maxLevel)
  >
  > **Hit Points** $(5 + 10*local.maxLevel)
  >
  > **Speed** 60 ft., $(local.maxLevel >= 4 ? 'fly 60 ft.' : '')
  >
  >---
  >
  >| STR | DEX | CON | INT | WIS | CHA |
  >|-----|-----|-----|-----|-----|-----|
  >| 18 | 12 | 14 | 6 | 12 | 8 |
  >
  >---
  >
  > **Life Bond** When you regain Hit Points from a level 1+ spell, the steed regains the same number of Hit Points if you’re within 5 feet of it.
  >
  >---
  >
  > **Otherworldly Slam** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + $(local.maxLevel) Radiant damage.
  >
  >---
  >
  > **(Bonus Action) Healing Touch (Recharges after a Long Rest)** One creature within 5 feet of the steed regains a number of Hit Points equal to 2d8 + $(local.maxLevel).