type: Statblock
name: Undead Spirit
id: undeadSpirit
category: summon
tags: [summon]
size: Medium
classification: Undead
ac: 11 + the spell's level
hp: 30 (Ghostly and Putrid only) or 20 (Skeletal only) + 10 for each spell level above 3
movement:
  walk: 30
  fly: (hover; Ghostly only) 40
stats:
  str: 12
  dex: 16
  con: 15
  int: 4
  wis: 10
  cha: 9
immunities: [Necrotic, Poison, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
challenge: 0
cr: 0
traits:
  - name: Festering Aura (Putrid Only)
    description: "_Constitution Saving Throw:_ DC $(attributes.spellcasting.save), any creature (other than you) that starts its turn within a 5-foot Emanation originating from the spirit. _Failure:_ The creature has the Poisoned condition until the start of its next turn."
  - name: Incorporeal Passage (Ghostly Only)
    description: "The spirit can move through other creatures and objects as if they were Difficult Terrain. If it ends its turn inside an object, it is shunted to the nearest unoccupied space and takes 1d10 Force damage for every 5 feet traveled."
actions:
  - name: Multiattack
    description: "The spirit makes a number of attacks equal to half this spell’s level (round down)."
  - name: Deathly Touch (Ghostly Only)
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.dex.mod)) + the spell’s level Necrotic damage, and the target has the Frightened condition until the end of its next turn."
  - name: Grave Bolt (Skeletal Only)
    description: "_Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, range 150 ft. _Hit:_ 2d4$(formatBonus(stats.dex.mod)) + the spell’s level Necrotic damage."
  - name: Rotting Claw (Putrid Only)
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d6$(formatBonus(stats.dex.mod)) + the spell’s level Slashing damage. If the target has the Poisoned condition, it has the Paralyzed condition until the end of its next turn."
