type: Statblock
name: Bestial Spirit (Air)
tags: [summon]
id: bestialSpiritAir
size: Medium
category: summon
classification: Beast
ac: "$(11 + (local.maxLevel || 2))"
hp: "$(20 + 10 * ((local.maxLevel || 2) - 2))"
movement:
  walk: 30
  fly: 60
stats:
  str: 18
  dex: 11
  con: 16
  int: 4
  wis: 14
  cha: 5
senses:
  darkvision: 60
traits:
  - name: Flyby
    description: "The spirit doesn't provoke Opportunity Attacks when it flies out of an enemy's reach."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 2) / 2)) Rend attacks."
  - name: Rend
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.str.mod)) + $(local.maxLevel || 2) Piercing damage."
