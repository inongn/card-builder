type: Statblock
name: Undead Spirit (Ghostly)
tags: [summon]
id: undeadSpiritGhostly
size: Medium
category: summon
classification: Undead
ac: "$(11 + (local.maxLevel || 3))"
hp: "$(30 + 10 * ((local.maxLevel || 3) - 3))"
movement:
  walk: 30
  fly: 40
stats:
  str: 12
  dex: 16
  con: 15
  int: 4
  wis: 10
  cha: 9
immunities: [Necrotic, Poison, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
traits:
  - name: Incorporeal Passage
    description: "The spirit can move through other creatures and objects as if they were Difficult Terrain. If it ends its turn inside an object, it is shunted to the nearest unoccupied space and takes 1d10 Force damage for every 5 feet traveled."
actions:
  - name: Multiattack
    description: "The spirit makes $(Math.floor((local.maxLevel || 3) / 2)) Deathly Touch attacks."
  - name: Deathly Touch
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.dex.mod)) + $(local.maxLevel || 3) Necrotic damage, and the target has the Frightened condition until the end of its next turn."
