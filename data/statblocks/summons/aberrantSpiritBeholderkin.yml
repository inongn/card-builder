type: Statblock
name: Aberrant Spirit (Beholderkin)
tags: [summon]
id: aberrantSpiritBeholderkin
size: Medium
category: summon
classification: Aberration
ac: "$(11 + (local.maxLevel || 4))"
hp: "$(40 + 10 * ((local.maxLevel || 4) - 4))"
movement:
  walk: 30
  fly: 30
stats:
  str: 16
  dex: 10
  con: 15
  int: 16
  wis: 10
  cha: 6
senses:
  darkvision: 60
actions:
