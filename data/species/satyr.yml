id: satyr
name: Satyr
tags:
- species
description: "Originating in the Feywild\u2014a realm of pure emotion-satyrs thrive\
  \ on the energy of merriment. They resemble elves but have goatlike legs, cloven\
  \ hooves, and ram or goat horns. The magic of the fey realm has given them an innate\
  \ ability to perform, to delight, and to resist magical intrusion. While they're\
  \ usually found in the Feywild, satyrs do wander to other planes of existence, most\
  \ often to the Material Plane. There they seek to bring a bit of their home plane's\
  \ splendor to other worlds.\n"
