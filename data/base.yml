id: base
type: Folder
tags:
  - base
children:
  - id: name
    name: Name
    type: Input
    subtype: text
    default: ''
  - id: level
    type: Input
    name: Level
    subtype: number
    default: 1
    min: 1
    max: 20
  - id: allocated_str
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: allocated_dex
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: allocated_con
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: allocated_int
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: allocated_wis
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: allocated_cha
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: origin_str
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: origin_dex
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: origin_con
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: origin_int
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: origin_wis
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: origin_cha
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: asi_str
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: asi_dex
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: asi_con
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: asi_int
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: asi_wis
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: asi_cha
    type: Input
    subtype: number
    default: 0
    min: 0
  - id: str
    type: Stat
    score: $(8 + meta.allocated_str + meta.origin_str + meta.asi_str)
    mod: $(Math.floor((stats.str.score - 10) / 2))
  - id: dex
    type: Stat
    score: $(8 + meta.allocated_dex + meta.origin_dex + meta.asi_dex)
    mod: $(Math.floor((stats.dex.score - 10) / 2))
  - id: con
    type: Stat
    score: $(8 + meta.allocated_con + meta.origin_con + meta.asi_con)
    mod: $(Math.floor((stats.con.score - 10) / 2))
  - id: int
    type: Stat
    score: $(8 + meta.allocated_int + meta.origin_int + meta.asi_int)
    mod: $(Math.floor((stats.int.score - 10) / 2))
  - id: wis
    type: Stat
    score: $(8 + meta.allocated_wis + meta.origin_wis + meta.asi_wis)
    mod: $(Math.floor((stats.wis.score - 10) / 2))
  - id: cha
    type: Stat
    score: $(8 + meta.allocated_cha + meta.origin_cha + meta.asi_cha)
    mod: $(Math.floor((stats.cha.score - 10) / 2))
  - id: pointBuyLimit
    type: Attribute
    value: 21
  - id: pointBuyScoreLimit
    type: Attribute
    value: 7
  - id: originPoolLimit
    type: Attribute
    value: 3
  - id: originScoreLimit
    type: Attribute
    value: 2
  - id: asiPoolLimit
    type: Attribute
    value: 0
  - id: originEligible
    type: Attribute
    value: []
  - id: hitDie
    type: Attribute
    value: 6
  - id: hp
    type: Attribute
    value: $(attributes.hitDie + stats.con.mod + (meta.level - 1) * (Math.floor(attributes.hitDie / 2) + 1 + stats.con.mod))
  - id: ac
    type: Attribute
    value: $(10 + stats.dex.mod)
  - id: initiative
    type: Attribute
    value: $(stats.dex.mod)
  - id: prof
    type: Attribute
    value: $(Math.floor(1 + (meta.level + 3) / 4))
  - id: proficiencies
    type: Attribute
    value: []
  - id: senses
    type: Attribute
    value: 
      darkvision:
      tremorsense:
      blindsight:
      truesight:
  - id: movement
    type: Attribute
    value:
      walk: 30
      burrow: 0
      climb: 0
      fly: 0
      swim: 0
  - id: resistances
    type: Attribute
    value: []
  - id: immunities
    type: Attribute
    value: []
  - id: advantages
    type: Attribute
    value: []
  - id: tools
    type: Attribute
    value: []
  - id: spellcasting
    type: Attribute
    value:
      attack: ''
      save: ''
      bonus: ''
  - id: melee
    type: Attribute
    value:
      attack: $(attributes.prof + stats.str.mod)
      bonus: $(stats.str.mod)
  - id: ranged
    type: Attribute
    value:
      attack: $(attributes.prof + stats.dex.mod)
      bonus: $(stats.dex.mod)
  - id: finesse
    type: Attribute
    value:
      attack: $(attributes.prof + (Math.max(stats.dex.mod, stats.str.mod)))
      bonus: $(Math.max(stats.dex.mod, stats.str.mod))
  - id: thrown
    type: Attribute
    value:
      attack: $(attributes.prof + stats.str.mod)
      bonus: $(stats.str.mod)
  - id: acrobatics
    name: Acrobatics
    type: Skill
    stat: dex
    proficiency: 0
    bonus: $(stats.dex.mod + attributes.prof * skills.acrobatics.proficiency)
  - id: animal_handling
    name: Animal Handling
    type: Skill
    stat: wis
    proficiency: 0
    bonus: $(stats.wis.mod + attributes.prof * skills.animal_handling.proficiency)
  - id: arcana
    name: Arcana
    type: Skill
    stat: int
    bonus: $(stats.int.mod + attributes.prof * skills.arcana.proficiency)
    proficiency: 0
  - id: athletics
    name: Athletics
    type: Skill
    stat: str
    bonus: $(stats.str.mod + attributes.prof * skills.athletics.proficiency)
    proficiency: 0
  - id: deception
    name: Deception
    type: Skill
    stat: cha
    bonus: $(stats.cha.mod + attributes.prof * skills.deception.proficiency)
    proficiency: 0
  - id: history
    name: History
    type: Skill
    stat: int
    bonus: $(stats.int.mod + attributes.prof * skills.history.proficiency)
    proficiency: 0
  - id: insight
    name: Insight
    type: Skill
    stat: wis
    bonus: $(stats.wis.mod + attributes.prof * skills.insight.proficiency)
    proficiency: 0
  - id: intimidation
    name: Intimidation
    type: Skill
    stat: cha
    bonus: $(stats.cha.mod + attributes.prof * skills.intimidation.proficiency)
    proficiency: 0
  - id: investigation
    name: Investigation
    type: Skill
    stat: int
    bonus: $(stats.int.mod + attributes.prof * skills.investigation.proficiency)
    proficiency: 0
  - id: medicine
    name: Medicine
    type: Skill
    stat: wis
    bonus: $(stats.wis.mod + attributes.prof * skills.medicine.proficiency)
    proficiency: 0
  - id: nature
    name: Nature
    type: Skill
    stat: int
    bonus: $(stats.int.mod + attributes.prof * skills.nature.proficiency)
    proficiency: 0
  - id: perception
    name: Perception
    type: Skill
    stat: wis
    bonus: $(stats.wis.mod + attributes.prof * skills.perception.proficiency)
    proficiency: 0
  - id: performance
    name: Performance
    type: Skill
    stat: cha
    bonus: $(stats.cha.mod + attributes.prof * skills.performance.proficiency)
    proficiency: 0
  - id: persuasion
    name: Persuasion
    type: Skill
    stat: cha
    bonus: $(stats.cha.mod + attributes.prof * skills.persuasion.proficiency)
    proficiency: 0
  - id: religion
    name: Religion
    type: Skill
    stat: int
    bonus: $(stats.int.mod + attributes.prof * skills.religion.proficiency)
    proficiency: 0
  - id: sleight_of_hand
    name: Sleight of Hand
    type: Skill
    stat: dex
    bonus: $(stats.dex.mod + attributes.prof * skills.sleight_of_hand.proficiency)
    proficiency: 0
  - id: stealth
    name: Stealth
    type: Skill
    stat: dex
    bonus: $(stats.dex.mod + attributes.prof * skills.stealth.proficiency)
    proficiency: 0
  - id: survival
    name: Survival
    type: Skill
    stat: wis
    bonus: $(stats.wis.mod + attributes.prof * skills.survival.proficiency)
    proficiency: 0
  - id: strength
    type: Save
    stat: str
    bonus: $(stats.str.mod + attributes.prof * saves.strength.proficiency)
    proficiency: 0
  - id: dexterity
    type: Save
    stat: dex
    bonus: $(stats.dex.mod + attributes.prof * saves.dexterity.proficiency)
    proficiency: 0
  - id: constitution
    type: Save
    stat: con
    bonus: $(stats.con.mod + attributes.prof * saves.constitution.proficiency)
    proficiency: 0
  - id: intelligence
    type: Save
    stat: int
    bonus: $(stats.int.mod + attributes.prof * saves.intelligence.proficiency)
    proficiency: 0
  - id: wisdom
    type: Save
    stat: wis
    bonus: $(stats.wis.mod + attributes.prof * saves.wisdom.proficiency)
    proficiency: 0
  - id: charisma
    type: Save
    stat: cha
    bonus: $(stats.cha.mod + attributes.prof * saves.charisma.proficiency)
    proficiency: 0

  - id: armor
    type: Slot
    name: Armor
    target: "unarmored OR $(attributes.proficiencies.includes('heavyArmor') ? 'heavyArmor OR mediumArmor OR lightArmor' : attributes.proficiencies.includes('mediumArmor') ? 'mediumArmor OR lightArmor' : '$(attributes.proficiencies.includes('lightArmor') ? 'lightArmor' : '')')"
    quantity: 1


  - id: armamentSlot
    type: Slot
    name: Armament
    target: "simple $(attributes.proficiencies.includes('shieldTraining') ? 'OR shieldEquipment' : '') $(attributes.proficiencies.includes('martialWeapons') ? 'OR martial' : '') $(attributes.proficiencies.includes('lightWeapons') ? 'OR light' : '') $(attributes.proficiencies.includes('finesseWeapons') ? 'OR rapier OR whip' : '') $(attributes.shieldEquipped ? 'NOT twoHanded' : '')"
    quantity: "$(1+(attributes.proficiencies.includes('shieldTraining') ? 1 : 0)+(attributes.proficiencies.includes('lightWeapons') ? 1 : 0)+(attributes.proficiencies.includes('martialWeapons') ? 1 : 0)+(attributes.proficiencies.includes('finesseWeapons') ? 1 : 0))"


  - type: Reference
    reference: [longRest, shortRest, coreActions, weaponProperties, extraProperties, unarmed]

  - type: Resource
    id: hitDice
    name: Hit Dice
    quantity: $(meta.level)

  - type: Slot
    name: Species
    target: species
    quantity: 1

  - id: background
    type: Slot
    name: Background
    target: background
    quantity: 1


  - id: class
    type: Slot
    name: Class
    target: class
    quantity: 1

  

