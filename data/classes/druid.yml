zid: druid
name: Druid
description: |
  Druids belong to ancient orders that call on the forces of nature. Harnessing the magic of animals, plants, and the four elements, Druids heal, transform into animals, and wield elemental destruction.
tags:
  - class
type: Folder
children:
  - id: hitDie
    type: Attribute
    value: 8
  - id: className
    type: Effect
    target: meta.class
    operation: set
    value: Druid
  - type: Reference
    value: [intSave, wisSave]
  - type: Reference
    value: [lightArmorTraining, shieldTraining, simpleWeaponProficiency, herbalismKit]
  - id: druidSkillProficiencies
    type: Slot
    name: Druid Skill Proficiencies
    quantity: 2
    target: arcanaProficiency OR animalHandlingProficiency OR insightProficiency OR medicineProficiency OR natureProficiency OR perceptionProficiency OR religionProficiency OR survivalProficiency
  - id: spellcasting
    type: Reference
    target: [fullCaster, wisCaster]
  - id: druidCantrips
    type: Slot
    name: Druid Cantrips
    quantity: $(progression(2,2,2,3,3,3,3,3,3,4))
    target: cantrip AND druid
  - id: druidSpells
    type: Slot
    name: Druid Spells
    variables:
      maxLevel: '$(meta.level >= 17 ? 9 : meta.level >= 15 ? 8 : meta.level >= 13 ? 7 : meta.level >= 11 ? 6 : meta.level >= 9 ? 5 : meta.level >= 7 ? 4 : meta.level >= 5 ? 3 : meta.level >= 3 ? 2 : 1)'
    target: "druid NOT cantrip $(local.maxLevel < 9 ? 'NOT level9Spell' : '') $(local.maxLevel < 8 ? 'NOT level8Spell' : '') $(local.maxLevel < 7 ? 'NOT level7Spell' : '') $(local.maxLevel < 6 ? 'NOT level6Spell' : '') $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    quantity: $(progression(2, 4, 6, 7, 9, 10, 11, 12, 14, 15, 16, 16, 18, 19, 20, 20, 22, 22, 22, 10))

  - id: speakWithAnimals
    type: Reference
    target: SpeakWithAnimals
    
  - id: primalOrder
    type: Slot
    name: Primal Order
    quantity: 1
    target: primalOrder
    
  
  - id: wildShape
    type: Resource
    name: Channel Nature
    quantity: $(progression(0,2,2,2,2,3,3,3,3,3,3,3,3,3,3,3,4,4,4,4))
    condition: $(meta.level >= 2)

  - id: wildCompanion
    type: Reference
    target: findFamiliar
    condition: $(meta.level >= 2)
     # Level 2: Wild Shape Activity
     
  - id: wildShapeForms
    type: Reference
    target: [wildShapeTemplate]
    condition: $(meta.level >= 2)
  
  - id: wildShapeActivity
    type: Activity
    name: Wild Shape
    time: bonus action
    range: self
    duration: $(meta.level / 2) hours
    resource: wildShape
    condition: $(meta.level >= 2)
    description: |
      You transform into a beast form. You choose whether your equipment falls to the ground, merges into your new form, or is worn by it. While in a form, you retain your personality, memories, and ability to speak, and the following rules apply:

      **Temporary Hit Points.** You gain $(meta.level * 2) Temporary Hit Points.

      **Game Statistics.** Your game statistics are replaced by the Beast's stat block, but you retain your creature type; Hit Points; Hit Point Dice; Intelligence, Wisdom, and Charisma scores.

      **No Spellcasting.** You can't cast spells, but shape-shifting doesn't break your Concentration or otherwise interfere with a spell you've already cast.


  - id: druidSubclass 
    type: Slot
    name: Druid Subclass
    quantity: 1
    target: druidSubclass
    condition: $(meta.level >=3)
    
  - id: level4feat
    name: Level 4 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 4)

  - id: elementalFury
    type: Slot
    name: Elemental Fury
    target:  elementalFury OR classOption
    quantity: 1
    condition: $(meta.level >= 7)

  - id: level8feat
    name: Level 8 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 8)
