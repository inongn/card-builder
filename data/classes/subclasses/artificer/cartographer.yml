id: cartographer
name: Cartographer
description: |
  Cartographers are the premier navigators and reconnaissance agents. Using their creations, Cartographers can highlight threats, safeguard allies, and carve portals to distant locations.
type: Folder
tags:
  - artificerSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Cartographer"

  # Level 3: Tools of the Trade
  - type: Reference
    target: [calligraphersSupplies, cartographersTools]

  # Level 3: Cartographer Spells
  - type: Reference
    target: [faerieFire, guidingBolt, healingWord]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [locateObject, mindSpike]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [callLightning, clairvoyance]
    condition: $(meta.level >= 9)
  - type: Reference
    target: [banishment, locateCreature]
    condition: $(meta.level >= 13)
  - type: Reference
    target: [scrying, teleportationCircle]
    condition: $(meta.level >= 17)

  # Level 3: Adventurer's Atlas
  - id: adventurersAtlas
    type: Activity
    name: "Adventurer's Atlas"
    time: free action
    condition: $(meta.level >= 3)
    description: |
      Whenever you finish a Long Rest while holding Cartographer’s Tools, you can use that tool to create a set of magical maps by touching at least two creatures (one of whom can be yourself), up to a maximum number of $(Math.max(1, stats.int.mod)) creatures.
      
      While carrying the map, a target gains the following benefits:
      
      **Awareness.** The target adds 1d4 to its Initiative rolls.
      
      **Positioning.** The target knows the location of all other map holders that are on the same plane of existence as itself. When casting a spell or creating another effect that requires being able to see the effect’s target, a map holder can target another map holder regardless of sight or cover, so long as the other map holder is still within range.

  # Level 3: Mapping Magic
  - id: portalJump
    type: Activity
    name: "Portal Jump"
    time: free action
    condition: $(meta.level >= 3)
    description: |
      On your turn, you can spend $(Math.floor(attributes.movement.walk / 2)) feet of movement to teleport to an unoccupied space you can see within 10 feet of yourself or within 5 feet of a creature that is within 30 feet of you and holding one of your Adventurer’s Atlas maps. You can’t use this benefit if your Speed is 0.

  - id: illuminatedCartography
    type: Resource
    name: "Illuminated Cartography"
    quantity: "$(Math.max(1, stats.int.mod))"
    condition: $(meta.level >= 3)

  - type: Effect
    target: activities[id=faerieFire].resource
    operation: set
    value: illuminatedCartography
    condition: $(meta.level >= 3)

  # Level 5: Guided Precision
  - id: guidedPrecision
    type: Extra
    name: Guided Precision
    target: faerieFire
    condition: $(meta.level >= 5)
    description: |
      Once per turn, whenever you cast a spell from your Cartographer Spells list or hit a creature affected by your Faerie Fire with an attack roll, you can add $(Math.max(1, stats.int.mod)) to one damage roll of the spell or attack.
      
      In addition, taking damage can’t cause you to lose Concentration on Faerie Fire.
