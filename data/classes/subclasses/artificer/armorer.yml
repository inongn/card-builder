id: armorer
name: Armorer
description: |
  An Armorer modifies armor to function almost like a second skin. The armor is enhanced to hone the Armorer’s magic, unleash potent attacks, and generate a formidable defense.
type: Folder
tags:
  - artificerSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Armorer"

  # Level 3: Tools of the Trade
  - id: armorerToolsOfTheTrade
    type: Extra
    name: Tools of the Trade
    description: |
      You gain training with Heavy armor.
      You gain proficiency with Smith’s Tools. If you already have this tool proficiency, you gain proficiency with one other type of Artisan’s Tools of your choice.

      When you craft nonmagical or magic armor, the amount of time required to craft it is halved.
  - type: Reference
    target: [heavyArmorTraining, smithsTools]

  # Level 3: Armorer Spells
  - type: Reference
    target: [magicMissile, thunderwave]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [mirrorImage, shatter]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [hypnoticPattern, lightningBolt]
    condition: $(meta.level >= 9)
  - type: Reference
    target: [fireShield, greaterInvisibility]
    condition: $(meta.level >= 13)
  - type: Reference
    target: [passwall, wallOfForce]
    condition: $(meta.level >= 17)

  # Level 3: Armor Model Slot
  - id: armorModel
    name: Armor Model
    type: Slot
    target: armorModel
    condition: $(meta.level >= 3)

  # Level 5: Extra Attack
  - id: extraAttack
    type: Extra
    target: weaponAttack
    condition: $(meta.level >= 5)
    name: Extra Attack
    description: "You can attack twice instead of once whenever you take the Attack action on your turn."
