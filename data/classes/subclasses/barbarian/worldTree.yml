id: worldTree
name: Path of the World Tree
description: |
  Barbarians who follow the Path of the World Tree connect with the cosmic tree Yggdrasil through their Rage. This tree grows among the Outer Planes, connecting them to each other and the Material Plane. These Barbarians draw on the tree's magic for vitality and as a means of dimensional travel.
tags:
  - barbarianSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "World Tree"
  # Level 3: Vitality of the Tree — Vitality Surge
  - id: vitalitySurge
    type: Extra
    name: Vitality Surge
    target: rage
    description: "Gain $(meta.level) Temporary Hit Points."

  # Level 3: Vitality of the Tree — Life-Giving Force
  - id: lifeGivingForce
    type: Activity
    name: Life-Giving Force
    time: free action
    range: 10 feet
    duration: Instantaneous
    target: rage
    description: "You tap into the life force of the World Tree. At the start of each of your turns while your Rage is active, choose a creature within range to gain $(attributes.rageDamage)d6 Temporary Hit Points. If any of these Temporary Hit Points remain when your Rage ends, they vanish."

  # Level 6: Branches of the Tree
  - id: branchesOfTheTree
    type: Activity
    name: Branches of the Tree
    time: reaction
    range: 30 feet
    duration: Instantaneous
    condition: $(meta.level >= 6)
    description: "When a creature you can see starts its turn within range while your Rage is active, you summon spectral branches of the World Tree around it. The target must succeed on a DC $(8 + stats.str.mod + attributes.prof) Strength saving throw or be teleported to an unoccupied space you can see within 5 feet of yourself. After it teleports, you can reduce its Speed to 0 until the end of the current turn."
