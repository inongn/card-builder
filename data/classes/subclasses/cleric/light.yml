id: lightDomain
name: Light Domain
description: |
  The Light Domain emphasizes the divine power to bring about blazing fire and revelation. Clerics who wield this power are enlightened souls infused with radiance and the power of their deities’ discerning vision, charged with chasing away lies and burning away darkness.

  The Light Domain is associated with gods of truth, vigilance, beauty, insight, and renewal. Some of these gods are identified with the sun or as charioteers who guide the sun across the sky. Others are sentinels who pierce deception. Some are deities of beauty and artistry who teach that art is a vehicle for the soul’s improvement.
type: Folder
tags:
  - clericSubclass
children:
  # Level 3: Light Domain Spells
  - type: Reference
    target: [burningHands, faerieFire, scorchingRay, seeInvisibility]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [daylight, fireball]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [arcaneEye, wallOfFire]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [flameStrike, scrying]
    condition: $(meta.level >= 9)

  # Level 3: Radiance of the Dawn
  - id: radianceOfTheDawn
    type: Activity
    name: Radiance of the Dawn
    time: action
    range: self
    duration: Instantaneous
    resource: channelDivinity
    condition: $(meta.level >= 3)
    description: "You emit a flash of light in a 30-foot Emmanation originating from yourself. Any magical Darkness in the area is dispelled. Each creature of your choice in the area must make a DC $(attributes.spellcasting.save) Constitution saving throw, taking $(2)d10+$(meta.level) Radiant damage on a failed save, or half as much on a success."

  # Level 3: Warding Flare
  - id: wardingFlare
    type: Activity
    name: Warding Flare
    time: reaction
    range: 30 feet
    duration: Instantaneous
    resource: wardingFlare
    condition: $(meta.level >= 3)
    description: |
      When a creature that you can see within range makes an attack roll, you impose Disadvantage on the roll.
      $(meta.level >= 6 ? "You also give the target of the attack $(2)d6$(formatBonus(stats.wis.mod)) Temporary Hit Points." : "")
  - id: wardingFlare
    type: Resource
    name: Warding Flare
    quantity: $(Math.max(1, stats.wis.mod))
    sr: "$(meta.level >= 6 ? 'all' : 0)"
    condition: $(meta.level >= 3)

  # Level 17: Corona of Light
  - id: coronaOfLight
    type: Activity
    name: Corona of Light
    time: action
    range: self
    duration: 1 minute
    resource: coronaOfLight
    condition: $(meta.level >= 17)
    description: "You emit an aura of sunlight for the duration. You emit Bright Light in a 60-foot radius and Dim Light for an additional 30 feet. Your enemies in the Bright Light have Disadvantage on saving throws against your Radiance of the Dawn and any spell that deals Fire or Radiant damage."
  - id: coronaOfLight
    type: Resource
    name: Corona of Light
    quantity: $(Math.max(1, stats.wis.mod))
    sr: 1
    condition: $(meta.level >= 17)
