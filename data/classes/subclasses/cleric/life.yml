id: lifeDomain
name: Life Domain
description: |
  The Life Domain focuses on the positive energy that helps sustain all life in the multiverse. Clerics who tap into this domain are masters of healing, using that life force to cure many hurts.

  Existence itself relies on the positive energy associated with this domain, so a Cleric of almost any religious tradition might choose it. This domain is particularly associated with agricultural deities, gods of healing or endurance, and gods of home and community. Religious orders of healing also seek the magic of this domain.
type: Folder
tags:
  - clericSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Life"
  # Level 3: Disciple of Life
  - id: discipleOfLife
    type: Extra
    name: Disciple of Life
    target: healingSpell
    condition: $(meta.level >= 3)
    description: "The creature regains an additional $(2+(stats.wis.mod)) Hit Points."

  # Level 3: Life Domain Spells
  - type: Reference
    target: [aid, bless, cureWounds, lesserRestoration]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [massHealingWord, revivify]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [auraOfLife, deathWard]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [greaterRestoration, massCureWounds]
    condition: $(meta.level >= 9)

  # Level 3: Preserve Life
  - id: preserveLife
    type: Activity
    name: Preserve Life
    time: action
    range: 30 feet
    duration: Instantaneous
    resource: channelDivinity
    condition: $(meta.level >= 3)
    description: "You evoke healing energy to restore up to $(5 * meta.level) Hit Points. Choose Bloodied creatures within range and divide the points among them. This can't restore a creature to more than half its Hit Point maximum."

  # Level 6: Blessed Healer
  - id: blessedHealer
    type: Extra
    name: Blessed Healer
    target: healingSpell
    condition: $(meta.level >= 6)
    description: "If you cast this on another creature, you regain $(2+(stats.wis.mod)) Hit Points."
