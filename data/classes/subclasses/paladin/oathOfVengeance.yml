id: oathOfVengeance
name: Oath of Vengeance
description: |
  The Oath of Vengeance is a solemn commitment to punish those who have committed grievously evil acts.
tags:
  - paladinSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Vengeance"
  # Level 3: Oath of Vengeance Spells
  - type: Reference
    target: [bane, huntersMark]
  - type: Reference
    target: [holdPerson, mistyStep]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [haste, protectionFromEnergy]
    condition: $(meta.level >= 9)
  - type: Reference
    target: [banishment, dimensionDoor]
    condition: $(meta.level >= 13)
  - type: Reference
    target: [holdMonster, scrying]
    condition: $(meta.level >= 17)

  # Level 3: Vow of Enmity
  - id: vowOfEnmity
    type: Activity
    name: Vow of Enmity
    time: free action
    range: 30 feet
    duration: 1 minute
    resource: channelDivinity
    description: "When you take the Attack action, you utter a vow of enmity against a creature you can see within range. You have Advantage on attack rolls against the creature for the duration or until you use this feature again. If the creature drops to 0 Hit Points before the vow ends, you can transfer the vow to a different creature within 30 feet of yourself (no action required)."

  # Level 7: Relentless Avenger
  - id: relentlessAvenger
    type: Extra
    target: opportunityAttack
    name: Relentless Avenger
    condition: $(meta.level >= 7)
    description: "On a hit, you can reduce the creature's Speed to 0 until the end of the current turn, then move up to half your Speed as part of the same Reaction without provoking Opportunity Attacks."

  # Level 15: Soul of Vengeance
  - id: soulOfVengeance
    type: Activity
    name: Soul of Vengeance
    time: reaction
    range: self
    duration: Instantaneous
    condition: $(meta.level >= 15)
    description: |
      Immediately after a creature under the effect of your Vow of Enmity hits or misses with an attack roll, you make a melee attack against that creature if it's within range.

  # Level 20: Avenging Angel
  - id: avengingAngel
    type: Activity
    name: Avenging Angel
    time: bonus action
    duration: 10 minutes
    condition: $(meta.level >= 20)
    tags: [innateLR]
    resource: level5SpellSlot
    description: "You gain the benefits below for the duration or until you end them (no action required):"
  - id: avengingAngelFlight
    type: Extra
    name: Flight
    target: avengingAngel
    condition: $(meta.level >= 20)
    description: "You sprout spectral wings on your back and have a Fly Speed of 60 feet, and can hover."
  - id: avengingAngelFrightfulAura
    type: Extra
    name: Frightful Aura
    target: avengingAngel
    condition: $(meta.level >= 20)
    description: "Whenever an enemy starts its turn in your Aura of Protection, that creature must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or have the Frightened condition for 1 minute or until it takes any damage. Attack rolls against the Frightened creature have Advantage."
