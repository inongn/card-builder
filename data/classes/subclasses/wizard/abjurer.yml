id: abjurer
name: Abjurer
description: |
  Your study of magic is focused on spells that block, banish, or protect—ending harmful effects, banishing evil influences, and protecting the weak. Abjurers are sought when baleful spirits require exorcism, when locations must be guarded against magical spying, and when portals to other planes of existence must be closed.
type: Folder
tags:
  - wizardSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Abjurer"

  # Level 3: Arcane Ward
  - id: arcaneWard
    type: Activity
    name: Arcane Ward
    condition: $(meta.level >= 3)
    tags: [limitedLR]
    description: |
      When you cast an Abjuration spell with a spell slot, you weave magic around yourself for protection. You simultaneously use a strand of the spell's magic to create a ward with $(2 * meta.level + stats.int.mod) Hit Points that lasts until you finish a Long Rest. Whenever you take damage, the ward takes the damage instead, and if you have any Resistances or Vulnerabilities, apply them before reducing the ward’s Hit Points. If the damage reduces the ward to 0 Hit Points, you take any remaining damage. While the ward has 0 Hit Points, it can’t absorb damage, but its magic remains. 
      
      Whenever you cast an Abjuration spell with a spell slot, the ward regains a number of Hit Points equal to twice the level of the spell slot. Alternatively, as a Bonus Action, you can expend a spell slot, and the ward regains a number of Hit Points equal to twice the level of the spell slot expended.


  # Level 6: Projected Ward
  - id: projectedWard
    type: Activity
    time: reaction
    range: 30 feet
    name: Projected Ward
    target: arcaneWard
    condition: $(meta.level >= 6)
    description: When a creature that you can see within range takes damage, you cause your Arcane Ward to absorb that damage. If this damage reduces the ward to 0 Hit Points, the warded creature takes any remaining damage. If that creature has any Resistances or Vulnerabilities, apply them before reducing the ward's Hit Points.

  
  # Level 10: Spell Breaker
  - id: spellBreaker
    type: Extra
    name: Spell Breaker
    target: [counterspell, dispelMagic]
    condition: $(meta.level >= 10)
    description: "The spell slot isn't expended if the spell fails to stop a spell."


  # Level 14: Spell Resistance
  - id: spellResistance
    type: Effect
    target: attributes.resistances
    operation: push
    condition: $(meta.level >= 14)
    value: Spell Damage
  - id: spellResistance
    type: Effect
    target: attributes.advantages
    operation: push
    condition: $(meta.level >= 14)
    value: Spell Saves