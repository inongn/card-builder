id: illusionist
name: Illusionist
description: |
  You specialize in magic that dazzles the senses and tricks the mind, and the illusions you craft make the impossible seem real. Most Wizards believe that their counterparts in ancient civilizations knew secrets of magic that have been lost to the ages, and discovering those secrets could unlock the path to a power greater than any magic available in the present age.
type: Folder
tags:
  - wizardSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Illusionist"
  # Level 3: Improved Illusions
  - type: Reference
    target: minorIllusion
    condition: $(meta.level >= 3)
  - id: improvedIllusionsRange
    type: Effect
    target: activities[tags=illusion AND NOT range=self AND NOT range=touch].range
    operation: add
    value: 60
    condition: $(meta.level >= 3)
  - id: improvedIllusionsMinorIllusionTime
    type: Effect
    target: activities[minorIllusion].time
    operation: set
    value: "bonus action"
    condition: $(meta.level >= 3)
  - id: improvedIllusionsExtra
    type: Extra
    name: Improved Illusions
    target: illusion
    condition: $(meta.level >= 3)
    description: "You can cast this spell without Verbal components."

  # Level 6: Phantasmal Creatures
  - type: Reference
    target: [summonBeast, summonFey]
    condition: $(meta.level >= 6)
  - id: phantasmalCreatures
    type: Effect
    target: activities[summonBeastActivity, summonFeyActivity].uses
    condition: $(meta.level >= 6)
    operation: set
    value: 1

  # Level 10: Illusory Self
  - id: illusorySelf
    type: Activity
    name: Illusory Self
    time: reaction
    condition: $(meta.level >= 10)
    resource: level2SpellSlot
    description: "When a creature hits you with an attack roll, you interpose an illusory duplicate of yourself between the attacker and yourself. The attack automatically misses, then the illusion dissipates."
    tags: [innateLR]

  # Level 14: Illusory Reality
  - id: illusoryReality
    type: Activity
    name: Illusory Reality
    time: bonus action
    duration: 1 minute
    condition: $(meta.level >= 14)
    description: "You weave magic into illusions to give them a semi-reality. Choose one inanimate, nonmagical object that is part of an Illusion spell you cast. Make it real for the duration."
