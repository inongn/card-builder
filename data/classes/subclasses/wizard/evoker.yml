id: evoker
name: Evoker
description: |
  Your studies focus on magic that creates powerful elemental effects such as bitter cold, searing flame, rolling thunder, crackling lightning, and burning acid. Some Evokers find employment in military forces, serving as artillery to blast armies from afar. Others use their power to protect others, while some seek their own gain.
type: Folder
tags:
  - wizardSubclass
children:

  # Level 3: Potent Cantrip
  - id: potentCantrip
    type: Extra
    name: Potent Cantrip
    target: cantrip AND damageSpell
    condition: $(meta.level >= 3)
    description: "If the target succeeds on a saving throw against this cantrip, it takes half damage but suffers no additional effect."

  # Level 6: Sculpt Spells
  - id: sculptSpells
    type: Extra
    target: evocation AND saveSpell
    name: Sculpt Spells
    condition: $(meta.level >= 6)
    description: "When you cast this spell, your allies automatically succeed on their saving throw and take no damage if they would normally take half."

  # Level 10: Empowered Evocation
  - id: empoweredEvocation
    type: Extra
    name: Empowered Evocation
    target: evocation AND damageSpell
    condition: $(meta.level >= 10)
    description: "Add $(formatBonus(stats.int.mod)) to one damage roll of the spell."

  # Level 14: Overchannel
  - id: overchannel
    type: Activity
    name: Overchannel
    condition: $(meta.level >= 14)
    description: |
      When you cast a level 1-5 Wizard spell that deals damage, you increase its power to deal maximum damage.
      The first time you do so, you suffer no adverse effect. If you use this feature again before you finish a Long Rest, you take 2d12 Necrotic damage for each level of the spell slot immediately after you cast it. This damage ignores Resistance and Immunity.
