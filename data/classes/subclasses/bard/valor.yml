id: valor
name: College of Valor
description: |
  Bards of the College of Valor are daring storytellers whose tales preserve the memory of the great heroes of the past. These bards sing the deeds of the mighty in vaulted halls or to crowds gathered around great bonfires.
type: Folder
tags:
  - bardSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Valor"
  # Level 3: Combat Inspiration
  - id: combatInspirationExtra
    type: Extra
    name: Combat Inspiration
    target: bardicInspiration
    condition: $(meta.level >= 3)
    description: |
      A creature with a Bardic Inspiration die from you can also use it in one of the following ways:

      **Defense.** When hit by an attack roll, use a Reaction to roll the die and add the result to AC, potentially causing the attack to miss.

      **Offense.** When hitting with an attack roll, use a Reaction to roll the die and add the result to the damage roll.

  # Level 3: Martial Training
  - type: Reference
    condition: $(meta.level >= 3)
    target: [martialWeaponProficiency, mediumArmorTraining, shieldTraining]

  # Level 6: Extra Attack
  - id: extraAttack
    type: Extra
    target: weaponAttack
    condition: $(meta.level >= 5)
    name: Extra Attack
    description: "You can attack twice, instead of once, whenever you take the Attack action on your turn. You can replace one attack with a cantrip that has a casting time of an action."
