id: wildMagic
name: Wild Magic Sorcery
description: |
  Your innate magic stems from the forces of chaos that underlie the order of creation. You or an ancestor might have endured exposure to raw magic, perhaps through a planar portal leading to Limbo or the Elemental Planes. Perhaps you were blessed by a fey being or marked by a demon. Or your magic could be a fluke with no apparent cause. Whatever its source, this magic churns within you, waiting for any outlet.
type: Folder
tags:
  - sorcererSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Wild Magic"
  # Level 3: Wild Magic Surge
  - id: wildMagicSurge
    type: Activity
    name: Wild Magic Surge
    condition: $(meta.level >= 3)
    description: "Your spellcasting unleashes surges of untamed magic. Once per turn, roll 1d20 immediately after you cast a Sorcerer spell with a spell slot. If you roll a 20, roll on the Wild Magic Surge table."

  # Level 3: Tides of Chaos
  - id: tidesOfChaos
    type: Activity
    name: Tides of Chaos
    condition: $(meta.level >= 3)
    description: |
      You manipulate chaos itself to give yourself Advantage on one D20 Test before you roll.
      Once you do so, you must cast a Sorcerer spell with a spell slot or finish a Long Rest before you can use this feature again.

      If you do cast a Sorcerer spell with a spell slot before you finish a Long Rest, you automatically roll on the Wild Magic Surge table.

  # Level 6: Bend Luck
  - id: bendLuck
    type: Activity
    name: Bend Luck
    time: reaction
    range: 60 feet
    condition: $(meta.level >= 6)
    resource: 1 sorceryPoints
    description: You twist fate using your wild magic. Immediately after another creature you can see rolls the d20 for a D20 Test, roll 1d4 and apply the number rolled as a bonus or penalty (your choice) to the d20 roll.


  # Level 14: Controlled Chaos
  - id: controlledChaos
    type: Extra
    name: Controlled Chaos
    target: wildMagicSurge
    condition: $(meta.level >= 14)
    description: "Whenever you roll on the Wild Magic Surge table, roll twice and use either number."

  # Level 18: Tamed Surge
  - id: tamedSurge
    type: Extra
    name: Tamed Surge
    target: wildMagicSurge
    condition: $(meta.level >= 18)
    tags: [limitedLR]
    description: "Immediately after you cast a Sorcerer spell with a spell slot, you can create an effect of your choice from the Wild Magic Surge table instead of rolling on that table. You can choose any effect in the table except for the final row."
