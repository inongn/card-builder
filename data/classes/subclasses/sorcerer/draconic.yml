id: draconic
name: Draconic Sorcery
description: |
  Your innate magic comes from the gift of a dragon. Perhaps an ancient dragon facing death bequeathed some of its magical power to you or your ancestor. You might have absorbed magic from a site infused with dragons’ power. Or perhaps you handled a treasure taken from a dragon’s hoard that was steeped in draconic power.
type: Folder
tags:
  - sorcererSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Draconic"
  # Level 3: Draconic Resilience
  - id: draconicResilienceHP
    type: Effect
    target: attributes.hp
    operation: add
    value: $(meta.level)
    condition: $(meta.level >= 3)
  - id: draconicResilienceAC
    type: Effect
    target: attributes.ac
    operation: set
    value: $(10 + stats.dex.mod + stats.cha.mod)
    condition: $(meta.level >= 3)

  # Level 3: Draconic Spells
  - type: Reference
    target: [alterSelf, chromaticOrb, command, dragonsBreath]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [fear, fly]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [arcaneEye, charmMonster]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [legendLore, summonDragon]
    condition: $(meta.level >= 9)

  # Level 6: Elemental Affinity
  - id: elementalAffinity
    type: Slot
    name: Elemental Affinity
    condition: $(meta.level >= 6)
    target: classOptions OR elementalAffinity
