id: clockwork
name: Clockwork Sorcery
description: |
  The cosmic force of order has suffused you with magic. That power arises from Mechanus or a realm like it—a plane of existence shaped entirely by clockwork efficiency. You or someone from your lineage might have become entangled in the machinations of modrons, the orderly beings who inhabit Mechanus.
type: Folder
tags:
  - sorcererSubclass
children:
  # Level 3: Clockwork Spells
  - type: Reference
    target: [aid, alarm, lesserRestoration, protectionFromEvilAndGood]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [dispelMagic, protectionFromEnergy]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [freedomOfMovement, summonConstruct]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [greaterRestoration, wallOfForce]
    condition: $(meta.level >= 9)

  # Level 3: Restore Balance
  - id: restoreBalance
    type: Activity
    name: Restore Balance
    time: reaction
    range: 60 feet
    condition: $(meta.level >= 3)
    resource: restoreBalance
    description: "When a creature you can see rolls with Advantage or Disadvantage, you prevent the roll from being affected by it."
  - id: restoreBalance
    type: Resource
    name: Restore Balance
    quantity: $(Math.max(1, stats.cha.mod))
    condition: $(meta.level >= 3)
    sr: 0 # Long Rest

  # Level 6: Bastion of Law
  - id: bastionOfLaw
    type: Activity
    name: Bastion of Law
    time: action
    range: 30 feet
    condition: $(meta.level >= 6)
    resource: sorceryPoints
    description: |
      You tap into the grand equation of existence to imbue a creature with a shimmering shield of order. Create a magical ward around a creature within range. The ward is represented by a number of d8s equal to the number of Sorcery Points spent to create it. When the warded creature takes damage, it can expend a number of those dice, roll them, and reduce the damage taken by the total rolled on those dice.

      The ward lasts until you finish a Long Rest or until you use this feature again.

  # Level 14: Trance of Order
  - id: tranceOfOrder
    type: Activity
    name: Trance of Order
    time: bonus action
    duration: 1 minute
    condition: $(meta.level >= 14)
    resource: 5 sorceryPoints
    tags: [innateSR]
    description: |
      You align your consciousness with the endless calculations of Mechanus. For the duration, attack rolls against you can’t benefit from Advantage, and whenever you make a D20 Test, you can treat a roll of 9 or lower on the d20 as a 10.

  # Level 18: Clockwork Cavalcade
  - id: clockworkCavalcade
    type: Activity
    name: Clockwork Cavalcade
    time: action
    range: self
    resource: 7 sorceryPoints
    condition: $(meta.level >= 18)
    tags: [limitedLR]
    description: |
      You momentarily summon spirits of order to expunge disorder around you. You summon the spirits in a 30-foot Cube originating from you. The spirits look like modrons or other Constructs of your choice. The spirits are intangible and invulnerable, and they create the effects below within the Cube before vanishing:

      **Heal**: The spirits restore up to 100 Hit Points, divided as you choose among any number of creatures of your choice in the Cube.

      **Repair**: Any damaged objects entirely in the Cube are repaired instantly.
      
      **Dispel**: Every spell of level 6 and lower ends on creatures and objects of your choice in the Cube.