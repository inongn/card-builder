id: clockwork
name: Clockwork Sorcery
description: |
  The cosmic force of order has suffused you with magic. That power arises from Mechanus or a realm like it—a plane of existence shaped entirely by clockwork efficiency. You or someone from your lineage might have become entangled in the machinations of modrons, the orderly beings who inhabit Mechanus.
type: Folder
tags:
  - sorcererSubclass
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Clockwork"
  # Level 3: Clockwork Spells
  - type: Reference
    target: [aid, alarm, lesserRestoration, protectionFromEvilAndGood]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [dispelMagic, protectionFromEnergy]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [freedomOfMovement, summonConstruct]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [greaterRestoration, wallOfForce]
    condition: $(meta.level >= 9)

  # Level 3: Restore Balance
  - id: restoreBalance
    type: Activity
    name: Restore Balance
    time: reaction
    range: 60 feet
    condition: $(meta.level >= 3)
    resource: restoreBalance
    description: "When a creature you can see rolls with Advantage or Disadvantage, you prevent the roll from being affected by it."
  - id: restoreBalance
    type: Resource
    name: Restore Balance
    quantity: $(Math.max(1, stats.cha.mod))
    condition: $(meta.level >= 3)
    sr: 0 # Long Rest

  # Level 6: Bastion of Law
  - id: bastionOfLaw
    type: Activity
    name: Bastion of Law
    time: action
    range: 30 feet
    condition: $(meta.level >= 6)
    resource: sorceryPoints
    description: |
      You tap into the grand equation of existence to imbue a creature with a shimmering shield of order. Create a magical ward around a creature within range. The ward is represented by a number of d8s equal to the number of Sorcery Points spent to create it. When the warded creature takes damage, it can expend a number of those dice, roll them, and reduce the damage taken by the total rolled on those dice.

      The ward lasts until you finish a Long Rest or until you use this feature again.
