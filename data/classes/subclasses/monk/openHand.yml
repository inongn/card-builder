id: openHand
name: Warrior of the Open Hand
description: |
  Warriors of the Open Hand are masters of unarmed combat. They learn techniques to push and trip their opponents and manipulate their own energy to protect themselves from harm.
tags:
  - monkSubclass
type: Folder
children:
  # Level 3: Open Hand Technique
  - id: openHandTechnique
    type: Activity
    name: Open Hand Technique
    description: "When you hit a creature with an attack granted by your Flurry of Blows, you impose one of the following effects on the target."
  - id: openHandAddle
    type: Extra
    name: Addle
    target: openHandTechnique
    description: "The target can't make Opportunity Attacks until the start of its next turn."
  - id: openHandPush
    type: Extra
    name: Push
    target: openHandTechnique
    description: "The target must succeed on a DC $(attributes.monkSaveDC) Strength saving throw or be pushed up to 15 feet away from you."
  - id: openHandTopple
    type: Extra
    name: Topple
    target: openHandTechnique
    description: "The target must succeed on a DC $(attributes.monkSaveDC) Dexterity saving throw or have the Prone condition."

  # Level 6: Wholeness of Body
  - id: wholenessOfBody
    type: Activity
    name: Wholeness of Body
    time: bonus action
    range: self
    duration: Instantaneous
    condition: $(meta.level >= 6)
    resource: wholenessOfBody
    description: "You channel your inner healing energy. Regain 1d$(attributes.martialArtsDie)+$(stats.wis.mod) Hit Points."
  - id: wholenessOfBody
    type: Resource
    name: Wholeness of Body
    quantity: $(Math.max(1, stats.wis.mod))

  # Level 11: Fleet Step
  - id: fleetStep
    type: Activity
    name: Fleet Step
    condition: $(meta.level >= 11)
    description: "When you take a Bonus Action other than Step of the Wind, you can also use Step of the Wind immediately after that Bonus Action."

  # Level 17: Quivering Palm
  - id: quiveringPalm
    type: Activity
    name: Quivering Palm
    condition: $(meta.level >= 17)
    resource: 4 focusPoints
    description: "When you hit a creature with an Unarmed Strike, you start imperceptible vibrations lasting $(meta.level) days. As an action or by forgoing one Attack action strike, end the vibrations: the target must make a DC $(attributes.monkSaveDC) Constitution saving throw, taking 10d12 Force damage on a failed save or half as much on a success. You can have only one creature under this effect at a time."
