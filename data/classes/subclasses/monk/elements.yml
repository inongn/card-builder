id: elements
name: Warrior of the Elements
description: |
  Warriors of the Elements tap into the power of the Elemental Planes. Harnessing their supernatural focus, these Monks momentarily tame the energy of the Elemental Chaos to empower themselves in and out of battle.
tags:
  - monkSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Elements"
  # Level 3: Elemental Attunement
  - id: elementalAttunement
    type: Activity
    name: Elemental Attunement
    time: free action
    range: self
    duration: 10 minutes
    resource: 1 focusPoints
    description: |
      You imbue yourself with elemental energy. While active, gain the following benefits:
      
      **Reach** Your Unarmed Strike reach is 5 feet greater than normal, as elemental energy extends from you.
      
      **Elemental Strikes** You can cause Unarmed Strikes to deal your choice of Acid, Cold, Fire, Lightning, or Thunder damage. When you deal one of these types, force the target to make a DC $(attributes.monkSaveDC) Strength saving throw. On a failure, move the target up to 5 feet toward or away from you.

  # Level 3: Manipulate Elements
  - type: Reference
    target: [elementalism, wisCaster]

  # Level 6: Elemental Burst
  - id: elementalBurst
    type: Activity
    name: Elemental Burst
    time: action
    range: 120 feet
    duration: Instantaneous
    condition: $(meta.level >= 6)
    resource: 2 focusPoints
    description: "You cause elemental energy to burst in a 20-foot-radius Sphere. Choose Acid, Cold, Fire, Lightning, or Thunder. Each creature in the Sphere must make a DC $(attributes.monkSaveDC) Dexterity saving throw, taking 3d$(attributes.martialArtsDie) damage of the chosen type on a failure or half as much on a success."
