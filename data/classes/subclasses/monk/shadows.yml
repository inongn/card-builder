id: shadows
name: Warrior of Shadow
description: |
  Warriors of Shadow practice stealth and subterfuge, harnessing the power of the Shadowfell. They are at home in darkness, able to draw gloom around themselves to hide, leap from shadow to shadow, and take on a wraithlike form.
tags:
  - monkSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Shadow"
  # Level 3: Shadow Arts — Darkness
  - id: shadowArtsDarkness
    type: Reference
    target: darkness
    overwrite:
      resource: 2 focusPoints
      
  # Level 3: Shadow Arts — Darkvision
  - id: shadowArtsDarkvision
    type: Effect
    target: attributes.senses.darkvision
    operation: add
    value: 60

  # Level 3: Shadow Arts — Shadowy Figments
  - type: Reference
    target: [minorIllusion, wisCaster]

  # Level 6: Shadow Step
  - id: shadowStep
    type: Activity
    name: Shadow Step
    time: bonus action
    range: 60 feet
    duration: Instantaneous
    condition: $(meta.level >= 6)
    description: "While entirely within Dim Light or Darkness, you teleport up to 60 feet to an unoccupied space you can see that is also in Dim Light or Darkness. You then have Advantage on the next melee attack you make before the end of the current turn."
