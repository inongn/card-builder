id: eldritchKnight
name: Eldritch Knight
description: |
  Eldritch Knights combine the martial mastery common to all Fighters with a careful study of magic. Their spells both complement and extend their combat skills, providing additional protection to shore up their armor and also allowing them to engage many foes at once with explosive magic.
tags:
  - fighterSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Eldritch Knight"
  - type: Reference
    target: [oneThirdCaster, intCaster]
  - type: Slot
    name: Eldritch Knight Cantrips
    target: cantrip AND wizard
    id: eldritchKnightCantrips
    quantity: "$(meta.level >= 10 ? 3 : 2)"
  - type: Slot
    id: eldritchKnightSpells
    name: Eldritch Knight Spells
    target: "wizard NOT class NOT cantrip $(local.maxLevel < 9 ? 'NOT level9Spell' : '') $(local.maxLevel < 8 ? 'NOT level8Spell' : '') $(local.maxLevel < 7 ? 'NOT level7Spell' : '') $(local.maxLevel < 6 ? 'NOT level6Spell' : '') $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    variables:
      maxLevel: "$(meta.level >= 19 ? 4 : meta.level >= 13 ? 3 : meta.level >= 7 ? 2 : 1)"
    quantity: $(progression(0,0,3,4,4,4,5,6,6,7,8,8,9,10,10,11,11,11,12,13))
  - type: Activity
    name: War Bond
    time: bonus action
    condition: $(meta.level >= 3)
    id: warBond
    description: You summon your bonded weapon, causing it to teleport instantly to your hand. You can't be disarmed of that weapon unless you have the Incapacitated condition.
  - type: Effect
    target: activities[tags=weaponAttack].extra["instead of once, whenever you take the Attack action on your turn."]
    operation: replace
    condition: $(meta.level >= 7)
    value: "instead of once, whenever you take the Attack action on your turn. You can replace one of the attacks with a cantrip."