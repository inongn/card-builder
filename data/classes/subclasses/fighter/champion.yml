id: champion
name: Champion
description: |
  A Champion focuses on the development of martial prowess in a relentless pursuit of victory. Champions combine rigorous training with physical excellence to deal devastating blows, withstand peril, and garner glory. Whether in athletic contests or bloody battle, Champions strive for the crown of the victor.
tags:
  - fighterSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Champion"
  - id: improvedCritical
    name: Improved Critical
    type: Extra
    target: weaponAttack
    condition: $(meta.level >= 3)
    description: "You score a Critical Hit on a roll of $(meta.level >= 15 ? '18-20' : '19 or 20')."
  - type: Reference
    target: [initiativeAdvantage, athleticsAdvantage]
    condition: $(meta.level >= 3)
  - id: remarkableAthlete
    name: Remarkable Athlete
    type: Extra
    target: weaponAttack
    condition: $(meta.level >= 3)
    description: "On a Critical Hit, you can move up to $(attributes.movement.walk/2) feet without provoking Opportunity Attacks."
  - id: additionalFightingStyle
    name: Additional Fighting Style
    type: Slot
    target: fightingStyle
    condition: $(meta.level >= 7)
    quantity: 1