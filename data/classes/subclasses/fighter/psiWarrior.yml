id: psiWarrior
name: Psi Warrior
description: |
  Psi Warriors awaken the power of their minds to augment their physical might. They harness this psionic power to infuse their weapon strikes, lash out with telekinetic energy, and create barriers of mental force.


tags:
  - fighterSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Psi Warrior"
  - id: psionicEnergyDice
    type: Resource
    name: Psionic Energy
    sr: 1
    quantity: $(progression(0,0,4,4,6,6,6,6,8,8,8,8,10,10,10,10,12,12,12,12))
  - id: psiDice
    type: Attribute
    value: $(progression(0,0,6,6,8,8,8,8,8,8,10,10,10,10,10,10,12,12,12,12))
  - id: protectiveField
    type: Activity
    time: reaction
    range: 30 feet
    duration: Instantaneous
    name: Protective Field
    resource: psionicEnergyDice
    description: When you or another creature you can see within range takes damage, you create a momentary shield of telekinetic force. Reduce the damage taken by 1d$(attributes.psiDice)$(formatBonus(stats.int.mod)).
  - id: psionicStrike
    type: Activity
    time: free action
    range: 30 feet
    duration: Instantaneous
    name: Psionic Strike
    resource: psionicEnergyDice
    description: When you hit a target with a weapon attack, you propel your weapon with psionic force. The target takes 1d$(attributes.psiDice)$(formatBonus(stats.int.mod)) Force damage.
  - id: telekineticMovement
    type: Activity
    time: action
    range: 30 feet
    duration: Instantaneous
    name: Telekinetic Movementlimite
    resource: psionicEnergyDice
    description: |
      You move an object or creature with your mind. Choose one target you can see within range; the target must be a loose object that is Large or smaller, or one willing creature other than you. You transport the target up to 30 feet to an unoccupied space you can see. Alternatively, if the target is a Tiny object, you can transport it to or from your hand.
  - id: psiPoweredLeap
    type: Activity
    time: bonus action
    condition: $(meta.level >= 7)
    range: self
    duration: Instantaneous
    name: Psi Powered Leap
    resource: psionicEnergyDice
    description: You gain a Fly Speed of $(attributes.movement.walk * 2) feet until the end of the current turn.
  - id: telekineticThrust
    type: Extra
    target: psionicStrike
    name: Telekinetic Thrust
    description: The target must succeed on a DC $(8+ attributes.prof + stats.int.mod) Strength saving throw. On a failed save, you can give the target the Prone condition or transport it up to 10 feet horizontally.