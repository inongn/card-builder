id: soulknife
name: Soulknife
description: |
  A Soulknife strikes with the mind, cutting through barriers both physical and psychic. These Rogues discover psionic power within themselves and channel it to do their roguish work. As a Soulknife your psionic abilities might have haunted you since childhood, revealing their full potential only as you experienced the stress of adventure. Or you might have sought out an order of psychic adepts and spent years learning how to manifest your power.
tags:
  - rogueSubclass
type: Folder
children:
  # Level 3: Psionic Power — Resource
  - id: psionicEnergyDice
    type: Resource
    name: Psionic Energy Dice
    sr: 1
    quantity: $(progression(0,0,4,4,6,6,6,6,8,8,8,8,10,10,10,10,12,12,12,12))
  - id: psiDice
    type: Attribute
    value: $(progression(0,0,6,6,8,8,8,8,8,8,10,10,10,10,10,10,12,12,12,12))

  # Level 3: Psionic Power — Psi-Bolstered Knack
  - id: psiBolsteredKnack
    type: Activity
    name: Psi-Bolstered Knack
    time: free action
    range: self
    duration: Instantaneous
    resource: psionicEnergyDice
    description: "When you fail an ability check using a skill or tool with which you have proficiency, you add 1d$(attributes.psiDice) to the check, potentially turning failure into success. The die is expended only if the roll then succeeds."

  # Level 3: Psionic Power — Psychic Whispers
  - id: psychicWhispers
    type: Activity
    name: Psychic Whispers
    time: action
    range: self
    duration: Varies
    resource: psionicEnergyDice
    description: "You choose up to $(attributes.prof) creatures you can see. For 1d$(attributes.psiDice) hours, the chosen creatures can speak telepathically to you, and you can speak telepathically with them. To send or receive a message (no action required), you and the other creature must be within 1 mile of each other. A creature can end the telepathic connection at any time (no action required)."

  # Level 3: Psychic Blades
  - id: psychicBlade
    type: Activity
    name: "Attack: Psychic Blade"
    time: action
    range: 60 feet
    duration: Instantaneous
    tags: [weaponAttack, vex, attack]
    description: |
      You manifest a shimmering blade of psychic energy and strike at a target within range. Make a $(formatBonus(stats.dex.mod + attributes.prof)) attack. On a hit, the target takes 1d6$(formatBonus(stats.dex.mod)) Psychic damage. The blade vanishes immediately after it hits or misses, leaving no mark.

      After you attack with the blade on your turn, you can make a melee or ranged attack with a second psychic blade as a Bonus Action on the same turn. The damage die of this bonus attack is 1d4 instead of 1d6.

  # Level 9: Soul Blades — Homing Strikes
  - id: homingStrikes
    type: Activity
    name: Homing Strikes
    resource: psionicEnergyDice
    condition: $(meta.level >= 9)
    description: "If you miss with your Psychic Blade, you add 1d$(attributes.psiDice) to the attack roll. If this causes the attack to hit, the die is expended."

  # Level 9: Soul Blades — Psychic Teleportation
  - id: psychicTeleportation
    type: Activity
    name: Psychic Teleportation
    time: bonus action
    range: self
    duration: Instantaneous
    resource: psionicEnergyDice
    condition: $(meta.level >= 9)
    description: "You manifest and throw a Psychic Blade at an unoccupied space you can see up to a number of feet away equal to 10 times 1d$(attributes.psiDice). You then teleport to that space, and the blade vanishes."

  # Level 13: Psychic Veil
  - id: psychicVeil
    type: Activity
    name: Psychic Veil
    time: action
    range: self
    duration: 1 hour
    tags: [innateLR]
    resource: psionicEnergyDice
    condition: $(meta.level >= 13)
    description: "You gain the Invisible condition for 1 hour or until you dismiss the effect (no action required). This invisibility ends early immediately after you deal damage to a creature or you force a creature to make a saving throw."

  # Level 17: Rend Mind

  - id: rendMind
    type: Activity
    name: Rend Mind
    time: free action
    range: self
    duration: Instantaneous
    resource: "3 psionicEnergyDice"
    tags: [innateLR]
    condition: $(meta.level >= 17)
    description: "When you use your Psychic Blades to deal Sneak Attack damage, the target makes a DC $(8 + stats.dex.mod + attributes.prof) Wisdom saving throw. On a failed save, the target has the Stunned condition for 1 minute. The Stunned target repeats the save at the end of each of its turns, ending the effect on itself on a success."
