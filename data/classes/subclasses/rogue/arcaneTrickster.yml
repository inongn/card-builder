id: arcaneTrickster
name: Arcane Trickster
description: |
  Some Rogues enhance their fine-honed skills of stealth and agility with spells, learning magical tricks to aid them in their trade. Some Arcane Tricksters use their talents as pickpockets and burglars, while others are pranksters.
tags:
  - rogueSubclass
type: Folder
children:
  # Level 3: Spellcasting
  - type: Reference
    target: [oneThirdCaster, intCaster]
  - type: Reference
    target: mageHand
  - type: Slot
    id: arcaneTricksterCantrips
    name: Arcane Trickster Cantrips
    target: cantrip AND wizard
    quantity: "$(meta.level >= 10 ? 3 : 2)"
  - type: Slot
    id: arcaneTricksterSpells
    name: Arcane Trickster Spells
    target: "wizard NOT cantrip $(local.maxLevel < 9 ? 'NOT level9Spell' : '') $(local.maxLevel < 8 ? 'NOT level8Spell' : '') $(local.maxLevel < 7 ? 'NOT level7Spell' : '') $(local.maxLevel < 6 ? 'NOT level6Spell' : '') $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    variables:
      maxLevel: "$(meta.level >= 19 ? 4 : meta.level >= 13 ? 3 : meta.level >= 7 ? 2 : 1)"
    quantity: $(progression(0,0,3,4,4,4,5,6,6,7,8,8,9,10,10,11,11,11,12,13))

  # Level 3: Mage Hand Legerdemain
  - id: mageHandLegerdemain
    type: Reference
    target: mageHand
    overwrite:
      time: bonus action
  # Level 9: Magical Ambush
  - id: magicalAmbush
    type: Extra
    name: Magical Ambush
    target: saveSpell
    condition: $(meta.level >= 9)
    description: "If you have the Invisible condition when you cast this spell, the target has Disadvantage on any saving throw it makes against the spell."

  # Level 13: Versatile Trickster
  - id: versatileTrickster
    type: Effect
    target: activities[cunningStrike].extra["or have the Prone condition."]
    operation: replace
    condition: $(meta.level >= 13)
    value: "or have the Prone condition. You can also use this option on another creature within 5 feet ofyour Mage Hand."

  # Level 17: Spell Thief
  - id: spellThief
    type: Activity
    name: Spell Thief
    time: reaction
    range: self
    duration: 8 hours
    tags: [limitedLR]
    condition: $(meta.level >= 17)
    description: "Immediately after a creature casts a spell that targets you or includes you in its area of effect, the target makes a DC $(attributes.spellcasting.save) Intelligence saving throw. On a failed save, you negate the spell's effect against you, and you steal the knowledge of the spell if it is at least level 1 and of a level you can cast. For the next 8 hours, you have the spell prepared. The creature can't cast it until 8 hours have passed."
