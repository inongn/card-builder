id: arcaneTrickster
name: Arcane Trickster
description: |
  Some Rogues enhance their fine-honed skills of stealth and agility with spells, learning magical tricks to aid them in their trade. Some Arcane Tricksters use their talents as pickpockets and burglars, while others are pranksters.
tags:
  - rogueSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Arcane Trickster"
  # Level 3: Spellcasting
  - type: Reference
    target: [oneThirdCaster, intCaster]
  - type: Slot
    id: arcaneTricksterCantrips
    name: Arcane Trickster Cantrips
    target: cantrip AND wizard
    quantity: "$(meta.level >= 10 ? 3 : 2)"
  - type: Slot
    id: arcaneTricksterSpells
    name: Arcane Trickster Spells
    target: "wizard NOT class NOT cantrip $(local.maxLevel < 9 ? 'NOT level9Spell' : '') $(local.maxLevel < 8 ? 'NOT level8Spell' : '') $(local.maxLevel < 7 ? 'NOT level7Spell' : '') $(local.maxLevel < 6 ? 'NOT level6Spell' : '') $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    variables:
      maxLevel: "$(meta.level >= 19 ? 4 : meta.level >= 13 ? 3 : meta.level >= 7 ? 2 : 1)"
    quantity: $(progression(0,0,3,4,4,4,5,6,6,7,8,8,9,10,10,11,11,11,12,13))

  # Level 3: Mage Hand Legerdemain
  - id: mageHandLegerdemain
    type: Reference
    target: mageHand
    overwrite:
      time: bonus action