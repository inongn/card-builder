id: scionOfTheThree
condition: $(meta.setting === 'faerun')
name: Scion of the Three
description: |
  A Scion of the Three draws power from a group of malevolent gods known in Baldur's Gate as the Dead Three: Bane, a god of tyranny; Bhaal, a god of violence and murder; and Myrkul, a god of death. While some Rogues of this subclass pledge themselves ardently to those three macabre gods, others are thrust on this path by a curse. Either way, a scion's power manifests as various occult gifts, as well as an uncanny talent for striking and terrifying foes.
tags:
  - rogueSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Scion of the Three"
  # Level 3: Bloodthirst
  - id: bloodthirst
    type: Activity
    name: Bloodthirst
    time: reaction
    range: 30 feet
    duration: Instantaneous
    resource: bloodthirst
    description: "When an enemy you can see within range takes damage and is Bloodied after taking that damage but not killed outright, you teleport to an unoccupied space you can see within 5 feet of that enemy. You can then make one melee attack."
  - id: bloodthirst
    type: Resource
    name: Bloodthirst
    quantity: $(Math.max(1, stats.int.mod))

  # Level 3: Dread Allegiance
  - id: dreadAllegiance
    type: Slot
    name: Dread Allegiance
    quantity: 1
    target: classOption OR dreadAllegiance

  # Level 9: Strike Fear — Terrify
  - id: cunningStrikeTerrify
    type: Extra
    name: "Terrify (Cost: 1d6)"
    target: cunningStrike
    condition: $(meta.level >= 9)
    description: "The target must succeed on a DC $(attributes.cunningStrikeSave) Wisdom saving throw, or it has the Frightened condition for 1 minute. While the target is Frightened in this way, you have Advantage on attack rolls against the target. The Frightened target repeats the save at the end of each of its turns, ending the effect on itself on a success."

  # Level 13: Aura of Malevolence
  - id: auraOfMalevolence
    type: Extra
    name: Aura of Malevolence
    target: bloodthirst
    condition: $(meta.level >= 13)
    description: "Each creature of your choice within 10 feet of either the space you left or your destination space (your choice) takes $(stats.int.mod) damage. Damage dealt by this feature ignores Resistance."

  # Level 17: Dread Incarnate — Murderous Intent
  - id: murderousIntent
    type: Extra
    name: Murderous Intent
    target: sneakAttack
    condition: $(meta.level >= 17)
    description: "You can treat a roll of 1 or 2 on the die as a 3."

  - id: cutthroat
    type: Extra
    name: Cutthroat
    target: shortRest
    condition: $(meta.level >= 17)
    description: "Restore a Bloodthirst charge."