id: greatOldOnePatron
name: Great Old One Patron
description: |
  Your pact draws on the Far Realm or an elder god—a being such as Tharizdun, Hadar, or Great Cthulhu. The motives of these beings are incomprehensible, and the Great Old One might be indifferent to your existence.
tags:
  - warlockSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Great Old One"
  # Level 3: Great Old One Spells
  - type: Reference
    target: [detectThoughts, dissonantWhispers, phantasmalForce, tashasHideousLaughter]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [clairvoyance, hungerOfHadar]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [confusion, summonAberration]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [modifyMemory, telekinesis]
    condition: $(meta.level >= 9)

  # Level 3: Awakened Mind
  - id: awakenedMind
    type: Activity
    name: Awakened Mind
    time: bonus action
    range: 30 feet
    duration: $(meta.level) minutes
    condition: $(meta.level >= 3)
    description: |
      You form a telepathic connection between your mind and the mind of another. As a Bonus Action, choose one creature you can see within 30 feet of yourself. You and the chosen creature can communicate telepathically with each other while the two of you are within $(Math.max(1, stats.cha.mod)) miles of each other. To understand each other, you each must mentally use a language the other knows.

  # Level 3: Psychic Spells
  - id: psychicSpellsDamage
    type: Extra
    target: warlock AND damageSpell NOT (enchantment OR illusion)
    name: Psychic Spells
    description: "You can change the damage type to Psychic."
    condition: $(meta.level >= 3)
  - id: psychicSpellsComp
    type: Extra
    target: warlock AND (enchantment OR illusion) NOT (damageSpell)
    name: Psychic Spells
    description: "You can cast this spell without Verbal or Somatic components."
    condition: $(meta.level >= 3)
  - id: psychicSpellsCompDamage
    type: Extra
    target: warlock AND (enchantment OR illusion) AND damageSpell
    name: Psychic Spells
    description: "You can cast this spell without Verbal or Somatic components and change the damage type to Psychic."
    condition: $(meta.level >= 3)

  # Level 6: Clairvoyant Combatant
  - id: clairvoyantCombatant
    type: Activity
    name: Clairvoyant Combatant
    time: free action
    resource: level1SpellSlot
    condition: $(meta.level >= 6)
    description: |
      When you form a telepathic bond with a creature using your Awakened Mind, you force that creature to make a DC $(attributes.spellcasting.save) Wisdom saving throw. On a failed save, the creature has Disadvantage on attack rolls against you, and you have Advantage on attack rolls against that creature for the duration of the bond.
      
