id: fiendPatron
name: Fiend Patron
description: |
  Your pact draws on the Lower Planes, the realms of perdition. You might forge a bargain with a demon lord such as Demogorgon or Orcus; an archdevil such as Asmodeus; or a pit fiend.
tags:
  - warlockSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Fiend"
  # Level 3: Fiend Spells
  - type: Reference
    target: [burningHands, command, scorchingRay, suggestion]
    condition: $(meta.level >= 3)
  - type: Reference
    target: [fireball, stinkingCloud]
    condition: $(meta.level >= 5)
  - type: Reference
    target: [fireShield, wallOfFire]
    condition: $(meta.level >= 7)
  - type: Reference
    target: [geas, insectPlague]
    condition: $(meta.level >= 9)

  # Level 3: Dark One's Blessing
  - id: darkOnesBlessing
    type: Activity
    name: Dark One's Blessing
    time: free action
    duration: instantaneous
    condition: $(meta.level >= 3)
    description: When you reduce an enemy to 0 Hit Points, you gain $(meta.level + stats.cha.mod) Temporary Hit Points. You also gain this benefit if someone else reduces an enemy within 10 feet of you to 0 Hit Points.


  # Level 6: Dark One's Own Luck
  - id: darkOnesOwnLuck
    type: Activity
    name: Dark One's Own Luck
    time: free action
    resource: darkOnesOwnLuck
    condition: $(meta.level >= 6)
    description: You call on your fiendish patron to alter fate in your favor. When you make an ability check or a saving throw, you can use this feature to add 1d10 to your roll. You can do so after seeing the roll but before any of the roll’s effects occur.

  - id: darkOnesOwnLuck
    type: Resource
    name: Dark One's Own Luck
    quantity: $(Math.max(1, stats.cha.mod))
    condition: $(meta.level >= 6)
    sr: 0

  # Level 10: Fiendish Resilience
  - id: fiendishResilience
    type: Slot
    target: shortRest OR longRest
    name: Fiendish Resilience
    description: "Choose one damage type (other than Force). You have Resistance to it."
    condition: $(meta.level >= 10)

  # Level 14: Hurl Through Hell
  - id: hurlThroughHell
    type: Activity
    name: Hurl Through Hell
    time: free action
    resource: level1SpellSlot
    condition: $(meta.level >= 14)
    description: |
      Once per turn when you hit a creature with an attack roll, you try to instantly transport the target through the Lower Planes. The target must succeed on DC $(attributes.spellcasting.save) Charisma saving throw, or the target disappears and hurtles through a nightmare landscape. 
      
      The target takes 8d10 Psychic damage if it isn’t a Fiend, and it has the Incapacitated condition until the end of your next turn, when it returns to the space it previously occupied or the nearest unoccupied space.

      
