id: circleOfTheLand
name: Circle of the Land
description: |
  The Circle of the Land comprises mystics and sages who safeguard ancient knowledge and rites. These Druids meet within sacred circles of trees or standing stones to whisper primal secrets in Druidic. The circle’s wisest members preside as the chief priests of their communities.

tags:
  - druidSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Land"
  - id: circleOfTheLandType
    type: Slot
    name: Land Type
    quantity: 1
    target: circleLand OR classOption
  - id: landsAid
    type: Activity
    name: Land's Aid
    time: action
    range: 60 feet
    resource: wildShape
    description: |
      Vitality-giving flowers and life-draining thorns appear in a point you choose within range. Each creature in a 10-foot-radius Sphere centered on that point makes a DC $(attributes.spellcasting.save) Constitution saving throw, taking $(meta.level >= 14 ? '4d6' : meta.level >= 10 ? '3d6' : '2d6') Necrotic damage on a failed save or half as much damage on a successful one. One creature of your choice in that area regains $(meta.level >= 14 ? '4d6' : meta.level >= 10 ? '3d6' : '2d6') Hit Points.