id: hunter
name: Hunter
description: |
  You stalk prey in the wilds and elsewhere, using your abilities as a Hunter to protect nature and people everywhere from forces that would destroy them.
tags:
  - rangerSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Hunter"
  # Level 3: Hunter's Lore
  - id: huntersLore
    type: Extra
    name: Hunter's Lore
    target: huntersMark
    description: "You know whether the creature has any Immunities, Resistances, or Vulnerabilities, and if it has any, you know what they are."

  # Level 3: Hunter's Prey
  - id: huntersPrey
    type: Slot
    name: Hunter's Prey
    quantity: 1
    target: classOption OR huntersPrey

  # Level 7: Defensive Tactics
  - id: defensiveTactics
    type: Slot
    name: Defensive Tactics
    quantity: 1
    target: classOption OR defensiveTactics
    condition: $(meta.level >= 7)
