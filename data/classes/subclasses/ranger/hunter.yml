id: hunter
name: Hunter
description: |
  You stalk prey in the wilds and elsewhere, using your abilities as a Hunter to protect nature and people everywhere from forces that would destroy them.
tags:
  - rangerSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Hunter"
  # Level 3: Hunter's Lore
  - id: huntersLore
    type: Extra
    name: Hunter's Lore
    target: huntersMark
    description: "You know whether the creature has any Immunities, Resistances, or Vulnerabilities, and if it has any, you know what they are."

  # Level 3: Hunter's Prey
  - id: huntersPrey
    type: Slot
    name: Hunter's Prey
    quantity: 1
    target: classOption OR huntersPrey

  # Level 7: Defensive Tactics
  - id: defensiveTactics
    type: Slot
    name: Defensive Tactics
    quantity: 1
    target: classOption OR defensiveTactics
    condition: $(meta.level >= 7)

  # Level 11: Superior Hunter's Prey
  - id: superiorHuntersPrey
    type: Extra
    name: Superior Hunter's Prey
    target: huntersMark
    condition: $(meta.level >= 11)
    description: "Once per turn when you deal damage to a creature marked by this spell, you can also deal that spell's extra damage to a different creature that you can see within 30 feet of the first creature."

  # Level 15: Superior Hunter's Defense
  - id: superiorHuntersDefense
    type: Activity
    name: Superior Hunter's Defense
    time: reaction
    range: self
    duration: 1 turn
    condition: $(meta.level >= 15)
    description: "When you take damage, you give yourself Resistance to that damage and any other damage of the same type until the end of the current turn."
