id: beastMaster
name: Beast Master
description: |
  A Beast Master forms a mystical bond with a special animal, drawing on primal magic and a deep connection to the natural world.
tags:
  - rangerSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Beast Master"
  # Level 3: Primal Companion
  - id: primalCompanion
    type: Slot
    name: Primal Companion
    quantity: 1
    target: classOption OR primalCompanion
  - id: beastCompanionName
    type: Input
    name: Beast Companion Name
    inputType: text
    label: Beast Companion Name
  - type: Effect
    target: statblocks[beastOfTheLand].name
    operation: set
    value: "$(meta.beastcompanionname ? meta.beastcompanionname + ' (Beast of the Land)' : 'Beast of the Land')"
  - type: Effect
    target: statblocks[beastOfTheSea].name
    operation: set
    value: "$(meta.beastcompanionname ? meta.beastcompanionname + ' (Beast of the Sea)' : 'Beast of the Sea')"
  - type: Effect
    target: statblocks[beastOfTheSky].name
    operation: set
    value: "$(meta.beastcompanionname ? meta.beastcompanionname + ' (Beast of the Sky)' : 'Beast of the Sky')"

  - id: commandCompanionExtraAttack
    type: Effect
    target: activities[tags=weaponAttack].extra["instead of once, whenever you take the Attack action on your turn."]
    operation: replace
    condition: $(meta.level >= 5)
    value: "instead of once, whenever you take the Attack action on your turn. You can replace one of the attacks with a command to your Primal Companion beast to take the Beast's Strike action$(meta.level >= 11 ? ' twice' : '')."

  # Command Primal Companion
  - id: commandPrimalCompanion
    type: Activity
    time: bonus action
    range: 60 feet
    name: Command Companion
    description: "You command your Primal Companion beast to take an action. The beast acts during your turn and can move and use its Reaction on its own, but only takes the Dodge action unless you command it."

  # Level 7: Exceptional Training
  - id: exceptionalTraining
    type: Extra
    name: Exceptional Training
    target: commandPrimalCompanion
    condition: $(meta.level >= 7)
    description: "You can also command the beast to take the Dash, Disengage, Dodge, or Help action using its Bonus Action. Whenever it hits with an attack roll and deals damage, it can deal your choice of Force damage or its normal damage type."
