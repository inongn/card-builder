id: gloomStalker
name: Gloom Stalker
description: |
  Gloom Stalkers are at home in the darkest places, wielding magic drawn from the Shadowfell to combat enemies that lurk in darkness.
tags:
  - rangerSubclass
type: Folder
children:
  - id: subclassName
    type: Effect
    target: meta.sub
    operation: set
    value: "Gloom Stalker"
  # Level 3: Dread Ambusher
  - id: dreadAmbusherLeap
    type: Activity
    name: Ambusher's Leap
    description: "At the start of your first turn of each combat, your speed increases by 10 feet until the end of that turn."
  - id: dreadfulStrike
    type: Activity
    name: Dreadful Strike
    resource: dreadfulStrike
    description: "Once per turn when you attack a creature and hit it with a weapon, you deal an extra $(meta.level >= 11 ? '2d8' : '2d6') Psychic damage. $(meta.level >= 11 ? 'Additionally, you can cause one of the following effects:' : '')"
  - id: dreadfulStrike
    type: Resource
    name: Dreadful Strike
    quantity: $(Math.max(1, stats.wis.mod))
  - id: dreadAmbusherInitiative
    type: Effect
    target: attributes.initiative
    operation: add
    value: $(stats.wis.mod)

  # Level 3: Gloom Stalker Spells
  - type: Reference
    target: disguiseSelf
  - type: Reference
    target: ropeTrick
    condition: $(meta.level >= 5)
  - type: Reference
    target: fear
    condition: $(meta.level >= 9)
  - type: Reference
    target: greaterInvisibility
    condition: $(meta.level >= 13)
  - type: Reference
    target: seeming
    condition: $(meta.level >= 17)

  # Level 3: Umbral Sight
  - id: umbralSightDarkvision
    type: Effect
    target: attributes.senses.darkvision
    operation: add
    value: 60
  - id: umbralSightInvisibility
    type: Activity
    name: Umbral Sight
    description: "While entirely in Darkness, you have the Invisible condition to any creature that relies on Darkvision to see you in that Darkness."

  # Level 7: Iron Mind
  - id: ironMind
    type: Slot
    name: Iron Mind
    quantity: 1
    target: wisSave OR intSave OR chaSave
    condition: $(meta.level >= 7)