type: Statblock
name: Beast of the Sea
tags: [primalCompanion]
id: beastOfTheSea
size: Medium
category: companion
classification: Beast
ac: $(13 + stats.wis.mod)
hp: $(5 + 5 * meta.level)
movement:
  walk: 5
  swim: 60
stats:
  str: 14
  dex: 14
  con: 15
  int: 8
  wis: 14
  cha: 11
senses:
  darkvision: 90
challenge: None
cr: 0
traits:
  - name: Amphibious
    description: "The beast can breathe air and water"
  - name: Primal Bond
    description: "Add $(attributes.prof) to any ability check or saving throw the beast makes."
actions:
  - name: Beast's Strike
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d6 + $(2 + stats.wis.mod) Bludgeoning or Piercing damage (Your choice when you summon the beast), and the target has the Grappled condition (escape DC equals $(attributes.spellcasting.save))."
