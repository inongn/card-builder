id: primalStrike
name: Primal Strike
tags: [elementalFury]
type: Folder
children:
  - id: primalStrikeWeapon
    type: Extra
    target: weaponAttack
    name: Primal Strike
    description: |
      On a hit, the target takes an additional $(meta.level >= 15 ? "2d8" : "1d8") Cold, Fire, Lightning, or Thunder damage.
  - id: primalStrikeWildShape
    type: Effect
    target: statblocks[wildShapeTemplate].actions["damage"]
    operation: replace
    value: "damage + 1d8 Cold, Fire, Lightning or Thunder damage"