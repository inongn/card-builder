id: lifedrinker
name: Lifedrinker
tags:
  - eldritchInvocation
condition: $(attributes.pactOfTheBlade == true && meta.level >= 9)
type: Folder
children:
  - id: lifedrinkerDesc
    type: Extra
    target: mainHand
    name: Lifedrinker
    description: |
      Once per turn, on a hit, the target takes an extra 1d6 Necrotic, Psychic, or Radiant damage (your choice). You can also expend one of your Hit Point Dice to roll it and regain $(attributes.hitDie)$(formatBonus(stats.con.mod)) HP.
