id: pactOfTheBladeFolder
name: Pact of the Blade
tags:
  - eldritchInvocation
type: Attribute
children:
  - id: pactOfTheBlade
    type: Attribute
    value: true
  - type: Reference
    target: [simpleWeaponProficiency, martialWeaponProficiency]
  - id: pactOfTheBladeBonus
    type: Effect
    target: activities[weaponAttack].description["$(formatBonus(attributes.melee.bonus))"]
    operation: replace
    value: "$(formatBonus(attributes.spellcasting.bonus))"
  - id: pactOfTheBladeRoll
    type: Effect
    target: activities[weaponAttack].description["$(formatBonus(attributes.melee.attack))"]
    operation: replace
    value: "$(formatBonus(attributes.spellcasting.attack))"
