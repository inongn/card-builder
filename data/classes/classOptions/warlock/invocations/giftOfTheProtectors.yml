id: giftOfTheProtectors
name: Gift of the Protectors
tags:
  - eldritchInvocation
condition: $(attributes.pactOfTheTome == true && meta.level >= 9)
type: Folder
children:
  - id: giftProtectorsActivity
    type: Activity
    name: Gift of the Protectors
    time: free action
    description: |
      You write the name of a creature in your Book of Shadows. You can have up to $(Math.max(1, stats.cha.mod)) names in your Book of Shadows.
      
      When a named creature drops to 0 HP but isn't killed, they drop to 1 HP instead. Once triggered, no one benefits until you finish a Long Rest.
