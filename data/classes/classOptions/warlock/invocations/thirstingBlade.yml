id: thirstingBlade
name: Thirsting Blade
tags:
  - eldritchInvocation
condition: $(meta.level >= 5)
prerequisite: Pact of the Blade
prerequisiteCondition: $(attributes.pactOfTheBlade == true)
type: Folder
children:
  - id: extraAttack
    type: Extra
    condition: $(attributes.pactOfTheBlade == true)
    target: weaponAttack AND pactWeapon
    name: Extra Attack
    description: "You can attack twice, instead of once, whenever you take the Attack action on your turn."
