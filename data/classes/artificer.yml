id: artificer
name: Artificer
description: |
  Masters of invention, Artificers use ingenuity and magic to unlock extraordinary capabilities in objects. They see magic as a complex system waiting to be decoded and then harnessed in their spells and inventions.
tags:
  - class
type: Folder
children:
  # Core Paladin Traits
  - id: hitDie
    type: Attribute
    value: 8
  - id: className
    type: Effect
    target: meta.class
    operation: set
    value: Artificer
  - type: Reference
    value: [conSave, intSave]
  - type: Reference
    value: [simpleWeaponProficiency, tinkersTools]
  - type: Reference
    value: [lightArmorTraining, mediumArmorTraining, shieldTraining]
  - id: artificerSkillProficiencies
    type: Slot
    name: Artificer Skill Proficiencies
    quantity: 2
    target: arcanaProficiency OR historyProficiency OR investigationProficiency OR medicineProficiency OR natureProficiency OR perceptionProficiency OR sleightOfHandProficiency
  - type: Slot
    target: tool NOT gamingSet NOT musicalInstrument NOT thievesTools NOT poisonersKit NOT navigatorsTools NOT herbalismKit NOT forgeryKit NOT disguiseKit OR artisansToolsProficiency
    id: artisansTools
    name: Artisan's Tools Proficiency
  # Level 1: Lay On Hands

  # Level 1: Spellcasting
  - type: Reference
    target: [halfCaster, intCaster]
  - type: Slot
    name: Artificer Spells
    id: artificerSpells
    target: "artificer NOT cantrip $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    variables:
      maxLevel: "$(meta.level >= 17 ? 5 : meta.level >= 13 ? 4 : meta.level >= 9 ? 3 : meta.level >= 5 ? 2 : 1)"
    quantity: $(progression(2,3,4,5,6,6,7,7,9,9,10,10,11,11,12,12,14,14,15,15))

  - id: artificerCantrips
    type: Slot
    name: Artificer Cantrips
    target: cantrip AND artificer
    quantity: "$(meta.level >= 14 ? 4 : meta.level >= 10 ? 3 : 2)"

  # Level 1: Tinker's Magic
  - type: Reference
    target: [mending]

  - type: Slot
    id: replicateMagicItem
    name: Replicate Magic Item Spells
    quantity: "$(meta.level >= 6 ? 3 : 2)"
    target: "createFoodAndWater OR leomundsSecretChest OR waterBreathing OR darkvision OR fabricate OR spiritualWeapon OR ropeTrick OR sending OR shield OR detectMagic OR findTraps OR bless OR magicWeapon $(meta.level >= 6 ? 'OR mageArmor OR passWithoutTrace OR enhanceAbility OR foresight OR seeInvisibility OR fear OR thunderwave OR waterWalk' : '')"
    overwrite:
      resource: null
  # Level 4: Ability Score Improvement
  - id: level4feat
    name: Level 4 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 4)

  # Level 7: Flash of Genius
  - id: flashOfGenius
    type: Activity
    time: reaction
    name: Flash of Genius
    range: 30 feet
    condition: $(meta.level >= 7)
    description: "When you or a creature you can see within range fails an ability check or a saving throw, add $(Math.floor(stats.int.mod, 1)) to the roll, potentially causing it to succeed."
    resource: flashOfGeniusResource

  - id: flashOfGeniusResource
    name: "Flash of Genius"
    type: Resource
    quantity: "$(Math.floor(stats.int.mod, 1))"
    condition: "$(meta.level >= 7)"
  

  # Level 8: Ability Score Improvement
  - id: level8feat
    name: Level 8 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 8)

  # Level 3: Artificer Subclass
  - id: artificerSubclass
    name: Artificer Subclass
    condition: $(meta.level >= 3)
    type: Slot
    target: artificerSubclass
