id: warlock
name: Warlock
description: |
  Warlocks quest for knowledge that lies hidden in the fabric of the multiverse. They often begin their search for magical power by delving into tomes of forbidden lore, dabbling in invocations meant to attract the power of extraplanar beings, or seeking places of power where the influence of these beings can be felt. In no time, each Warlock is drawn into a binding pact with a powerful patron. Drawing on the ancient knowledge of beings such as angels, archfey, demons, devils, hags, and alien entities of the Far Realm, Warlocks piece together arcane secrets to bolster their own power.
tags:
  - class
type: Folder
children:
  # Core Warlock Traits
  - id: hitDie
    type: Attribute
    value: 8
  - id: className
    type: Effect
    target: meta.class
    operation: set
    value: Warlock
  - type: Reference
    value: [wisSave, chaSave]
  - type: Reference
    value: [lightArmorTraining, simpleWeaponProficiency]
  - id: warlockSkillProficiencies
    type: Slot
    name: Warlock Skill Proficiencies
    quantity: 2
    target: arcanaProficiency OR deceptionProficiency OR historyProficiency OR intimidationProficiency OR investigationProficiency OR natureProficiency OR religionProficiency

  # Level 1: Pact Magic
  - type: Reference
    target: [chaCaster]

  - type: Resource
    id: pactMagicSpellSlot
    name: "Lv. $(Math.min(5, Math.ceil(meta.level / 2))) Spell Slot"
    quantity: "$(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)"
    sr: all

  - type: Slot
    id: warlockCantrips
    name: Warlock Cantrips
    target: cantrip AND warlock
    quantity: "$(meta.level >= 10 ? 4 : meta.level >= 4 ? 3 : 2)"

  - type: Slot
    id: warlockPreparedSpells
    name: Warlock Prepared Spells
    # Target spells up to the current Slot Level (Max 5)
    target: "warlock NOT level9Spell NOT level8Spell NOT level7Spell NOT level6Spell NOT cantrip $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    variables:
      maxLevel: "$(Math.min(5, Math.ceil(meta.level / 2)))"
    quantity: $(progression(2,3,4,5,6,7,8,9,10,10,11,11,12,12,13,13,14,14,15,15))

  # Level 1: Eldritch Invocations
  - type: Slot
    id: eldritchInvocations
    name: Eldritch Invocations
    target: eldritchInvocation OR classOptions
    quantity: $(progression(1,3,3,3,5,5,6,6,7,7,7,8,8,8,9,9,9,10,10,10))

  # Level 2: Magical Cunning
  - id: magicalCunning
    type: Activity
    name: Magical Cunning
    time: 10 minutes
    duration: Instantaneous
    condition: $(meta.level >= 2)
    tags: [limitedLR]
    description: |
      You perform an esoteric rite. At the end of it, you $(meta.level >= 20 ? "regain all your expended Pact Magic spell slots." : "regain expended Pact Magic spell slots equal to half your maximum (round up).")

  # Level 3: Warlock Subclass
  - id: warlockSubclass
    name: Warlock Subclass
    condition: $(meta.level >= 3)
    type: Slot
    target: warlockSubclass

  # Level 4: Ability Score Improvement
  - id: level4feat
    name: Level 4 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 4)

  # Level 8: Ability Score Improvement
  - id: level8feat
    name: Level 8 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 8)

  # Level 9: Contact Patron
  - type: Reference
    target: contactOtherPlane
    condition: $(meta.level >= 9)
  - name: Contact Patron
    type: Extra
    target: contactOtherPlane
    condition: $(meta.level >= 9)
    description: "You automatically succeed on the spell's saving throw. Once you cast this spell, you can't cast it again until you finish a long rest."

  # Level 11: Mystic Arcanum (Level 6)
  - id: mysticArcanum6
    type: Slot
    name: Mystic Arcanum (Level 6)
    target: warlock AND level6Spell
    quantity: 1
    condition: $(meta.level >= 11)
    overwrite:
      tags: [limitedLR]

  # Level 12: Ability Score Improvement
  - id: level12feat
    name: Level 12 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 12)

  # Level 13: Mystic Arcanum (Level 7)
  - id: mysticArcanum7
    type: Slot
    name: Mystic Arcanum (Level 7)
    target: warlock AND level7Spell
    quantity: 1
    condition: $(meta.level >= 13)
    overwrite:
      tags: [limitedLR]
    
  # Level 15: Mystic Arcanum (Level 8)
  - id: mysticArcanum8
    type: Slot
    name: Mystic Arcanum (Level 8)
    target: warlock AND level8Spell
    quantity: 1
    condition: $(meta.level >= 15)
    overwrite:
      tags: [limitedLR]

  # Level 16: Ability Score Improvement
  - id: level16feat
    name: Level 16 Feat
    type: Slot
    quantity: 1
    target: feat
    condition: $(meta.level >= 16)

  # Level 17: Mystic Arcanum (Level 9)
  - id: mysticArcanum9
    type: Slot
    name: Mystic Arcanum (Level 9)
    target: warlock AND level9Spell
    quantity: 1
    condition: $(meta.level >= 17)
    overwrite:
      tags: [limitedLR]

  # Level 19: Epic Boon
  - id: epicBoon
    type: Slot
    name: Epic Boon
    target: epicBoon
    condition: $(meta.level >= 19)

  # Level 20: Eldritch Master (Handled in Magical Cunning description)
