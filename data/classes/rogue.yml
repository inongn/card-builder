name: data.classes.rogue.name
description: data.classes.rogue.description
tags:
  - class
type: Folder
children:
  - name: data.classes.rogue.rogue1.name
    type: Folder
    children:
      - name: class
        type: Meta
        value: data.classes.rogue.name
      - name: Stat Suggestions
      - name: Core Rogue Traits
        type: Reference
        target:
          - d8HitDie
          - dexSave
          - intSave
          - lightArmorTraining
          - thievesTools
      - name: data.classes.rogue.rogueskillproficiencies.slotName
        type: Slot
        target: acrobaticsProficiency OR athleticsProficiency OR deceptionProficiency OR insightProficiency OR intimidationProficiency OR investigationProficiency OR perceptionProficiency OR persuasionProficiency OR sleightOfHandProficiency OR stealthProficiency
        quantity: 4
      - name: data.classes.rogue.skillExpertise.slotName
        type: Slot
        quantity: 2
        target: skillExpertise
      - type: Card
        name: data.classes.rogue.sneakAttack.name
        tags:
          - $(attributes.mainHand.category)
          - $(attributes.mainHand.mastery)
          - $(attributes.mainHand.tag)
          - mainHand
          - attack
          - sneakAttack
        id: sneakAttack
        time: action
        subtype: Rogue Class Feature
        condition: $(attributes.mainHand != null && (attributes.mainHand.category === 'finesse' || attributes.mainHand.tag === 'light'))
        range: $(attributes.mainHand.range)
        duration: Instantaneous
        description: data.classes.rogue.sneakAttack.description
      - type: Card
        name: data.classes.rogue.offHandSneakAttack.name
        tags:
          - $(attributes.offHand.category)
          - $(attributes.offHand.mastery)
          - $(attributes.offHand.tag)
          - offHand
          - attack
          - sneakAttack
        id: offHandSneakAttack
        time: bonus action
        subtype: Rogue Class Feature
        condition: $(attributes.offHand != null && (attributes.offHand.category === 'finesse' || attributes.offHand.tag === 'light'))
        range: $(attributes.offHand.range)
        duration: Instantaneous
        description: data.classes.rogue.offHandSneakAttack.description
      - name: Weapon Mastery
        type: Reference
        reference: masteryProperties
      - name: Equipment Suggestions
      - name: Skill Suggestions
      - name: Expertise Suggestions
  - name: data.classes.rogue.rogue2.name
    type: Folder
    condition: $(meta.level >= 2)
    children:
      - name: data.classes.rogue.cunningAction.name
        type: Card
        id: cunningAction
        time: bonus action
        subtype: Rogue Class Feature
        range: self
        description: data.classes.rogue.cunningAction.description
  - name: data.classes.rogue.rogue3.name
    type: Folder
    condition: $(meta.level >= 3)
    children:
      - name: data.classes.rogue.rogueSubclass.slotName
        type: Slot
        target: rogueSubclass
        quantity: 1
  - name: data.classes.rogue.rogue4.name
    type: Folder
    condition: $(meta.level >= 4)
    children:
      - name: data.classes.rogue.feat.slotName
        type: Slot
        target: feat
        quantity: 1
      - name: data.classes.rogue.steadyAim.name
        type: Card
        id: steadyAim
        time: bonus action
        subtype: Rogue Class Feature
        range: self
        description: data.classes.rogue.steadyAim.description
  - name: data.classes.rogue.rogue5.name
    type: Folder
    condition: $(meta.level >= 5)
    children:
      - name: Cunning Strike
        type: Effect
        target: cards[sneakAttack].extra
        operation: push
        value: data.classes.rogue.cunningstrike.value
      - name: data.classes.rogue.uncannyDodge.name
        type: Card
        id: uncannyDodge
        time: reaction
        subtype: Rogue Class Feature
        range: self
        description: data.classes.rogue.uncannyDodge.description
  - name: data.classes.rogue.rogue6.name
    type: Folder
    condition: $(meta.level >= 6)
    children:
      - name: data.classes.rogue.skillExpertise.slotName
        type: Slot
        quantity: 2
        target: skillExpertise
  - name: data.classes.rogue.rogue7.name
    type: Folder
    condition: $(meta.level >= 7)
    children:
      - name: data.classes.rogue.evasion.name
        type: Card
        id: evasion
        subtype: Rogue Class Feature
        range: self
        description: data.classes.rogue.evasion.description
      - name: data.classes.rogue.reliableTalent.name
        type: Card
        id: reliableTalent
        subtype: Rogue Class Feature
        range: self
        description: data.classes.rogue.reliableTalent.description
  - name: data.classes.rogue.rogue8.name
    type: Folder
    condition: $(meta.level >= 8)
    children:
      - name: data.classes.rogue.feat.slotName
        type: Slot
        target: feat
        quantity: 1
  - name: data.classes.rogue.rogue10.name
    type: Folder
    condition: $(meta.level >= 10)
    children:
      - name: data.classes.rogue.feat.slotName
        type: Slot
        target: feat
        quantity: 1
  - name: data.classes.rogue.rogue12.name
    type: Folder
    condition: $(meta.level >= 12)
    children:
      - name: data.classes.rogue.feat.slotName
        type: Slot
        target: feat
        quantity: 1
  - name: data.classes.rogue.rogue14.name
    type: Folder
    condition: $(meta.level >= 14)
    children:
      - name: Devious Strike
        type: Effect
        target: cards[sneakAttack].extra
        operation: push
        value: data.classes.rogue.deviousstrike.value
  - name: data.classes.rogue.rogue15.name
    type: Folder
    condition: $(meta.level >= 15)
    children:
      - name: Slippery Mind
        type: Reference
        target:
          - wisSave
          - chaSave
  - name: data.classes.rogue.rogue16.name
    type: Folder
    condition: $(meta.level >= 16)
    children:
      - name: data.classes.rogue.feat.slotName
        type: Slot
        target: feat
        quantity: 1
  - name: data.classes.rogue.rogue18.name
    type: Folder
    condition: $(meta.level >= 18)
    children:
      - name: data.classes.rogue.elusive.name
        type: Card
        id: elusive
        subtype: Rogue Class Feature
        range: self
        description: data.classes.rogue.elusive.description
  - name: data.classes.rogue.rogue19.name
    type: Folder
    condition: $(meta.level >= 19)
    children:
      - name: data.classes.rogue.epicBoon.slotName
        type: Slot
        target: epicBoon
  - name: data.classes.rogue.rogue20.name
    type: Folder
    condition: $(meta.level >= 20)
    children:
      - name: data.classes.rogue.strokeOfLuck.name
        type: Card
        id: strokeOfLuck
        subtype: Rogue Class Feature
        range: self
        resource: limited
        description: data.classes.rogue.strokeOfLuck.description
