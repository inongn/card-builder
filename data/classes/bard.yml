id: bard
name: Bard
description: |
  Invoking magic through music, dance, and verse, Bards are expert at inspiring others, soothing hurts, disheartening foes, and creating illusions. Bards believe the multiverse was spoken into existence and that remnants of its Words of Creation still resound and glimmer on every plane of existence.
tags:
  - class
type: Folder
children:

  # ==========================================
  # Core Traits
  # ==========================================
  - id: hitDie
    type: Attribute
    value: 8

  - id: className
    type: Effect
    target: meta.class
    operation: set
    value: Bard

  - id: saveProficiencies
    type: Reference
    target: [dexSave, chaSave]

  - id: weaponProficiencies
    type: Reference
    target: [simpleWeaponProficiency]

  - id: armorTraining
    type: Reference
    target: [lightArmorTraining]

  - id: skillProficiencies
    type: Slot
    name: Bard Skill Proficiencies
    target: skillProficiency
    quantity: 3
    
  # ==========================================
  # Level 1
  # ==========================================

  # --- Bardic Inspiration ---
  - id: bardicDie
    type: Attribute
    value: "$(meta.level >= 15 ? 12 : meta.level >= 10 ? 10 : meta.level >= 5 ? 8 : 6)"

  - id: bardicInspiration
    type: Resource
    name: Bardic Inspiration
    quantity: "$(Math.max(1, stats.cha.mod))"
    sr: "$(meta.level >= 5 ? 'all' : 0)" # Becomes Short Rest recharge at Level 5 (Font of Inspiration)
    icon: d$(attributes.bardicDie)

  - id: bardicInspiration
    type: Activity
    name: Bardic Inspiration
    time: bonus action
    range: 60 feet
    duration: 1 hour
    resource: bardicInspiration
    description: |
      Inspire another creature within range who can see or hear you. The creature gains one of your Bardic Inspiration dice (d$(attributes.bardicDie)).
      
      Once within the next hour when the creature fails a D20 Test, the creature can roll the die and add the number rolled to the d20, potentially turning the failure into a success. A creature can have only one Bardic Inspiration die at a time.

  # --- Spellcasting ---
  - id: spellcasting
    type: Reference
    target: [fullCaster, chaCaster]

  - id: bardCantrips
    type: Slot
    name: Bard Cantrips
    target: cantrip AND bard
    quantity: "$(meta.level >= 10 ? 4 : meta.level >= 4 ? 3 : 2)"

  - id: bardSpells
    type: Slot
    name: Prepared Spells
    # Magical Secrets (L10) adds Cleric, Druid, and Wizard to the selection pool
    target: "$(meta.level >= 10 ? 'bard OR cleric OR druid OR wizard' : 'bard') NOT cantrip $(local.maxLevel < 9 ? 'NOT level9Spell' : '') $(local.maxLevel < 8 ? 'NOT level8Spell' : '') $(local.maxLevel < 7 ? 'NOT level7Spell' : '') $(local.maxLevel < 6 ? 'NOT level6Spell' : '') $(local.maxLevel < 5 ? 'NOT level5Spell' : '') $(local.maxLevel < 4 ? 'NOT level4Spell' : '') $(local.maxLevel < 3 ? 'NOT level3Spell' : '') $(local.maxLevel < 2 ? 'NOT level2Spell' : '')"
    quantity: "$(progression(4,5,6,7,9,10,11,12,14,15,16,16,17,17,18,18,19,20,21,22))"
    variables:
      # Ensures chosen spells match available slot levels
      maxLevel: "$(meta.level >= 17 ? 9 : meta.level >= 15 ? 8 : meta.level >= 13 ? 7 : meta.level >= 11 ? 6 : meta.level >= 9 ? 5 : meta.level >= 7 ? 4 : meta.level >= 5 ? 3 : meta.level >= 3 ? 2 : 1)"

  # ==========================================
  # Level 2
  # ==========================================
  - id: expertise
    name: Bard Skill Expertise
    type: Slot
    target: skillExpertise
    quantity: "$(meta.level >= 9 ? 4 : 2)"
    condition: $(meta.level >= 2)
    description: "Choose two of your skill proficiencies. You gain Expertise in them."

  - id: jackOfAllTrades
    type: Reference
    condition: $(meta.level >= 2)
    target: [acrobaticsHalfProficiency, animalHandlingHalfProficiency, arcanaHalfProficiency, athleticsHalfProficiency, deceptionHalfProficiency, historyHalfProficiency, insightHalfProficiency, intimidationHalfProficiency, investigationHalfProficiency, medicineHalfProficiency, natureHalfProficiency, perceptionHalfProficiency, performanceHalfProficiency, persuasionHalfProficiency, religionHalfProficiency, sleightOfHandHalfProficiency, stealthHalfProficiency, survivalHalfProficiency]

  # ==========================================
  # Level 3
  # ==========================================
  # Subclass Slot (Placed near end per instructions, but defined here for flow. Will move in final output if strictly needed, but logical grouping is L3).
  # NOTE: Instruction Step 6 says "The subclass Slot must be near the end of the class file." I will place it at the end.

  # ==========================================
  # Level 4
  # ==========================================
  - id: level4Feat
    name: Level 4 Feat
    type: Slot
    target: feat
    quantity: 1
    condition: $(meta.level >= 4)

  # ==========================================
  # Level 5
  # ==========================================
  # Short Rest recharge handled in Bardic Inspiration resource 'sr' field.

  - id: fontOfInspiration
    type: Activity
    name: Font of Inspiration
    condition: $(meta.level >= 5)
    resource: level1SpellSlot
    description: "You regain one expended use of Bardic Inspiration."

  # ==========================================
  # Level 7
  # ==========================================
  - id: countercharm
    type: Activity
    name: Countercharm
    time: reaction
    range: 30 feet
    condition: $(meta.level >= 7)
    description: |
      When you or an ally within range fails a saving throw, against an effect that applies the Charmed or Frightened condition, use musical notes or words of power to disrupt its mind-influencing effect. Cause the save to be rerolled, and the new roll has Advantage.

  # ==========================================
  # Level 8
  # ==========================================
  - id: level8Feat
    name: Level 8 Feat
    type: Slot
    target: feat
    quantity: 1
    condition: $(meta.level >= 8)

  # ==========================================
  # Level 9
  # ==========================================

  # ==========================================
  # Level 10
  # ==========================================
  # Magical Secrets is handled via the ternary in the 'bardSpells' Slot 'target' field.

  # ==========================================
  # Level 12
  # ==========================================
  - id: level12Feat
    name: Level 12 Feat
    type: Slot
    target: feat
    quantity: 1
    condition: $(meta.level >= 12)

  # ==========================================
  # Level 16
  # ==========================================
  - id: level16Feat
    name: Level 16 Feat
    type: Slot
    target: feat
    quantity: 1
    condition: $(meta.level >= 16)

  # ==========================================
  # Level 18
  # ==========================================
  - id: superiorInspiration
    type: Activity
    name: Superior Inspiration
    condition: $(meta.level >= 18)
    description: "When you roll Initiative, you regain expended uses of Bardic Inspiration until you have two if you have fewer than that."

  # ==========================================
  # Level 19
  # ==========================================
  - id: epicBoon
    name: Epic Boon
    type: Slot
    target: epicBoon
    quantity: 1
    condition: $(meta.level >= 19)

  # ==========================================
  # Level 20
  # ==========================================
  - id: wordsOfCreation
    type: Reference
    target: [powerWordHeal, powerWordKill]
    condition: $(meta.level >= 20)
    overwrite:
      extra: |
        **Words of Creation** When you cast this spell, you can target a second creature with it if that creature is within 10 feet of the first target.

  # ==========================================
  # Subclass
  # ==========================================
  - id: bardSubclass
    name: Bard Subclass
    type: Slot
    target: bardSubclass
    condition: $(meta.level >= 3)