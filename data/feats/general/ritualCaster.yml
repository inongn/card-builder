id: ritualCaster
name: Ritual Caster
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Ritual Caster Spells
    type: Slot
    target: level1Spell and ritual
    id: ritualCasterSpells
    quantity: $(attributes.prof)
  - name: Quick Ritual
    type: Extra
    target: ritual
    description: You can cast this spell using its regular casting time rather than the extended time for a Ritual. Doing so doesn't require a spell slot. Once you cast the spell in this way, you can't use this benefit again until you finish a Long Rest.
