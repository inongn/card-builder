id: telekinetic
name: Telekinetic
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Psionic Talent
    type: Reference
    target: mageHand
  - name: Telekinetic Shove
    type: Activity
    id: telekineticShove
    time: bonus action
    range: 30 feet
    description: 'You try to telekinetically shove one creature you can see within range. The target must succeed on a DC $(8 + stats.int.mod + attributes.prof) Strength saving throw or be moved 5 feet toward or away from you. A creature can willingly fail this save.'
