id: inspiringLeader
name: Inspiring Leader
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Bolstering Performance
    type: Extra
    target: shortRest OR longRest
    description: 'At the end of a Short Rest or Long Rest, you can give an inspiring performance — a speech, song, or dance. When you do so, choose up to $(5 + attributes.prof) allies who witnessed the performance. The chosen creatures each gain Temporary Hit Points equal to $(meta.level + stats.cha.mod).'
