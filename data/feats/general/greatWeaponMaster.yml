id: greatWeaponMaster
name: Great Weapon Master
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Heavy Weapon Mastery
    type: Effect
    target: activities[weaponAttack and melee and twoHanded].description["$(formatBonus(attributes.melee.bonus))"]
    operation: replace
    value: $(formatBonus(attributes.melee.bonus+attributes.prof))
  - name: Hew
    type: Extra
    target: weaponAttack and melee and twoHanded
    description: On a Critical Hit or when you reduce the target to 0 Hit Points, you can make another attack as a Bonus Action.
