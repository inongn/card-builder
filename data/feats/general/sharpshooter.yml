id: sharpshooter
name: Sharpshooter
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Bypass Cover
    type: Extra
    target: attack and ranged
    description: This attack ignores Half Cover and Three-Quarters Cover.
  - name: Firing in Melee
    type: Extra
    target: attack and ranged
    description: Being within 5 feet of an enemy doesn't impose Disadvantage on this attack.
  - name: Precision Shot
    type: Extra
    target: attack and ranged
    description: On a hit, the target takes $(attributes.prof) extra damage. You can use this benefit only once per turn.