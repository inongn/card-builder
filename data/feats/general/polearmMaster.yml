id: polearmMaster
name: Polearm Master
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Reactive Strike
    type: Extra
    target: opportunityAttack
    description: You can make an Opportunity Attack when a creature enters your reach.
  - id: poleStrike
    name: Pole Strike
    type: Activity
    time: bonus action
    range: self
    duration: instantaneous
    description: "When you make an attack with a Quarterstaff, Spear, Glaive, Halberd, Lance, or Pike, make a $(formatBonus(attributes.melee.bonus)) attack with the opposite end of it. On a hit, deal 1d4$(formatBonus(attributes.melee.bonus)) Bludgeoning damage."