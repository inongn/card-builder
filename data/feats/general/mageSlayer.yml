id: mageSlayer
name: Mage Slayer
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Concentration Breaker
    type: Extra
    target: weaponAttack or attackSpell
    description: On a hit, the target has Disadvantage on any saving throw it makes to maintain Concentration.
