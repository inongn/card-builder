id: crossbowExpert
name: Crossbow Expert
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - type: Effect
    target: activities[offHand AND ranged].description
    operation: set
    value: "You strike at a creature or object within range with your weapon. Make a $(formatBonus(attributes[attributes.offHand.classification].attack)) attack against the target. On a hit, the target takes $(attributes.offHand.damageRoll)$(formatBonus(attributes[attributes.offHand.classification].bonus)) $(attributes.offHand.damageType) damage."