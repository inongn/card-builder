id: chef
name: Chef
tags:
  - feat
  - generalFeat
type: Folder
children:

  - type: Reference
    target: cooksUtensils
    
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Replenishing Meal
    type: Extra
    target: shortRest
    description: 'You can cook special food if you have ingredients and Cook''s Utensils on hand. You can prepare enough of this food for $(4 + attributes.prof) creatures. Any creature who eats the food and spends one or more Hit Dice to regain Hit Points regains an extra 1d8 Hit Points.'
  - name: Bolstering Treats
    type: Activity
    time: 1 hour
    description: 'With 1 hour of work or when you finish a Long Rest, you cook a number of treats equal to $(attributes.prof) if you have ingredients and Cook''s Utensils on hand. These special treats last 8 hours after being made. A creature can use a Bonus Action to eat one of those treats to gain $(attributes.prof) Temporary Hit Points.'
