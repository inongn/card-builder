- id: fastCrafting
  type: Activity
  name: Fast Crafting
  time: free action
  duration: Instantaneous
  description: |
    When you finish a Long Rest, you craft one piece of gear from the Fast Crafting table, provided you have the Artisan's Tools associated with that item and have proficiency with those tools. The item lasts until you finish another Long Rest, at which point the item falls apart.
    
    **Fast Crafting table:**

    Carpenter's Tools - Ladder, Torch; 

    Leatherworker's Tools - Case, Pouch; 

    Mason's Tools - Block and Tackle; 

    Potter's Tools - Jug, Lamp; 

    Smith's Tools - Ball Bearings, Bucket, Caltrops, Grappling Hook, Iron Pot; 

    Tinker's Tools - Bell, Shovel, Tinder Box; 

    Weaver's Tools - Basket, Rope, Net, Tent; 

    Woodcarver's Tools - Club, Greatclub, Quarterstaff.
