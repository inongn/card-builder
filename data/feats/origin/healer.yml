id: healer
name: Healer
tags:
- feat
- originFeat
type: Folder
children:
- id: battleMedic
  type: Activity
  name: Battle Medic
  time: action
  range: 5 feet
  description: 'You tend to a creature within range. That creature can expend one
    of its Hit Point Dice, and you then roll that die. The creature regains Hit Points
    equal to the roll plus a $(attributes.prof) Bonus.

    '
- id: healingRerolls
  type: Extra
  target: healingSpell
  name: Healing Rerolls
  description: Whenever you roll a die to determine the number of Hit Points you restore
    with a spell or with this feat's Battle Medic benefit, you can reroll the die
    if it rolls a 1, and you must use the new roll.
