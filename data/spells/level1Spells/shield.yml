id: shield
type: Activity
name: Shield
resource: level1SpellSlot
tags: [level1Spell, abjuration, sorcerer, wizard]
time: reaction
range: self
duration: 1 round
description: |
  Immediately after being hit by an attack roll or targeted by the Magic Missile spell, an imperceptible barrier of magical force protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from Magic Missile.

