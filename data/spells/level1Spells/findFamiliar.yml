id: findFamiliar
type: Folder
name: Find Familiar
tags: [level1Spell, conjuration, wizard, ritual]
children:
  - type: Slot
    id: familiarType
    name: Familiar Type
    quantity: 1
    target: familiarCelestial OR familiarFey OR familiarFiend
  - type: Slot
    id: familiarEnvironment
    name: Familiar Environment
    quantity: 1
    target: familiarLand OR familiarAir OR familiarWater
  - id: familiarName
    type: Input
    name: Familiar Name
    inputType: text
    label: Familiar Name

  - type: Reference
    target: "otherworldlyFamiliar$(meta.familiarEnvironment || 'Land')$(meta.familiarType || 'Celestial')"