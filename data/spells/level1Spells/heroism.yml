id: heroism
type: Activity
name: Heroism
resource: level1SpellSlot
tags: [level1Spell, enchantment, bard, paladin]
time: action
range: touch
duration: concentration, up to 1 minute
description: |
  A willing creature you touch is imbued with bravery. Until the spell ends, the creature is immune to the Frightened condition and gains Temporary Hit Points equal to $(attributes.spellcasting.bonus) at the start of each of its turns.

  **Using a Higher-Level Spell Slot.** You can target one additional creature for each spell slot level above 1.

