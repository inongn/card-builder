id: healingWord
type: Activity
name: Healing Word
resource: level1SpellSlot
tags: [level1Spell, abjuration, bard, cleric, druid, healingSpell]
time: bonus action
range: 60 feet
duration: instantaneous
description: |
  A creature of your choice that you can see within range regains Hit Points equal to 2d4$(formatBonus(attributes.spellcasting.bonus)).

  **Using a Higher-Level Spell Slot.** The healing increases by 2d4 for each spell slot level above 1.

