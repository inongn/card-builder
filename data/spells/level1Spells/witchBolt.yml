id: witchBolt
type: Activity
name: Witch Bolt
resource: level1SpellSlot
tags: [level1Spell, evocation, sorcerer, warlock, wizard, attackSpell, damageSpell, lightningDamage]
time: action
range: 60 feet
duration: concentration, up to 1 minute
description: |
  A beam of crackling energy lances toward a creature within range, forming a sustained arc of lightning between you and the target. Make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack against it. On a hit, the target takes 2d12 Lightning damage.

  On each of your subsequent turns, you can take a Bonus Action to deal 1d12 Lightning damage to the target automatically, even if the first attack missed.

  The spell ends if the target is ever outside the spell’s range or if it has Total Cover from you.

  **Using a Higher-Level Spell Slot.** The initial damage increases by 1d12 for each spell slot level above 1.

