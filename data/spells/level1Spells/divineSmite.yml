id: divineSmite
type: Activity
name: Divine Smite
resource: level1SpellSlot
tags: [level1Spell, evocation, paladin]
time: bonus action
range: self
duration: instantaneous
description: |
  Immediately after hitting a target with a Melee weapon or an Unarmed Strike, the target takes an extra 2d8 Radiant damage from the attack. The damage increases by 1d8 if the target is a Fiend or an Undead.

  **Using a Higher-Level Spell Slot.** The damage increases by 1d8 for each spell slot level above 1.

