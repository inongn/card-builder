id: hailOfThorns
type: Activity
name: Hail of Thorns
resource: level1SpellSlot
tags: [level1Spell, conjuration, ranger, saveSpell, damageSpell, piercingDamage]
time: bonus action
range: self
duration: instantaneous
description: |
  Immediately after hitting a creature with a Ranged weapon, this spell creates a rain of thorns that sprouts from your Ranged weapon or ammunition. The target of the attack and each creature within 5 feet of it make a DC $(attributes.spellcasting.save) Dexterity saving throw, taking 1d10 Piercing damage on a failed save or half as much damage on a successful one.

  **Using a Higher-Level Spell Slot.** The damage increases by 1d10 for each spell slot level above 1.

