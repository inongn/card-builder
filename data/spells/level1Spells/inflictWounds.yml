id: inflictWounds
type: Activity
name: Inflict Wounds
resource: level1SpellSlot
tags: [level1Spell, necromancy, cleric, saveSpell, damageSpell, necroticDamage]
time: action
range: touch
duration: instantaneous
description: |
  A creature you touch makes a DC $(attributes.spellcasting.save) Constitution saving throw, taking 2d10 Necrotic damage on a failed save or half as much damage on a successful one.

  **Using a Higher-Level Spell Slot.** The damage increases by 1d10 for each spell slot level above 1.

