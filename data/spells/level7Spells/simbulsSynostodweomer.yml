id: simbulsSynostodweomer
condition: $(meta.setting === 'faerun')
type: Activity
name: Simbul's Synostodweomer
resource: level7SpellSlot
tags: [level7Spell, transmutation, sorcerer, wizard, healingSpell]
time: action
range: touch
duration: 1 hour
description: |
  You imbue one creature you touch with magical healing energy for the duration. Whenever the target casts a spell using a spell slot, the target can immediately roll a number of unexpended Hit Point Dice equal to the spell slot’s level and regain Hit Points equal to the roll’s total$(formatBonus(attributes.spellcasting.bonus)); those dice are then expended.

