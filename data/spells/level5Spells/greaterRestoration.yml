id: greaterRestoration
type: Activity
name: Greater Restoration
resource: level5SpellSlot
tags: [level5Spell, abjuration, artificer, bard, cleric, druid, paladin, ranger]
time: action
range: touch
duration: instantaneous
description: |
  You touch a creature and magically remove one of the following effects from it:



  1 Exhaustion level

  The Charmed or Petrified condition

  A curse, including the target’s Attunement to a cursed magic item

  Any reduction to one of the target’s ability scores

  Any reduction to the target’s Hit Point maximum

