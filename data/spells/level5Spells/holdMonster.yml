id: holdMonster
type: Activity
name: Hold Monster
resource: level5SpellSlot
tags: [level5Spell, enchantment, bard, sorcerer, warlock, wizard, saveSpell]
time: action
range: 90 feet
duration: concentration, up to 1 minute
description: |
  Choose a creature that you can see within range. The target must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or have the Paralyzed condition for the duration. At the end of each of its turns, the target repeats the save, ending the spell on itself on a success.

  **Using a Higher-Level Spell Slot.** You can target one additional creature for each spell slot level above 5.

