id: summonCelestial
type: Folder
name: Summon Celestial
tags: [level5Spell, conjuration, cleric, paladin]
children:
  - type: Activity
    name: "Summon Celestial: Avenger"
    id: summonCelestialAvenger
    tags: [summonCelestialActivity]
    time: action
    range: 90 feet
    resource: level5SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth an avenger celestial spirit.

      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 40 + 10 for each spell level above 5
      >
      >**Speed** 30 ft., fly 40 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 16 (+3) | 14 (+0) | 16 (+3) | 10 (+0) | 14 (+2) | 16 (+3) |
      >
      >---
      >
      >**Resistances** Radiant
      >
      >**Immunities** Charmed, Frightened
      >
      >**Senses** darkvision 60 ft., passive Perception 12
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of Rend attacks equal to half this spell’s level (round down).
      >
      >***Radiant Bow.*** _Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, range 600 ft. _Hit:_ 2d6 + 2 + the spell’s level Radiant damage.
      >
      >***Healing Touch (1/Day).*** The spirit touches another creature. The target regains Hit Points equal to 2d8 + the spell’s level.

  - type: Activity
    name: "Summon Celestial: Defender"
    id: summonCelestialDefender
    tags: [summonCelestialActivity]
    time: action
    range: 90 feet
    resource: level5SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth a defender celestial spirit.

      >**Armor Class** 13 + the spell’s level
      >
      >**Hit Points** 40 + 10 for each spell level above 5
      >
      >**Speed** 30 ft., fly 40 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 16 (+3) | 14 (+0) | 16 (+3) | 10 (+0) | 14 (+2) | 16 (+3) |
      >
      >---
      >
      >**Resistances** Radiant
      >
      >**Immunities** Charmed, Frightened
      >
      >**Senses** darkvision 60 ft., passive Perception 12
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of Rend attacks equal to half this spell’s level (round down).
      >
      >***Radiant Mace.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d10 + 3 + the spell’s level Radiant damage, and the spirit can choose itself or another creature it can see within 10 feet of the target. The chosen creature gains 1d10 Temporary Hit Points.
      >
      >***Healing Touch (1/Day).*** The spirit touches another creature. The target regains Hit Points equal to 2d8 + the spell’s level.