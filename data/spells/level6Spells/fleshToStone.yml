id: fleshToStone
type: Activity
name: Flesh to Stone
resource: level6SpellSlot
tags: [level6Spell, transmutation, druid, sorcerer, wizard, saveSpell]
time: action
range: 60 feet
duration: concentration, up to 1 minute
description: |
  You attempt to turn one creature that you can see within range into stone. The target makes a DC $(attributes.spellcasting.save) Constitution saving throw. On a failed save, it has the Restrained condition for the duration. On a successful save, its Speed is 0 until the start of your next turn. Constructs automatically succeed on the save.

  A Restrained target makes another DC $(attributes.spellcasting.save) Constitution saving throw at the end of each of its turns. If it successfully saves against this spell three times, the spell ends. If it fails its saves three times, it is turned to stone and has the Petrified condition for the duration. The successes and failures needn’t be consecutive; keep track of both until the target collects three of a kind.

  If you maintain your Concentration on this spell for the entire possible duration, the target is Petrified until the condition is ended by Greater Restoration or similar magic.

