id: fear
type: Activity
name: Fear
resource: level3SpellSlot
tags: [level3Spell, illusion, bard, sorcerer, warlock, wizard, saveSpell]
time: action
range: self
duration: concentration, up to 1 minute
description: |
  Each creature in a 30-foot Cone must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or drop whatever it is holding and have the Frightened condition for the duration.

  A Frightened creature takes the Dash action and moves away from you by the safest route on each of its turns unless there is nowhere to move. If the creature ends its turn in a space where it doesn’t have line of sight to you, the creature makes a DC $(attributes.spellcasting.save) Wisdom saving throw. On a successful save, the spell ends on that creature.

