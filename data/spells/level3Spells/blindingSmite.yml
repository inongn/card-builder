id: blindingSmite
type: Activity
name: Blinding Smite
resource: level3SpellSlot
tags: [level3Spell, evocation, paladin, saveSpell, damageSpell, radiantDamage]
time: bonus action
range: self
duration: 1 minute
description: |
  Immediately after hitting a creature with a Melee weapon or an Unarmed Strike, the target hit by the strike takes an extra 3d8 Radiant damage from the attack, and the target has the Blinded condition until the spell ends. At the end of each of its turns, the Blinded target makes a DC $(attributes.spellcasting.save) Constitution saving throw, ending the spell on itself on a success.

  **Using a Higher-Level Spell Slot.** The extra damage increases by 1d8 for each spell slot level above 3.

