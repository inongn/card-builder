id: summonUndead
type: Folder
name: Summon Undead
tags: [level3Spell, necromancy, warlock, wizard]
children:
  - type: Activity
    name: "Summon Undead: Ghostly"
    id: summonUndeadGhostly
    tags: [summonUndeadActivity]
    time: action
    range: 90 feet
    resource: level3SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth a Ghostly Undead spirit.

      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 30 + 10 for each spell level above 3
      >
      >**Speed** 30 ft., fly 40 ft. (hover)
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 12 (+1) | 16 (+3) | 15 (+2) | 4 (-3) | 10 (+0) | 9 (-1) |
      >
      >---
      >
      >**Immunities** Necrotic; Poison; Exhaustion; Frightened; Paralyzed; Poisoned
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >**Incorporeal Passage.** The spirit can move through other creatures and objects as if they were Difficult Terrain. If it ends its turn inside an object, it is shunted to the nearest unoccupied space and takes 1d10 Force damage for every 5 feet traveled.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Deathly Touch.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + 3 + the spell’s level Necrotic damage, and the target has the Frightened condition until the end of its next turn.

  - type: Activity
    name: "Summon Undead: Skeletal"
    id: summonUndeadSkeletal
    tags: [summonUndeadActivity]
    time: action
    range: 90 feet
    resource: level3SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth a Skeletal Undead spirit.

      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 20 + 10 for each spell level above 3
      >
      >**Speed** 30 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 12 (+1) | 16 (+3) | 15 (+2) | 4 (-3) | 10 (+0) | 9 (-1) |
      >
      >---
      >
      >**Immunities** Necrotic; Poison; Exhaustion; Frightened; Paralyzed; Poisoned
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Grave Bolt (Skeletal Only).*** _Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, range 150 ft. _Hit:_ 2d4 + 3 + the spell’s level Necrotic damage.

  - type: Activity
    name: "Summon Undead: Putrid"
    id: summonUndeadPutrid
    tags: [summonUndeadActivity]
    time: action
    range: 90 feet
    resource: level3SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth a Putrid Undead spirit.

      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 30 + 10 for each spell level above 3
      >
      >**Speed** 30 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 12 (+1) | 16 (+3) | 15 (+2) | 4 (-3) | 10 (+0) | 9 (-1) |
      >
      >---
      >
      >**Immunities** Necrotic; Poison; Exhaustion; Frightened; Paralyzed; Poisoned
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >**Festering Aura** _Constitution Saving Throw:_ DC $(attributes.spellcasting.save), any creature (other than you) that starts its turn within a 5-foot emanation originating from the spirit. _Failure:_ The creature has the Poisoned condition until the start of its next turn.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Rotting Claw.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d6 + 3 + the spell’s level Slashing damage. If the target has the Poisoned condition, it has the Paralyzed condition until the end of its next turn.