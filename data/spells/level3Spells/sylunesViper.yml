id: sylunesViper
type: Activity
name: Sylune's Viper
resource: level3SpellSlot
tags: [level3Spell, conjuration, druid, wizard, attackSpell, damageSpell, forceDamage]
time: bonus action
range: self
duration: 1 hour
description: |
  A shimmering, spectral snake encircles your body for the duration. You gain 15 Temporary Hit Points; the spell ends early if you have no Temporary Hit Points left.

  While the spell is active, you gain the following benefits:

  **Climbing.** You gain a Climb Speed equal to your Speed.

  **Venomous Bite.** As a Magic action, you can make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack using the snake against one creature within 50 feet. On a hit, the target takes 1d6 Force damage and has the Poisoned condition until the start of your next turn. While Poisoned, the target has the Incapacitated condition.

  **Using a Higher-Level Spell Slot.** For each spell slot level above 3, the number of Temporary Hit Points you gain from this spell increases by 5, and the damage of Venomous Bite increases by 1d6.

