id: massHealingWord
type: Activity
name: Mass Healing Word
resource: level3SpellSlot
tags: [level3Spell, abjuration, bard, cleric, healingSpell]
time: bonus action
range: 60 feet
duration: instantaneous
description: |
  Up to six creatures of your choice that you can see within range regain Hit Points equal to 2d4$(formatBonus(attributes.spellcasting.bonus)).

  **Using a Higher-Level Spell Slot.** The healing increases by 1d4 for each spell slot level above 3.

