id: iceStorm
type: Activity
name: Ice Storm
resource: level4SpellSlot
tags: [level4Spell, evocation, druid, sorcerer, wizard, saveSpell, damageSpell, bludgeoningDamage, coldDamage]
time: action
range: 300 feet
duration: instantaneous
description: |
  Hail falls in a 20-foot-radius, 40-foot-high Cylinder centered on a point within range. Each creature in the Cylinder makes a DC $(attributes.spellcasting.save) Dexterity saving throw. A creature takes 2d10 Bludgeoning damage and 4d6 Cold damage on a failed save or half as much damage on a successful one.

  Hailstones turn ground in the Cylinder into Difficult Terrain until the end of your next turn.

  **Using a Higher-Level Spell Slot.** The Bludgeoning damage increases by 1d10 for each spell slot level above 4.

