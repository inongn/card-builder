id: summonElemental
type: Folder
name: Summon Elemental
tags: [level4Spell, conjuration, druid, ranger, wizard]
children:
  - type: Activity
    id: summonElementalActivity
    tags: [summonElementalActivity]
    name: "Summon Elemental"
    time: action
    range: 90 feet
    resource: level4SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth an elemental spirit. It manifests in an unoccupied space that you can see within range and uses the Elemental Spirit stat block. When you cast the spell, choose an element: Air, Earth, Fire, or Water. The creature resembles an elemental of your choice marked by the chosen element, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.

      The creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don’t issue any, it takes the Dodge action and uses its movement to avoid danger.
    extra:
      - name: Using a Higher-Level Spell Slot
        description: Use the spell slot’s level for the spell’s level in the stat block.
  - type: Reference
    target: [elementalSpiritAir, elementalSpiritEarth, elementalSpiritFire, elementalSpiritWater]