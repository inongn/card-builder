id: backlash
type: Activity
name: Backlash
condition: $(meta.setting === 'faerun')
resource: level4SpellSlot
tags: [level4Spell, abjuration, bard, sorcerer, warlock, wizard, saveSpell, damageSpell, forceDamage]
time: reaction
range: 60 feet
duration: instantaneous
description: |
  Immediately after taking damage, you ward yourself against destructive energy, reducing the damage taken by 4d6$(formatBonus(attributes.spellcasting.bonus)).

  If the triggering damage was from a creature within range, you can force the creature to make a DC $(attributes.spellcasting.save) Constitution saving throw. The creature takes 4d6 Force damage on a failed save or half as much damage on a successful one.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage reduction and Force damage from this spell both increase by 1d6 for every spell slot level above 4.
