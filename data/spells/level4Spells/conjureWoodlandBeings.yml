id: conjureWoodlandBeings
type: Activity
name: Conjure Woodland Beings
resource: level4SpellSlot
tags: [level4Spell, conjuration, druid, ranger, saveSpell, damageSpell, forceDamage]
time: action
range: self
duration: concentration, up to 10 minutes
description: |
  You conjure nature spirits that flit around you in a 10-foot Emanation for the duration. Whenever the Emanation enters the space of a creature you can see and whenever a creature you can see enters the Emanation or ends its turn there, you can force that creature to make a DC $(attributes.spellcasting.save) Wisdom saving throw. The creature takes 5d8 Force damage on a failed save or half as much damage on a successful one. A creature makes this save only once per turn.

  In addition, you can take the Disengage action as a Bonus Action for the spell’s duration.

  **Using a Higher-Level Spell Slot.** The damage increases by 1d8 for each spell slot level above 4.

