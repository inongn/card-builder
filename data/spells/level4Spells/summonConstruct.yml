id: summonConstruct
type: Folder
name: Summon Construct
tags: [level4Spell, conjuration, artificer, wizard]
children:
  - type: Activity
    name: "Summon Construct: Clay"
    id: summonConstructClay
    tags: [summonConstructActivity]
    time: action
    range: 90 feet
    resource: level4SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth the spirit of a Clay Construct

      >**Armor Class** 13 + the spell’s level
      >
      >**Hit Points** 40 + 15 for each spell level above 4
      >
      >**Speed** 30 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 18 (+4) | 10 (+0) | 18 (+4) | 14 (+2) | 11 (+0) | 5 (-3) |
      >
      >---
      >
      >**Resistances** Poison
      >
      >**Immunities** Charmed, Exhaustion, Frightened, Paralyzed, Poisoned
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of Slam attacks equal to half this spell’s level (round down).
      >
      >***Slam.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + 4 + the spell’s level Bludgeoning damage.
      >
      >***(Reaction) Berserk Lashing.*** _Trigger_: The spirit takes damage from a creature. _Response_: The spirit makes a Slam attack against that creature if possible, or the spirit moves up to half its Speed toward that creature without provoking Opportunity Attacks.

