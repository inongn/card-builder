id: staggeringSmite
type: Activity
name: Staggering Smite
resource: level4SpellSlot
tags: [level4Spell, enchantment, paladin, saveSpell, damageSpell, psychicDamage]
time: bonus action
range: self
duration: instantaneous
description: |
  Immediately after hitting a creature with a Melee weapon or an Unarmed Strike, the target takes an extra 4d6 Psychic damage from the attack, and the target must succeed on a DC $(attributes.spellcasting.save) Wisdom saving throw or have the Stunned condition until the end of your next turn.

  **Using a Higher-Level Spell Slot.** The extra damage increases by 1d6 for each spell slot level above 4.

