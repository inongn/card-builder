id: spiritualWeapon
type: Activity
name: Spiritual Weapon
resource: level2SpellSlot
tags: [level2Spell, evocation, cleric]
time: bonus action
range: 60 feet
duration: concentration, up to 1 minute
description: |
  You create a floating, spectral force that resembles a weapon of your choice and lasts for the duration. The force appears within range in a space of your choice, and you can immediately make one melee spell attack against one creature within 5 feet of the force. On a hit, the target takes Force damage equal to 1d8$(formatBonus(attributes.spellcasting.bonus)).

  As a Bonus Action on your later turns, you can move the force up to 20 feet and repeat the attack against a creature within 5 feet of it.

  **Using a Higher-Level Spell Slot.** The damage increases by 1d8 for every slot level above 2.

