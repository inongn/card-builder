id: blindnessdeafness
type: Activity
name: Blindness/Deafness
resource: level2SpellSlot
tags: [level2Spell, transmutation, bard, cleric, sorcerer, wizard, saveSpell]
time: action
range: 120 feet
duration: 1 minute
description: |
  One creature that you can see within range must succeed on a DC $(attributes.spellcasting.save) Constitution saving throw, or it has the Blinded or Deafened condition (your choice) for the duration. At the end of each of its turns, the target repeats the save, ending the spell on itself on a success.

  **Using a Higher-Level Spell Slot.** You can target one additional creature for each spell slot level above 2.

