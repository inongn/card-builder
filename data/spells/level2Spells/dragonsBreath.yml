id: dragonsBreath
type: Activity
name: Dragon's Breath
resource: level2SpellSlot
tags: [level2Spell, transmutation, artificer, sorcerer, wizard, saveSpell, damageSpell, fireDamage, coldDamage, acidDamage, poisonDamage, lightningDamage]
time: bonus action
range: touch
duration: concentration, up to 1 minute
description: |
  You touch one willing creature, and choose Acid, Cold, Fire, Lightning, or Poison. Until the spell ends, the target can take a Magic action to exhale a 15-foot Cone. Each creature in that area makes a DC $(attributes.spellcasting.save) Dexterity saving throw, taking 3d6 damage of the chosen type on a failed save or half as much damage on a successful one.

  **Using a Higher-Level Spell Slot.** The damage increases by 1d6 for each spell slot level above 2.

