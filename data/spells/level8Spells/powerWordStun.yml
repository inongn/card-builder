id: powerWordStun
type: Activity
name: Power Word Stun
resource: level8SpellSlot
tags: [level8Spell, enchantment, bard, sorcerer, warlock, wizard, saveSpell]
time: action
range: 60 feet
duration: instantaneous
description: |
  You overwhelm the mind of one creature you can see within range. If the target has 150 Hit Points or fewer, it has the Stunned condition. Otherwise, its Speed is 0 until the start of your next turn.

  The Stunned target makes a DC $(attributes.spellcasting.save) Constitution saving throw at the end of each of its turns, ending the condition on itself on a success.

