id: carefulSpell
name: Careful Spell
type: Folder
tags:
  - metamagic
children:
  - id: carefulSpellActivity
    type: Activity
    name: Careful Spell
    resource: 1 sorceryPoints
    description: "When you cast a spell that forces other creatures to make a saving throw, you protect some of those creatures from the spell’s full force. Choose a number of those creatures up to $(Math.max(1, stats.cha.mod)). A chosen creature automatically succeeds on its saving throw against the spell, and it takes no damage if it would normally take half damage on a successful save."
