type: Statblock
name: Elemental Spirit
id: elementalSpirit
category: summon
tags: [summon]
size: Medium
classification: Elemental
ac: 11 + the spell's level
hp: 50 + 10 for each spell level above 4
movement:
  walk: 40
  burrow: (Earth only) 40
  fly: (hover; Air only) 40
  swim: (Water only) 40
stats:
  str: 18
  dex: 15
  con: 17
  int: 4
  wis: 10
  cha: 16
resistances: [Acid (Water only), Lightning and Thunder (Air only), Piercing and Slashing (Earth only)]
immunities: [Fire (Fire only), Poison, Exhaustion, Paralyzed, Petrified, Poisoned]
senses:
  darkvision: 60
challenge: 0
cr: 0
traits:
  - name: Amorphous Form (Air, Fire, and Water Only)
    description: "The spirit can move through a space as narrow as 1 inch wide without it counting as Difficult Terrain."
actions:
  - name: Multiattack
    description: "The spirit makes a number of Slam attacks equal to half this spell’s level (round down)."
  - name: Slam
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d10$(formatBonus(stats.str.mod)) + the spell's level Bludgeoning (Earth only), Cold (Water only), Lightning (Air only), or Fire (Fire only) damage."
