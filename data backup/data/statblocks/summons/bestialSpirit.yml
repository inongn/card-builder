type: Statblock
name: Bestial Spirit
id: bestialSpirit
category: summon
tags: [summon]
size: Medium
classification: Beast
ac: 11 + the spell's level
hp: 20 (Air only) or 30 (Land and Water only) + 5 for each spell level above 2
movement:
  walk: 30
  climb: (Land Only) 30 
  fly: (Air Only) 30
  swim: (Water Only) 30
stats:
  str: 18
  dex: 11
  con: 16
  int: 4
  wis: 14
  cha: 5
senses:
  darkvision: 60
challenge: 0
cr: 0
traits:
  - name: Pack Tactics (Land and Water Only)
    description: "The spirit has Advantage on an attack roll against a creature if at least one of the spirit’s allies is within 5 feet of the creature and the ally doesn’t have the Incapacitated condition"
  - name: Flyby (Air Only)
    description: "The spirit doesn't provoke an opportunity attack when it flies out of an enemy's reach."
  - name: Water Breathing (Water Only)
    description: "The spirit can breathe air and water."
actions:
  - name: Multiattack
    description: "The spirit makes a number of attacks equal to half this spell’s level (round down)."
  - name: Rend
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.wis.mod)) Piercing damage."