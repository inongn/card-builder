type: Statblock
name: Fiendish Spirit
id: fiendishSpirit
category: summon
tags: [summon]
size: Large
classification: Fiend
ac: 12 + the spell's level
hp: 50 (Demon only) or 40 (Devil only) or 60 (Yugoloth only) + 15 for each spell level above 6
movement:
  walk: 40
  climb: (Demon only) 40
  fly: (Devil only) 60
stats:
  str: 13
  dex: 16
  con: 15
  int: 10
  wis: 10
  cha: 16
resistances: [Fire]
immunities: [Poison, Poisoned]
senses:
  darkvision: 60
challenge: 0
cr: 0
traits:
  - name: Death Throes (Demon Only)
    description: "When the spirit drops to 0 Hit Points or the spell ends, the spirit explodes. _Dexterity Saving Throw:_ DC $(attributes.spellcasting.save), each creature in a 10-foot Emanation originating from the spirit. _Failure:_ 2d10 + this spell’s level Fire damage. _Success:_ Half damage."
  - name: Devil’s Sight (Devil Only)
    description: "Magical Darkness doesn’t impede the spirit’s Darkvision."
  - name: Magic Resistance
    description: "The spirit has Advantage on saving throws against spells and other magical effects."
actions:
  - name: Multiattack
    description: "The spirit makes a number of attacks equal to half this spell’s level (round down)."
  - name: Bite (Demon Only)
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d12$(formatBonus(stats.dex.mod)) + the spell’s level Necrotic damage."
  - name: Claws (Yugoloth Only)
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.dex.mod)) + the spell’s level Slashing damage. Immediately after the attack hits or misses, the spirit can teleport up to 30 feet to an unoccupied space it can see."
  - name: Fiery Strike (Devil Only)
    description: "_Melee or Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. or range 150 ft. _Hit:_ 2d6$(formatBonus(stats.dex.mod)) + the spell’s level Fire damage."
