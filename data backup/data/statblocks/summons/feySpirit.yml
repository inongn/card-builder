type: Statblock
name: Fey Spirit
id: feySpirit
category: summon
tags: [summon]
size: Small
classification: Fey
ac: 12 + the spell's level
hp: 30 + 10 for each spell level above 3
movement:
  walk: 30
  fly: 30
stats:
  str: 13
  dex: 16
  con: 14
  int: 14
  wis: 11
  cha: 16
immunities: [Charmed]
senses:
  darkvision: 60
challenge: 0
cr: 0
actions:
  - name: Multiattack
    description: "The spirit makes a number of Fey Blade attacks equal to half this spell’s level (round down)."
  - name: Fey Blade
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 2d6$(formatBonus(stats.dex.mod)) + the spell's level Force damage."
bonusActions:
  - name: Fey Step
    description: "The spirit magically teleports up to 30 feet to an unoccupied space it can see. Then one of the following effects occurs, based on the spirit’s chosen mood:"
  - name: Fuming
    description: "The spirit has Advantage on the next attack roll it makes before the end of this turn."
  - name: Mirthful
    description: "_Wisdom Saving Throw:_ DC $(attributes.spellcasting.save), one creature the spirit can see within 10 feet of itself. _Failure:_ The target is Charmed by you and the spirit for 1 minute or until the target takes any damage."
  - name: Tricksy
    description: "The spirit fills a 10-foot Cube within 5 feet of it with magical Darkness, which lasts until the end of its next turn."
