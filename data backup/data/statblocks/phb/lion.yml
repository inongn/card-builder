type: Reference
name: Lion
id: lion
category: beast
target: "$(local.target)"
variables:
  name: Lion
  size: Large
  classification: Beast
  ac: 12
  hp: 22
  movement:
    walk: 50
  stats:
    str: 17
    dex: 15
    con: 11
    int: 3
    wis: 12
    cha: 8
  skills:
    perception: 3
    stealth: 4
  senses:
    darkvision: 60
  cr: 1.0
  traits:
    - name: Pack Tactics
      description: The lion has Advantage on an attack roll against a creature if at least one of the lion's allies is within 5 feet of the creature and the ally doesn't have the Incapacitated condition.
    - name: Running Leap
      description: With a 10-foot running start, the lion can Long Jump up to 25 feet.
  actions:
    - name: Multiattack
      description: The lion makes two Rend attacks. It can replace one attack with a use of Roar.
    - name: Rend
      description: _Melee Attack Roll:_ +5 to hit, reach 5 ft. _Hit:_ 1d8 + 3 Slashing damage.
    - name: Roar
      description: Wisdom Saving Throw DC 11, one creature within 15 feet. _Fail:_ The target has the Frightened condition until the start of the lion's next turn.