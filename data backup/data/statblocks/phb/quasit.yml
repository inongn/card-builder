type: Reference
name: Quasit
id: quasit
category: fiend
target: "$(local.target)"
variables:
  name: Quasit
  size: Tiny
  classification: Fiend (Demon)
  ac: 13
  hp: 25
  movement:
    walk: 40
  stats:
    str: 5
    dex: 17
    con: 10
    int: 7
    wis: 10
    cha: 10
  skills:
    stealth: 5
  resistances:
    - Cold
    - Fire
    - Lightning
  immunities:
    - Poison
  conditionImmunities:
    - Poisoned
  senses:
    darkvision: 120
  cr: 1.0
  traits:
    - name: Magic Resistance
      description: The quasit has Advantage on saving throws against spells and other magical effects.
  actions:
    - name: Rend
      description: _Melee Attack Roll:_ +5 to hit, reach 5 ft. _Hit:_ 1d4 + 3 Slashing damage, and the target has the Poisoned condition until the start of the quasit's next turn.
    - name: Scare (1/Day)
      description: Wisdom Saving Throw DC 10, one creature within 20 feet. _Fail:_ The target has the Frightened condition. At the end of each of its turns, the target repeats the save, ending the effect on itself on a success. After 1 minute, it succeeds automatically.
    - name: Shape-Shift
      description: The quasit shape-shifts to resemble a bat (Speed 10 ft., Fly 40 ft.), a centipede (40 ft., Climb 40 ft.), or a toad (40 ft., Swim 40 ft.), or it returns to its true form. Its game statistics are the same in each form, except for its Speed. Any equipment it is wearing or carrying isn't transformed.
    - name: Invisibility
      description: The quasit casts Invisibility on itself, requiring no spell components and using Charisma as the spellcasting ability.