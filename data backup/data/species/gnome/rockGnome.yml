id: gnomishLineageRockGnome
name: Rock Gnome
tags: [gnomishLineage]
type: Folder
children:
  - type: Reference
    target: [mending, prestidigitation, chooseCaster]
  - id: clockworkDevice
    type: Activity
    name: Clockwork Device
    time: 10 minutes
    range: self
    duration: 8 hours
    description: |
      You spend 10 minutes casting Prestidigitation to create a Tiny clockwork device (AC 5, 1 HP), such as a toy, fire starter, or music box. When you create the device, you determine its function by choosing one effect from Prestidigitation; the device produces that effect whenever you or another creature takes a Bonus Action to activate it with a touch. You can have three such devices in existence at a time, and each falls apart 8 hours after its creation or when you dismantle it with a touch as a Utilize action.
