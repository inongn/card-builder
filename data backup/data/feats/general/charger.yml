  - name: Improved Dash
    type: Extra
    target: dash
    description: Your Speed increases by 10 feet for that action.
  - name: Charge
    type: Extra
    target: weaponAttack
    description: If you move at least 10 feet in a straight line toward the target immediately before hitting it, choose one of the following effects — gain a 1d8 bonus to the attack's damage roll, or push the target up to 10 feet away if it is no more than one size larger than you.