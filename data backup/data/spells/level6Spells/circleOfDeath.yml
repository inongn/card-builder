id: circleOfDeath
type: Activity
name: Circle Of Death
resource: level6SpellSlot
tags: [level6Spell, necromancy, sorcerer, warlock, wizard, saveSpell, damageSpell, necroticDamage]
time: action
range: 150 feet
duration: instantaneous
description: |
  Negative energy ripples out in a 60-foot-radius Sphere from a point you choose within range. Each creature in that area makes a DC $(attributes.spellcasting.save) Constitution saving throw, taking 8d8 Necrotic damage on a failed save or half as much damage on a successful one.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 2d8 for each spell slot level above 6.
