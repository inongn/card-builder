id: summonFiend
type: Folder
name: Summon Fiend
tags: [level6Spell, conjuration, warlock, wizard]
children:
  - type: Activity
    name: "Summon Fiend: Demon"
    id: summonFiendDemon
    tags: [summonFiendActivity]
    time: action
    range: 90 feet
    resource: level6SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth a fiendish demon spirit.

      >**Armor Class** 12 + the spell’s level
      >
      >**Hit Points** 50 + 15 for each spell level above 6
      >
      >**Speed** 40 ft., climb 40 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 13 (+1) | 16 (+3) | 15 (+2) | 10 (+2) | 10 (+0) | 16 (+3) |
      >
      >---
      >
      >**Resistances** Fire
      >
      >**Immunities** Poison; Poisoned
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >**Death Throes** When the spirit drops to 0 Hit Points or the spell ends, the spirit explodes. _Dexterity Saving Throw:_ DC $(attributes.spellcasting.save), each creature in a 10-foot Emanation originating from the spirit. Failure: 2d10 plus this spell’s level Fire damage. Success: Half damage.
      >
      >**Magic Resistance** The spirit has Advantage on saving throws against spells and other magical effects.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Bite.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d12 + 3 + the spell’s level Necrotic damage.
      
