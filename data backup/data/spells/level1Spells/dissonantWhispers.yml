id: dissonantWhispers
type: Activity
name: Dissonant Whispers
resource: level1SpellSlot
tags: [level1Spell, enchantment, bard, saveSpell, damageSpell, psychicDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  One creature of your choice that you can see within range hears a discordant melody in its mind. The target makes a DC $(attributes.spellcasting.save) Wisdom saving throw. On a failed save, it takes 3d6 Psychic damage and must immediately use its Reaction, if available, to move as far away from you as it can, using the safest route. On a successful save, the target takes half as much damage only.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d6 for each spell slot level above 1.
