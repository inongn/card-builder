id: bane
type: Activity
name: Bane
resource: level1SpellSlot
tags: [level1Spell, enchantment, bard, cleric, warlock, saveSpell]
time: action
range: 30 feet
duration: concentration, up to 1 minute
description: |
  Up to three creatures of your choice that you can see within range must each make a DC $(attributes.spellcasting.save) Charisma saving throw. Whenever a target that fails this save makes an attack roll or a saving throw before the spell ends, the target must subtract 1d4 from the attack roll or save.
extra:
  - name: Using a Higher-Level Spell Slot
    description: You can target one additional creature for each spell slot level above 1.
