id: rayOfEnfeeblement
type: Activity
name: Ray of Enfeeblement
resource: level2SpellSlot
tags: [level2Spell, necromancy, warlock, wizard, saveSpell, damageSpell]
time: action
range: 60 feet
duration: concentration, up to 1 minute
description: |
  A beam of enervating energy shoots from you toward a creature within range. The target must make a DC $(attributes.spellcasting.save) Constitution saving throw. On a successful save, the target has Disadvantage on the next attack roll it makes until the start of your next turn.

  On a failed save, the target has Disadvantage on Strength-based D20 Tests for the duration. During that time, it also subtracts 1d8 from all its damage rolls. The target repeats the save at the end of each of its turns, ending the spell on a success.

