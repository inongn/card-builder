id: hungerOfHadar
type: Activity
name: Hunger of Hadar
resource: level3SpellSlot
tags: [level3Spell, conjuration, warlock, saveSpell, damageSpell, coldDamage, acidDamage]
time: action
range: 150 feet
duration: concentration, up to 1 minute
description: |
  You open a gateway to the Far Realm, a region infested with unspeakable horrors. A 20-foot-radius Sphere of Darkness appears, centered on a point with range and lasting for the duration. The Sphere is Difficult Terrain, and it is filled with strange whispers and slurping noises, which can be heard up to 30 feet away. No light, magical or otherwise, can illuminate the area, and creatures fully within it have the Blinded condition.

  Any creature that starts its turn in the area takes 2d6 Cold damage. Any creature that ends its turn there must succeed on a DC $(attributes.spellcasting.save) Dexterity saving throw or take 2d6 Acid damage from otherworldly tentacles.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The Cold or Acid damage (your choice) increases by 1d6 for each spell slot level above 3.
