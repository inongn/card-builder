id: summonFey
type: Folder
name: Summon Fey
tags: [level3Spell, conjuration, druid, ranger, warlock, wizard]
children:
  - type: Activity
    id: summonFeyMirthful
    tags: [summonFeyActivity]
    name: "Summon Fey: Mirthful"
    time: action
    range: 90 feet
    resource: level3SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth a mirthful Fey spirit. 

      >**Armor Class** 12 + the spell’s level
      >
      >**Hit Points** 30 + 10 for each spell level above 4
      >
      >**Speed** 30 ft., fly 30 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 13 (+1) | 16 (+3) | 14 (+2) | 14 (+2) | 11 (+0) | 16 (+3) |
      >
      >---
      >
      >**Immunities** Charmed
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >---
      >
      >***Fey Blade.*** _Melee Weapon Attack:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 2d6$(formatBonus(stats.dex.mod)) + the spell's level Force damage.
      >
      >***(Bonus Action) Fey Step.*** The spirit teleports up to 30 feet to an unoccupied space it can see. _Wisdom Saving Throw:_ DC $(attributes.spellcasting.save), one creature the spirit can see within 10 feet of itself. _Failure:_ The target is Charmed by you and the spirit for 1 minute or until the target takes any damage.
