id: destructiveWave
type: Activity
name: Destructive Wave
resource: level5SpellSlot
tags: [level5Spell, evocation, paladin, saveSpell, damageSpell, necroticDamage, radiantDamage, thunderDamage]
time: action
range: self
duration: instantaneous
description: |
  Destructive energy ripples outward from you in a 30-foot Emanation. Each creature you choose in the Emanation makes a DC $(attributes.spellcasting.save) Constitution saving throw. On a failed save, a target takes 5d6 Thunder damage and 5d6 Radiant or Necrotic damage (your choice) and has the Prone condition. On a successful save, a target takes half as much damage only.

