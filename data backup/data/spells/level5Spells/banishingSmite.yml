id: banishingSmite
type: Activity
name: Banishing Smite
resource: level5SpellSlot
tags: [level5Spell, conjuration, paladin, saveSpell, damageSpell, forceDamage]
time: bonus action
range: self
duration: concentration, up to 1 minute
description: |
  Immediately after hitting a creature with a Melee weapon or an Unarmed Strike, the target hit by the attack roll takes an extra 5d10 Force damage from the attack. If the attack reduces the target to 50 Hit Points or fewer, the target must succeed on a DC $(attributes.spellcasting.save) Charisma saving throw or be transported to a harmless demiplane for the duration. While there, the target has the Incapacitated condition. When the spell ends, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied.

