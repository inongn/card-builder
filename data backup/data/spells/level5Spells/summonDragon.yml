id: summonDragon
type: Activity
name: Summon Dragon
resource: level5SpellSlot
tags: [level5Spell, conjuration, wizard]
time: action
range: 60 feet
duration: concentration, up to 1 hour
description: |
  You call forth a Dragon spirit. 

  >**Armor Class** 14 + the spell’s level
  >
  >**Hit Points** 50 + 10 for each spell level above 5
  >
  >**Speed** 30 ft., Fly 60 ft., Swim 30 ft.
  >
  >---
  >
  >| STR | DEX | CON | INT | WIS | CHA |
  >|-----|-----|-----|-----|-----|-----|
  >| 19 (+4) | 14 (+2) | 17 (+3) | 10 (+0) | 14 (+2) | 14 (+2) |
  >
  >---
  >
  >**Resistances** Acid, Cold, Fire, Lightning, Poison
  >
  >**Immunities** Charmed, Frightened, Poisoned
  >
  >**Senses** Blindsight 30 ft., Darkvision 60 ft., Passive Perception 12
  >
  >**Shared Resistances** When you summon the spirit, choose one of its Resistances. You have Resistance to the chosen damage type until the spell ends.
  >
  >---
  >
  >***Multiattack.*** The spirit makes a number of Rend attacks equal to half the spell’s level (round down), and it uses Breath Weapon.
  >
  >***Rend.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 10 feet. _Hit:_ 1d6 + 4 + the spell’s level Piercing damage.
  >
  >***Breath Weapon.*** _Dexterity Saving Throw:_ DC $(attributes.spellcasting.save), each creature in a 30-foot Cone. Failure: 2d6 damage of a type this spirit has Resistance to (your choice when you cast the spell). Success: Half damage