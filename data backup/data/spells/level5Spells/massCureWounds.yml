id: massCureWounds
type: Activity
name: Mass Cure Wounds
resource: level5SpellSlot
tags: [level5Spell, abjuration, bard, cleric, druid, healingSpell]
time: action
range: 60 feet
duration: instantaneous
description: |
  A wave of healing energy washes out from a point you can see within range. Choose up to six creatures in a 30-foot-radius Sphere centered on that point. Each target regains Hit Points equal to 5d8$(formatBonus(attributes.spellcasting.bonus)).
extra:
  - name: Using a Higher-Level Spell Slot
    description: The healing increases by 1d8 for each spell slot level above 5.
