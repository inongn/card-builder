id: summonAberration
type: Folder
name: Summon Aberration
tags: [level4Spell, conjuration, warlock, wizard]
children:
  - type: Activity
    name: "Summon Aberration: Beholderkin"
    id: summonAberrationBeholderkin
    tags: [summonAberrationActivity]
    time: action
    range: 90 feet
    resource: level4SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth the spirit of a Beholderkin
    
      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 40 + 10 for each spell level above 4
      >
      >**Speed** 30 ft., fly 30 ft. (hover)
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 16 (+3) | 10 (+0) | 15 (+2) | 16 (+3) | 10 (+0) | 6 (-2) |
      >
      >---
      >
      >**Immunities** Psychic
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Eye Ray.*** _Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, range 150 ft. _Hit:_ 1d8 + 3 + the spell’s level Psychic damage.

  - type: Activity
    name: "Summon Aberration: Mind Flayer"
    id: summonAberrationMindFlayer
    tags: [summonAberrationActivity]
    time: action
    range: 90 feet
    resource: level4SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth the spirit of a Mind Flayer
    
      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 40 + 10 for each spell level above 4
      >
      >**Speed** 30 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 16 (+3) | 10 (+0) | 15 (+2) | 16 (+3) | 10 (+0) | 6 (-2) |
      >
      >---
      >
      >**Immunities** Psychic
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >**Whispering Aura** At the start of each of the spirit’s turns, the spirit emits psionic energy if it doesn’t have the Incapacitated condition. _Wisdom Saving Throw:_ DC $(attributes.spellcasting.save), each creature (other than you) within 5 feet of the spirit. _Failure:_ 2d6 Psychic damage.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Psychic Slam.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + 3 + the spell’s level Psychic damage.

  - type: Activity
    name: "Summon Aberration: Slaad"
    id: summonAberrationSlaad
    tags: [summonAberrationActivity]
    time: action
    range: 90 feet
    resource: level4SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth the spirit of a Slaad
    
      >**Armor Class** 11 + the spell’s level
      >
      >**Hit Points** 40 + 10 for each spell level above 4
      >
      >**Speed** 30 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 16 (+3) | 10 (+0) | 15 (+2) | 16 (+3) | 10 (+0) | 6 (-2) |
      >
      >---
      >
      >**Resistances** Psychic
      >
      >**Senses** darkvision 60 ft., passive Perception 10
      >
      >**Regeneration** The spirit regains 5 Hit Points at the start of its turn if it has at least 1 Hit Point.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of attacks equal to half this spell’s level (round down).
      >
      >***Claw.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d10 + 3 + the spell’s level Slashing damage, and the target can’t regain Hit Points until the start of the spirit’s next turn.