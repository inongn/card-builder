id: chillTouch
type: Activity
name: Chill Touch
tags: [necromancy, cantrip, sorcerer, warlock, wizard]
time: action
range: touch
duration: instantaneous
description: |
  Channeling the chill of the grave, make a melee spell attack against a target within reach. On a hit, the target takes $(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)d10 Necrotic damage, and it can’t regain Hit Points until the end of your next turn.

