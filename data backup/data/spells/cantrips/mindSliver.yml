id: mindSliver
type: Activity
name: Mind Sliver
tags: [enchantment, cantrip, sorcerer, warlock, wizard, saveSpell, damageSpell, psychicDamage]
time: action
range: 60 feet
duration: 1 round
description: |
  You try to temporarily sliver the mind of one creature you can see within range. The target must succeed on an DC $(attributes.spellcasting.save) Intelligence saving throw or take $(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)d6 Psychic damage and subtract 1d4 from the next saving throw it makes before the end of your next turn.

