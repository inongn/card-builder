id: shieldMaster
name: Shield Master
tags:
  - feat
  - generalFeat
condition: $(attributes.proficiencies.includes("shieldTraining"))
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Shield Bash
    type: Activity
    time: bonus action
    range: 5 feet
    description: If you attack a creature on your turn, you try to shove that creature with your Shield. The target must succeed on a DC $(8+attributes.prof+stats.str.mod) Strength saving throw or be knocked prone.
  - name: Interpose Shield
    type: Activity
    time: reaction
    description: If you're subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you take no damage if you succeed on the saving throw.
