id: poisoner
name: Poisoner
tags:
  - feat
  - generalFeat
type: Folder
children:
  - name: Ability Score Increase
    type: Effect
    target: attributes.asiPoolLimit
    operation: add
    value: 1
  - name: Potent Poison
    type: Extra
    target: poisonDamage
    description: This damage ignores resistance to Poison damage.
  - name: Brew Poison
    type: Activity
    time: 1 hour
    description: 'You can craft poisons. With 1 hour of work using a Poisoner''s Kit and expending 50 GP worth of materials, you can create $(attributes.prof) doses of poison. As a Bonus Action, you can apply a poison dose to a weapon or piece of ammunition. Once applied, the poison retains its potency for 1 minute or until you hit with the poisoned item, whichever comes first. When a creature takes damage from the poisoned item, that creature must succeed on a DC $(8 + stats.dex.mod + attributes.prof) Constitution saving throw or take 2d8 Poison damage and have the Poisoned condition until the end of your next turn.

    '
