id: bigbysHand
type: Activity
name: Bigby's Hand
resource: level5SpellSlot
tags: [level5Spell, evocation, artificer, sorcerer, wizard, saveSpell, damageSpell, bludgeoningDamage, forceDamage]
time: action
range: 120 feet
duration: concentration, up to 1 minute
description: |
  You create a Large hand of shimmering magical energy in an unoccupied space that you can see within range. The hand lasts for the duration, and it moves at your command, mimicking the movements of your own hand.

  The hand is an object that has AC 20 and Hit Points equal to your Hit Point maximum. If it drops to 0 Hit Points, the spell ends. The hand doesn’t occupy its space.

  When you cast the spell and as a Bonus Action on your later turns, you can move the hand up to 60 feet and then cause one of the following effects:

  **Clenched Fist.** The hand strikes a target within 5 feet of it. Make a melee spell attack. On a hit, the target takes 5d8 Force damage.

  **Forceful Hand.** The hand attempts to push a Huge or smaller creature within 5 feet of it. The target must succeed on a DC $(attributes.spellcasting.save) Strength saving throw, or the hand pushes the target up to 5 feet plus a number of feet equal to five times $(attributes.spellcasting.bonus). The hand moves with the target, remaining within 5 feet of it.

  **Grasping Hand.** The hand attempts to grapple a Huge or smaller creature within 5 feet of it. The target must succeed on a DC $(attributes.spellcasting.save) Dexterity saving throw, or the target has the Grappled condition, with an escape DC equal to DC $(attributes.spellcasting.save). While the hand grapples the target, you can take a Bonus Action to cause the hand to crush it, dealing Bludgeoning damage to the target equal to 4d6$(formatBonus(attributes.spellcasting.bonus)).

  **Interposing Hand.** The hand grants you Half Cover against attacks and other effects that originate from its space or that pass through it. In addition, its space counts as Difficult Terrain for your enemies.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage of the Clenched Fist increases by 2d8 and the damage of the Grasping Hand increases by 2d6 for each spell slot level above 5.
