id: conjureElemental
type: Activity
name: Conjure Elemental
resource: level5SpellSlot
tags: [level5Spell, conjuration, druid, wizard, saveSpell, damageSpell, fireDamage, coldDamage, forceDamage, lightningDamage, thunderDamage]
time: action
range: 60 feet
duration: concentration, up to 10 minutes
description: |
  You conjure a Large, intangible spirit from the Elemental Planes that appears in an unoccupied space within range. Choose the spirit’s element, which determines its damage type: air (Lightning), earth (Thunder), fire (Fire), or water (Cold). The spirit lasts for the duration.

  Whenever a creature you can see enters the spirit’s space or starts its turn within 5 feet of the spirit, you can force that creature to make a DC $(attributes.spellcasting.save) Dexterity saving throw if the spirit has no creature Restrained. On failed save, the target takes 8d8 damage of the spirit’s type, and the target has the Restrained condition until the spell ends. At the start of each of its turns, the Restrained target repeats the save. On a failed save, the target takes 4d8 damage of the spirit’s type. On a successful save, the target isn’t Restrained by the spirit.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d8 for each spell slot level above 5.
