id: laeralsSilverLance
type: Activity
name: Laeral's Silver Lance
resource: level3SpellSlot
tags: [level3Spell, evocation, cleric, sorcerer, wizard, saveSpell, damageSpell, forceDamage]
time: action
range: self
duration: instantaneous
description: |
  Silver energy bursts out from you in a 120-foot-long, 5-foot-wide Line. Each creature of your choice in the Line makes a DC $(attributes.spellcasting.save) Strength saving throw. On a failed save, a creature takes 3d10 Force damage and has the Prone condition. On a successful save, a creature takes half as much damage only.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d10 for every spell slot level above 3.
