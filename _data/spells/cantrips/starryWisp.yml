id: starryWisp
type: Activity
name: Starry Wisp
tags: [evocation, cantrip, bard, druid, attackSpell, damageSpell, radiantDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  You launch a mote of light at one creature or object within range. Make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack against the target. On a hit, the target takes $(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)d8 Radiant damage, and until the end of your next turn, it emits Dim Light in a 10-foot radius and can’t benefit from the Invisible condition.

