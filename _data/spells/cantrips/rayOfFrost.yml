id: rayOfFrost
type: Activity
name: Ray of Frost
tags: [evocation, cantrip, artificer, sorcerer, wizard, attackSpell, damageSpell, coldDamage]
time: action
range: 60 feet
duration: instantaneous
description: |
  A frigid beam of blue-white light streaks toward a creature within range. Make a $(formatBonus(attributes.spellcasting.attack)) ranged spell attack against the target. On a hit, it takes $(meta.level >= 17 ? 4 : meta.level >= 11 ? 3 : meta.level >= 5 ? 2 : 1)d8 Cold damage, and its Speed is reduced by 10 feet until the start of your next turn.

