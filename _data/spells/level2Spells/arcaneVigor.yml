id: arcaneVigor
type: Activity
name: Arcane Vigor
resource: level2SpellSlot
tags: [level2Spell, abjuration, artificer, sorcerer, wizard, healingSpell]
time: bonus action
range: self
duration: instantaneous
description: |
  You tap into your life force to heal yourself. Roll one or two of your unexpended Hit Point Dice, and regain a number of Hit Points equal to the roll's total $(formatBonus(attributes.spellcasting.bonus)). Those dice are then expended.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The number of unexpended Hit Dice you can roll increases by one for each spell slot level above 2.
