id: spiderClimb
type: Activity
name: Spider Climb
resource: level2SpellSlot
tags: [level2Spell, transmutation, artificer, sorcerer, warlock, wizard]
time: action
range: touch
duration: concentration, up to 1 hour
description: |
  Until the spell ends, one willing creature you touch gains the ability to move up, down, and across vertical surfaces and along ceilings, while leaving its hands free. The target also gains a Climb Speed equal to its Speed.
extra:
  - name: Using a Higher-Level Spell Slot
    description: You can target one additional creature for each spell slot level above 2.
