      >
      >---
      >
      >**Senses** darkvision 60 ft., passive Perception 12
      >
      >**Pack Tactics** The spirit has advantage on Wisdom (Perception) checks that rely on smell when it is within 5 feet of another creature that it can see.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of Rend attacks equal to half this spell’s level (round down).
      >
      >***Rend.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + 4 + the spell’s level Piercing damage.
    
