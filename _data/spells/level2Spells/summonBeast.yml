id: summonBeast
type: Folder
name: Summon Beast
tags: [level2Spell, conjuration, druid, ranger]
children:
  - type: Activity
    name: "Summon Beast: Air"
    id: summonBeastAir
    tags: [summonBeastActivity]
    time: action
    range: 90 feet
    resource: level2SpellSlot
    duration: concentration, up to 1 hour
    description: |
      You call forth an aerial bestial spirit.

      >**Armor Class** 11 + the spell’s level
      > 
      >**Hit Points** 20 + 10 for each spell level above 2
      > 
      >**Speed** 30 ft., fly 60 ft.
      >
      >---
      >
      >| STR | DEX | CON | INT | WIS | CHA |
      >|-----|-----|-----|-----|-----|-----|
      >| 18 (+4) | 11 (+0) | 16 (+3) | 4 (-3) | 14 (+2) | 5 (-3) |
      >
      >---
      >
      >**Senses** darkvision 60 ft., passive Perception 12
      >
      >**Flyby** The spirit doesn’t provoke Opportunity Attacks when it flies out of an enemy’s reach.
      >
      >---
      >
      >***Multiattack.*** The spirit makes a number of Rend attacks equal to half this spell’s level (round down).
      >
      >***Rend.*** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + 4 + the spell’s level Piercing damage.
  - type: Activity
    name: "Summon Beast: Land"
    id: summonBeastLand
