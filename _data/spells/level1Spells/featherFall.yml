id: featherFall
type: Activity
name: Feather Fall
resource: level1SpellSlot
tags: [level1Spell, transmutation, artificer, bard, sorcerer, wizard]
time: reaction
range: 60 feet
duration: 1 minute
description: |
  Immediately after you or a creature you can see within 60 feet of you falls, choose up to five falling creatures within range. A falling creature’s rate of descent slows to 60 feet per round until the spell ends. If a creature lands before the spell ends, the creature takes no damage from the fall, and the spell ends for that creature.

