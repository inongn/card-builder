id: thunderousSmite
type: Activity
name: Thunderous Smite
resource: level1SpellSlot
tags: [level1Spell, evocation, paladin, saveSpell, damageSpell, thunderDamage]
time: bonus action
range: self
duration: instantaneous
description: |
  Immediately after hitting a target with a Melee weapon or an Unarmed Strike, your strike rings with thunder that is audible within 300 feet of you, and the target takes an extra 2d6 Thunder damage from the attack. Additionally, if the target is a creature, it must succeed on a DC $(attributes.spellcasting.save) Strength saving throw or be pushed 10 feet away from you and have the Prone condition.
extra:
  - name: Using a Higher-Level Spell Slot
    description: The damage increases by 1d6 for each spell slot level above 1.
