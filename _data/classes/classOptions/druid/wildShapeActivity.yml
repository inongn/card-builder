type: Activity
name: "Wild Shape: $(local.name)"
id: wildShapeActivity
time: bonus action
range: self
duration: $(meta.level / 2) hours
resource: wildShape
repeatable: true
description: |
  The power of nature allows you to assume the form of an animal. You gain $(meta.level) Temporary Hit Points, and your game statistics are replaced by the ones below:


  > **Armor Class** $(local.ac)
  >
  > **Speed** $(formatObject(local.movement, '{key} {value} ft.'))
  >
  >---
  >
  >| STR | DEX | CON | INT | WIS | CHA |
  >|-----|-----|-----|-----|-----|-----|
  >| local.stats.str | local.stats.dex | local.stats.con | $(stats.int.score) | local.stats.wis | local.stats.cha |
  >
  >---
  >
  > **Skills** $(formatObject(local.skills, '{Title} {bonus}'))
  >
  > **Senses** $(formatObject(local.senses, '{Title} {value} ft.'))
  >
  > $(local.resistances ? local.resistances.map(resistance => `**Resistances** ${resistance}`).join('\n') : '')
  >
  > $(local.traits ? local.traits.map(trait => `**${trait.name}.** ${trait.description}`).join('\n') : '')
  >
  >---
  >
  > $(local.actions ? local.actions.map(action => `**${action.name}.** ${action.description}`).join('\n') : '')