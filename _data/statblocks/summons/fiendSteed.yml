tags: [otherworldlySteed, findSteedActivity]
type: Activity
name: "Find Steed: Fiend"
id: fiendSteed
time: action
resource: level2SpellSlot
range: 10 feet
duration: 1 hour
description: |
  You summon an otherworldly fiend that appears as a loyal steed.

  > **Armor Class** $(10 + 1*local.maxLevel)
  >
  > **Hit Points** $(5 + 10*local.maxLevel)
  >
  > **Speed** 60 ft., $(local.maxLevel >= 4 ? 'fly 60 ft.' : '')
  >
  >---
  >
  >| STR | DEX | CON | INT | WIS | CHA |
  >|-----|-----|-----|-----|-----|-----|
  >| 18 | 12 | 14 | 6 | 12 | 8 |
  >
  >---
  >
  > **Life Bond** When you regain Hit Points from a level 1+ spell, the steed regains the same number of Hit Points if you’re within 5 feet of it.
  >
  >---
  >
  > **Otherworldly Slam** _Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8 + $(local.maxLevel) Necrotic damage.
  >
  >---
  >
  > **(Bonus Action) Fell Glare (Recharges after a Long Rest)** _Wisdom Saving Throw:_ DC $(attributes.spellcasting.save), one creature within 60 feet the steed can see. _Failure:_ The target has the Frightened condition until the end of your next turn.