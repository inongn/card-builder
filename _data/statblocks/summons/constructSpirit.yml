type: Statblock
name: Construct Spirit
id: constructSpirit
category: summon
tags: [summon]
size: Medium
classification: Construct
ac: 13 + the spell's level
hp: 40 + 15 for each spell level above 4
movement:
  walk: 30
stats:
  str: 18
  dex: 10
  con: 18
  int: 14
  wis: 11
  cha: 5
resistances: [Poison]
immunities: [Charmed, Exhaustion, Frightened, Paralyzed, Poisoned]
senses:
  darkvision: 60
challenge: 0
cr: 0
traits:
  - name: Heated Body (Metal Only)
    description: "A creature that hits the spirit with a melee attack or that starts its turn in a grapple with the spirit takes 1d10 Fire damage."
  - name: Stony Lethargy (Stone Only)
    description: "When a creature starts its turn within 10 feet of the spirit, the spirit can target it with magical energy if the spirit can see it. _Wisdom Saving Throw:_ DC $(attributes.spellcasting.save), the target. _Failure:_ Until the start of its next turn, the target can’t make Opportunity Attacks, and its Speed is halved."
actions:
  - name: Multiattack
    description: "The spirit makes a number of Slam attacks equal to half this spell’s level (round down)."
  - name: Slam
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d8$(formatBonus(stats.str.mod)) + the spell's level Bludgeoning damage."
reactions:
  - name: Berserk Lashing (Clay Only)
    description: "_Trigger:_ The spirit takes damage from a creature. _Response:_ The spirit makes a Slam attack against that creature if possible, or the spirit moves up to half its Speed toward that creature without provoking Opportunity Attacks."
