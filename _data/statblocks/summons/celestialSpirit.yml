type: Statblock
name: Celestial Spirit
id: celestialSpirit
category: summon
tags: [summon]
size: Large
classification: Celestial
ac: 11 + the spell's level + 2 (Defender only)
hp: 40 + 10 for each spell level above 5
movement:
  walk: 30
  fly: 40
stats:
  str: 16
  dex: 14
  con: 16
  int: 10
  wis: 14
  cha: 16
resistances: [Radiant]
immunities: [Charmed, Frightened]
senses:
  darkvision: 60
challenge: 0
cr: 0
actions:
  - name: Multiattack
    description: "The spirit makes a number of attacks equal to half this spell’s level (round down)."
  - name: Radiant Bow (Avenger Only)
    description: "_Ranged Attack Roll:_ $(attributes.spellcasting.attack) to hit, range 600 ft. _Hit:_ 2d6$(formatBonus(stats.dex.mod)) + the spell's level Radiant damage."
  - name: Radiant Mace (Defender Only)
    description: "_Melee Attack Roll:_ $(attributes.spellcasting.attack) to hit, reach 5 ft. _Hit:_ 1d10$(formatBonus(stats.str.mod)) + the spell's level Radiant damage, and the spirit can choose itself or another creature it can see within 10 feet of the target. The chosen creature gains 1d10 Temporary Hit Points."
  - name: Healing Touch (1/Day)
    description: "The spirit touches another creature. The target regains Hit Points equal to 2d8 + the spell’s level."
