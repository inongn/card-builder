type: Reference
name: Giant Spider
id: giantSpider
category: beast
target: "$(local.target)"
variables:
  name: Giant Spider
  size: Large
  classification: Beast
  ac: 14
  hp: 26
  movement:
    walk: 30
    climb: 30
  stats:
    str: 14
    dex: 16
    con: 12
    int: 2
    wis: 11
    cha: 4
  skills:
    perception: 4
    stealth: 7
  senses:
    darkvision: 60
  cr: 1.0
  traits:
    - name: Spider Climb
      description: The spider can climb difficult surfaces, including along ceilings, without needing to make an ability check.
    - name: Web Walker
      description: The spider ignores movement restrictions caused by webs, and it knows the location of any other creature in contact with the same web.
  actions:
    - name: Bite
      description: _Melee Attack Roll:_ +5 to hit, reach 5 ft. _Hit:_ 1d8 + 3 Piercing damage plus 2d6 Poison damage.
    - name: Web (Recharge 5-6)
      description: Dexterity Saving Throw DC 13, one creature the spider can see within 60 feet. _Fail:_ The target has the Restrained condition until the web is destroyed (AC 10; HP 5; Vulnerability to Fire damage; Immunity to Poison and Psychic damage).